const dotsGroup = document.getElementById('dots');
points.forEach(p => {
  const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  c.setAttribute('cx', p.x.toFixed(2));
  c.setAttribute('cy', p.y.toFixed(2));
  c.setAttribute('r', p.r);
  c.setAttribute('class', 'dot');
  dotsGroup.appendChild(c);
  p.el = c;
});

const phaseStart = [0.3, 1.8, 3.3, 4.9];
const phaseSpread = [1.4, 1.7, 2.0, 2.5];
const cycleDuration = 13;

points.forEach(p => {
  p.delay = phaseStart[p.phase] + Math.random() * phaseSpread[p.phase];
});

function runCycle() {
  points.forEach(p => {
    p.el.style.animation = 'none';
    void p.el.offsetWidth;
    p.el.style.animation =
      `dotAppear 1.2s ease-out ${p.delay.toFixed(2)}s forwards, ` +
      `twinkle ${p.twinkleDur}s ease-in-out ${(p.delay + 1.2 + p.twinkleDelay).toFixed(2)}s infinite, ` +
      `dotFadeOut 1s ease-in ${(cycleDuration - 0.8).toFixed(2)}s forwards`;
  });
  runCaptions();
}

const captionEl = document.getElementById('caption');
const captions = [
  { t: 0.5, text: "Les premiers sites, dans les métropoles" },
  { t: 2.3, text: "La densification urbaine" },
  { t: 4.2, text: "L'extension aux villes moyennes" },
  { t: 6.2, text: "Le maillage des territoires" },
  { t: 9.2, text: "Une géographie nouvelle, invisible à l'œil nu" },
];

let captionTimeouts = [];
function runCaptions() {
  captionTimeouts.forEach(t => clearTimeout(t));
  captionTimeouts = [];
  captionEl.classList.remove('show');
  captionEl.textContent = '';

  captions.forEach((c) => {
    captionTimeouts.push(setTimeout(() => {
      captionEl.classList.remove('show');
      setTimeout(() => {
        captionEl.textContent = c.text;
        captionEl.classList.add('show');
      }, 450);
    }, c.t * 1000));
  });

  captionTimeouts.push(setTimeout(() => {
    captionEl.classList.remove('show');
  }, (cycleDuration - 0.5) * 1000));
}

runCycle();
setInterval(runCycle, cycleDuration * 1000);
</script>
