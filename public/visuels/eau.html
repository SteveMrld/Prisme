<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L'eau : la prochaine grande fracture · Soara</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#060D18;color:#ECE7DD;font-family:"DM Sans",sans-serif;-webkit-font-smoothing:antialiased}

#stage{position:fixed;top:0;left:0;width:100%;height:calc(100% - 52px);display:flex;flex-direction:column}
#map-wrap{position:relative;flex:1;overflow:hidden;background:#060D18;cursor:pointer}
#map-svg{position:absolute;top:0;left:0;width:100%;height:100%}

/* ══ BANDE TEXTE ══ */
#textband{
  flex-shrink:0;height:clamp(140px,22vh,185px);
  background:#08111F;border-top:1px solid rgba(255,255,255,.07);
  display:flex;position:relative;z-index:10;
}
#text-inner{flex:1;padding:16px 24px 12px;display:flex;flex-direction:column;gap:5px;overflow:hidden;border-right:1px solid rgba(255,255,255,.06)}
.p-tag{font-family:"DM Mono",monospace;font-size:7.5px;font-weight:500;letter-spacing:4px;text-transform:uppercase;transition:color .5s,opacity .3s}
.p-hook{font-family:"Playfair Display",serif;font-size:clamp(11px,1.3vw,13.5px);font-style:italic;font-weight:300;color:rgba(236,231,221,.4);line-height:1.5;transition:opacity .3s}
.p-title{font-family:"Playfair Display",serif;font-size:clamp(16px,2.1vw,24px);font-weight:400;line-height:1.15;letter-spacing:-.3px;color:#ECE7DD;transition:opacity .3s}
.p-title em{font-style:italic;transition:color .5s}
.fade-out{opacity:0;transform:translateY(4px);transition:opacity .25s ease,transform .25s ease}
.fade-in{opacity:1;transform:translateY(0);transition:opacity .35s ease .1s,transform .35s ease .1s}

#stat-block{flex-shrink:0;width:clamp(115px,11vw,150px);display:flex;flex-direction:column;justify-content:center;padding:14px 18px 14px 14px}
#pN{font-family:"Playfair Display",serif;font-size:clamp(28px,3.2vw,44px);font-weight:300;line-height:1;transition:color .5s;border-bottom:1px solid rgba(255,255,255,.07);padding-bottom:9px}
#pL{font-size:7.5px;letter-spacing:1.2px;text-transform:uppercase;color:rgba(236,231,221,.3);line-height:1.9;margin-top:9px}

/* ══ PLAYER ══ */
#player{position:fixed;bottom:0;left:0;right:0;height:52px;z-index:200;display:flex;flex-direction:column;background:#04090F;border-top:1px solid rgba(255,255,255,.06)}
#prog-bar{width:100%;height:2px;background:rgba(255,255,255,.06);cursor:pointer;flex-shrink:0}
#prog-fill{height:100%;width:0%;transition:width .1s linear}
#ctrl{flex:1;display:flex;align-items:center;justify-content:center;padding:0 16px;position:relative}
#dots{position:absolute;left:16px;display:flex;gap:7px;align-items:center}
.dot{width:5px;height:2px;border-radius:1px;background:rgba(255,255,255,.15);cursor:pointer;transition:all .25s}
.dot.on{width:16px}
.cbtn{width:36px;height:36px;border:none;background:none;color:rgba(255,255,255,.3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:color .2s;padding:0;margin:0 3px}
.cbtn:hover{color:#fff}
.cbtn svg{width:18px;height:18px;fill:currentColor}
#bplay .ip{display:block}#bplay .ipa{display:none}
#bplay.on .ip{display:none}#bplay.on .ipa{display:block}
#bplay{width:42px;height:42px;background:rgba(255,255,255,.05);color:#fff;border:1px solid rgba(255,255,255,.12);border-radius:0}
#cnt{position:absolute;right:16px;font-family:"DM Mono",monospace;font-size:8.5px;letter-spacing:2px;color:rgba(255,255,255,.18)}

/* ══ LÉGENDE ══ */
#legend{position:absolute;right:12px;top:12px;z-index:20;display:flex;flex-direction:column;gap:8px;background:rgba(8,17,31,.88);padding:10px 13px;border:1px solid rgba(255,255,255,.08);backdrop-filter:blur(8px);transition:opacity .4s}
.li{display:flex;align-items:center;gap:8px}
.li-txt{font-size:8px;color:rgba(236,231,221,.45);letter-spacing:.5px}

/* ══ NUMÉRO SLIDE — grand, dans la carte ══ */
#slide-num{position:absolute;left:16px;bottom:16px;z-index:10;font-family:"Playfair Display",serif;font-size:clamp(52px,8vw,90px);font-weight:300;line-height:1;opacity:.08;pointer-events:none;transition:color .5s,opacity .4s;color:#fff}

.back{position:fixed;top:14px;left:14px;font-family:"DM Mono",monospace;font-size:7px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(236,231,221,.25);text-decoration:none;z-index:300;transition:color .2s}
.back:hover{color:#ECE7DD}

@media(max-width:640px){
  #textband{height:auto;min-height:128px}
  #text-inner{padding:11px 15px 10px}
  .p-hook{font-size:10.5px}
  .p-title{font-size:15px}
  #stat-block{width:100px;padding:11px 13px}
  #pN{font-size:24px}
  #legend{right:8px;top:8px;padding:7px 9px}
  .li-txt{font-size:7px}
  #slide-num{font-size:52px}
}
</style>
</head>
<body>
<a class="back" href="/">← Soara</a>
<div id="stage">
  <div id="map-wrap">
    <svg id="map-svg"></svg>
    <div id="legend"></div>
    <div id="slide-num">I</div>
  </div>
  <div id="textband">
    <div id="text-inner">
      <div id="pTag" class="p-tag fade-in"></div>
      <div id="pHook" class="p-hook fade-in"></div>
      <h2 id="pTitle" class="p-title fade-in"></h2>
    </div>
    <div id="stat-block">
      <span id="pN"></span>
      <span id="pL"></span>
    </div>
  </div>
</div>
<div id="player">
  <div id="prog-bar" onclick="seekClick(event)"><div id="prog-fill"></div></div>
  <div id="ctrl">
    <div id="dots"></div>
    <button class="cbtn" onclick="prev()"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg></button>
    <button class="cbtn" id="bplay" onclick="togglePlay()"><svg class="ip" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg><svg class="ipa" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg></button>
    <button class="cbtn" onclick="next()"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
    <span id="cnt">1 / 5</span>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script>
var mapW = window.innerWidth;
var isMobile = mapW < 640;
var tbH = 0;
var mapH;

// Calculer mapH après que le DOM soit prêt
function calcMapH(){
  tbH = document.getElementById('textband').offsetHeight || 155;
  mapH = window.innerHeight - tbH - 52;
}
calcMapH();

var svg = d3.select('#map-svg').attr('width',mapW).attr('height',mapH);
var proj, gp, mapGrp, hlGrp;
var allFeatures = [];

// ══ CONFIG SLIDES ══
var ROMAN = ['I','II','III','IV','V'];
var CHS = [
  { tag:'I · Vue mondiale · 2026',
    hook:'L\'eau n\'est pas rare en moyenne. Elle est mal distribuée. Et cette distribution est une question politique.',
    title:'La grande <em>fracture hydrique</em>',
    n:'310', l:'bassins fluviaux\ntransfrontaliers',
    color:'#E06030',
    zoom:{lon:15,lat:8,s:1},
    hl:[504,12,788,434,818,729,706,682,887,368,792,400,760,364,478,466,562,854,148],
    hlFill:'rgba(220,80,30,.55)',
    legs:[
      {sym:'<div style="width:22px;height:2px;border-radius:1px;background:#E06030"></div>',l:'Zone en stress hydrique'},
      {sym:'<div style="width:22px;height:2px;border-radius:1px;background:rgba(60,130,220,.7)"></div>',l:'Grand fleuve'},
    ]
  },
  { tag:'II · Himalaya · Empire hydraulique',
    hook:'La Chine contrôle les sources de l\'Indus, du Gange, du Mékong. Soit l\'eau de 2 milliards de personnes.',
    title:'L\'empire <em>hydraulique chinois</em>',
    n:'2 Mds', l:'de personnes dépendent\ndes fleuves himalayens',
    color:'#3A9AE0',
    zoom:{lon:97,lat:22,s:isMobile?2.8:3.6},
    hl:[156],      hlFill:'rgba(40,120,220,.65)',
    hl2:[356,586,764,116,418,104,704,50], hl2Fill:'rgba(40,90,180,.35)',
    legs:[
      {sym:'<div style="width:22px;height:2px;border-radius:1px;background:#3A9AE0"></div>',l:'Fleuves himalayens'},
      {sym:'<div style="width:14px;height:5px;background:#E05050"></div>',l:'Barrages chinois (×11)'},
      {sym:'<div style="width:14px;height:14px;background:rgba(40,120,220,.5);border:1px solid rgba(40,120,220,.8)"></div>',l:'Chine — contrôle amont'},
    ]
  },
  { tag:'III · Inde-Pakistan · Nucléaire',
    hook:'Le traité de l\'Indus a survécu à trois guerres. Il ne survivra pas au changement climatique.',
    title:'L\'eau entre <em>deux bombes</em>',
    n:'1960', l:'Traité de l\'Indus\nfragilisé par le climat',
    color:'#E0A030',
    zoom:{lon:72,lat:29,s:isMobile?3.4:4.5},
    hl:[356],      hlFill:'rgba(220,140,20,.65)',
    hl2:[586],     hl2Fill:'rgba(180,80,20,.65)',
    legs:[
      {sym:'<div style="width:14px;height:14px;background:rgba(220,140,20,.55);border:1px solid rgba(220,140,20,.8)"></div>',l:'Inde'},
      {sym:'<div style="width:14px;height:14px;background:rgba(180,80,20,.55);border:1px solid rgba(180,80,20,.8)"></div>',l:'Pakistan'},
      {sym:'<div style="width:22px;height:0;border-top:2px dashed rgba(236,231,221,.4)"></div>',l:'Frontière disputée'},
    ]
  },
  { tag:'IV · Nil · Éthiopie vs Égypte',
    hook:'L\'Égypte a vécu grâce au Nil depuis l\'Antiquité. L\'Éthiopie décide aujourd\'hui de son débit.',
    title:'Le barrage <em>de la Renaissance</em>',
    n:'85%', l:'de l\'eau égyptienne\ncontrôlée par l\'Éthiopie',
    color:'#30C070',
    zoom:{lon:37,lat:16,s:isMobile?3.2:4.2},
    hl:[231],      hlFill:'rgba(30,180,80,.65)',
    hl2:[818,729,728], hl2Fill:'rgba(200,160,20,.5)',
    legs:[
      {sym:'<div style="width:14px;height:14px;background:rgba(30,180,80,.55);border:1px solid rgba(30,180,80,.8)"></div>',l:'Éthiopie — contrôle amont'},
      {sym:'<div style="width:14px;height:14px;background:rgba(200,160,20,.45);border:1px solid rgba(200,160,20,.7)"></div>',l:'Égypte / Soudan'},
      {sym:'<div style="width:14px;height:5px;background:#E05050"></div>',l:'Barrage de la Renaissance'},
    ]
  },
  { tag:'V · Moyen-Orient · Rupture hydrique',
    hook:'Les prochaines guerres ne se feront pas pour le pétrole, mais pour l\'eau.',
    title:'Là où l\'eau <em>vaut plus que le pétrole</em>',
    n:'6×', l:'plus d\'eau utilisée\nque reçue en précipitation',
    color:'#E04020',
    zoom:{lon:42,lat:33,s:isMobile?3.8:5.0},
    hl:[792],      hlFill:'rgba(220,60,20,.7)',
    hl2:[368,760,376,400,422,364,682,887], hl2Fill:'rgba(180,50,15,.5)',
    legs:[
      {sym:'<div style="width:14px;height:14px;background:rgba(220,60,20,.6);border:1px solid rgba(220,60,20,.85)"></div>',l:'Turquie — contrôle les sources'},
      {sym:'<div style="width:14px;height:14px;background:rgba(180,50,15,.5);border:1px solid rgba(180,50,15,.7)"></div>',l:'Zone aride extrême'},
      {sym:'<div style="width:9px;height:9px;background:#E04020;transform:rotate(45deg)"></div>',l:'Point de tension'},
    ]
  },
];

// ══ FLEUVES ══
var RIV = {
  mekong: [[97,32],[97.5,30],[98,28],[98.5,26],[99,24],[100,22],[101,20],[101.5,18],[102,17],[102.5,16],[103,15],[103.5,14],[104,13],[104.5,12],[105.2,11],[105.8,10.5],[106.2,10]],
  indus:  [[76.5,35],[76,33.5],[74.5,32],[73,31],[72,30],[71,29],[70,28],[69,26.5],[68,25.5],[67.5,24],[67,23]],
  gange:  [[80,31],[80.5,29.5],[81,28.5],[82,27.5],[83,27],[84,26.5],[85.5,26],[87,25],[88,24.5],[89,24],[90,23.5],[90.5,23]],
  brahma: [[92,30],[91.5,28.5],[90.5,27.5],[89.8,27],[89.5,26.5],[90,26],[90.5,25],[91,24.5],[91.5,24],[92,23.5]],
  nile:   [[37,14],[37.2,15],[36.8,16.5],[36.2,17.5],[35.5,19],[34.5,20.5],[33.5,21.5],[33,23],[32.5,24.5],[32,26],[31.8,27.5],[31.5,29],[31.2,30],[30.5,31]],
  nil_b:  [[38,8],[38.2,9],[38,10],[37.8,11.5],[37.5,12.5],[37.2,13.5],[37,14]],
  tigre:  [[39,38],[39.5,37],[40.5,36.5],[41.5,36],[42.5,35.5],[43.5,35],[44.5,34],[45.5,33],[46.5,32],[47.5,31],[48,30.5]],
  euphrate:[[38,37],[38.5,36.5],[39.5,36],[40.5,35.5],[41.5,35],[42.5,34.5],[43.5,34],[44.5,33.5],[45.5,33],[46.5,32.5],[47.5,31.5],[48,30.5]],
  jordan: [[35.6,33],[35.4,32.5],[35.2,32],[35.1,31.5],[35.3,31],[35.5,30.5]],
};

function P(lon,lat){ return proj([lon,lat]) || [0,0]; }

function smooth(coords){
  var pts = coords.map(function(c){return P(c[0],c[1])}).filter(function(p){return p[0]>0&&p[1]>0});
  if(pts.length<2) return null;
  return d3.line().x(function(p){return p[0]}).y(function(p){return p[1]}).curve(d3.curveCatmullRom.alpha(0.5))(pts);
}

function river(g, key, col, w){
  var d = smooth(RIV[key]); if(!d) return;
  g.append('path').attr('d',d).attr('fill','none')
    .attr('stroke',col.replace(/[\d.]+\)$/,function(m){return Math.max(0,parseFloat(m)*.12)+')'}))
    .attr('stroke-width',w*8).attr('stroke-linecap','round');
  var path = g.append('path').attr('d',d).attr('fill','none')
    .attr('stroke',col).attr('stroke-width',w*2.2).attr('stroke-linecap','round').attr('data-r','1');
  g.append('path').attr('d',d).attr('fill','none')
    .attr('stroke','rgba(200,235,255,.35)').attr('stroke-width',w*.65).attr('stroke-linecap','round');
  return path;
}

function animateRivers(g){
  g.selectAll('[data-r]').nodes().forEach(function(el,i){
    var len = 1500;
    try{ len = el.getTotalLength()||1500; }catch(e){}
    el.style.strokeDasharray = len+' '+len;
    el.style.strokeDashoffset = len;
    el.style.transition = 'none';
    el.getBoundingClientRect();
    el.style.transition = 'stroke-dashoffset '+(1.3+i*.08)+'s cubic-bezier(.4,0,.2,1) '+(i*40)+'ms';
    el.style.strokeDashoffset = '0';
  });
}

function dam(g, lon, lat, sz){
  sz = sz||12;
  var pt = P(lon,lat);
  var dg = g.append('g').attr('transform','translate('+pt[0]+','+pt[1]+')');
  dg.append('rect').attr('x',-sz/2).attr('y',-2).attr('width',sz).attr('height',4).attr('fill','#E05050');
  for(var x=-sz/2+1.5; x<sz/2; x+=3){
    dg.append('line').attr('x1',x).attr('y1',2).attr('x2',x-2).attr('y2',6).attr('stroke','#E05050').attr('stroke-width',1.2);
  }
}

function lbl(g, lon, lat, txt, col, sz, anchor){
  var pt = P(lon,lat);
  g.append('text').attr('x',pt[0]).attr('y',pt[1]).attr('text-anchor',anchor||'middle')
    .attr('font-family','"DM Sans",sans-serif').attr('font-size',sz||9).attr('font-weight','400')
    .attr('fill',col||'rgba(236,231,221,.4)').attr('letter-spacing',.5).attr('pointer-events','none').text(txt);
}

function tension(g, lon, lat, col){
  var pt = P(lon,lat);
  var tg = g.append('g').attr('transform','translate('+pt[0]+','+pt[1]+') rotate(45)');
  tg.append('rect').attr('x',-5).attr('y',-5).attr('width',10).attr('height',10).attr('fill',col||'#E04020');
}

// ══ COUCHES ══
var LAYERS = {};

function buildLayers(){
  // L0 — Vue monde
  var g0 = mapGrp.append('g').attr('id','l0').style('opacity',0);
  LAYERS[0] = g0;
  Object.keys(RIV).forEach(function(k){ river(g0,k,'rgba(50,110,200,.45)',isMobile?.8:1.2); });

  // L1 — Himalaya
  var g1 = mapGrp.append('g').attr('id','l1').style('opacity',0);
  LAYERS[1] = g1;
  river(g1,'mekong','rgba(40,170,255,.9)',isMobile?1.2:1.8);
  river(g1,'indus','rgba(40,150,235,.75)',isMobile?1:1.5);
  river(g1,'gange','rgba(40,155,240,.8)',isMobile?1:1.5);
  river(g1,'brahma','rgba(40,150,235,.75)',isMobile?1:1.5);
  [[99,24],[100,21],[101,19],[102,17],[103,15]].forEach(function(c){ dam(g1,c[0],c[1],isMobile?8:11); });
  lbl(g1,93,36,'Empire hydraulique','rgba(236,231,221,.6)',isMobile?8.5:11);
  lbl(g1,93,38,'chinois','rgba(236,231,221,.6)',isMobile?8.5:11);
  lbl(g1,106,9,'Mékong','rgba(40,170,255,.7)',isMobile?8:9.5,'start');
  lbl(g1,63,20,'Indus','rgba(40,150,235,.65)',isMobile?8:9.5,'end');

  // L2 — Indus
  var g2 = mapGrp.append('g').attr('id','l2').style('opacity',0);
  LAYERS[2] = g2;
  river(g2,'indus','rgba(40,160,255,.95)',isMobile?1.5:2.4);
  var brd = smooth([[73,37],[74,34],[74,32],[72,30],[70,28],[68,25],[67,23]]);
  if(brd) g2.append('path').attr('d',brd).attr('fill','none').attr('stroke','rgba(236,231,221,.5)').attr('stroke-width',1.2).attr('stroke-dasharray','4 5');
  lbl(g2,80,23,'INDE','rgba(220,140,20,.8)',isMobile?9:11);
  lbl(g2,64,30,'PAKISTAN','rgba(180,80,20,.8)',isMobile?9:11);
  tension(g2,71,30,'#E0A030');
  lbl(g2,78,31,'Traité de l\'Indus (1960)','rgba(236,231,221,.6)',isMobile?8:9.5,'start');
  lbl(g2,78,32.5,'fragilisé par le climat','rgba(236,231,221,.35)',isMobile?7.5:8.5,'start');

  // L3 — Nil
  var g3 = mapGrp.append('g').attr('id','l3').style('opacity',0);
  LAYERS[3] = g3;
  river(g3,'nile','rgba(30,210,100,.9)',isMobile?1.5:2.2);
  river(g3,'nil_b','rgba(30,200,90,.75)',isMobile?1:1.6);
  dam(g3,35,11,isMobile?10:14);
  var arr = smooth([[35,11],[34,15],[33,20],[32,25],[31,29]]);
  if(arr) g3.append('path').attr('d',arr).attr('fill','none').attr('stroke','rgba(236,231,221,.15)').attr('stroke-width',.8).attr('stroke-dasharray','3 5');
  lbl(g3,46,11,'Barrage de la Renaissance','rgba(236,231,221,.7)',isMobile?8:10,'start');
  lbl(g3,46,13,'Éthiopie — 85% eau égyptienne','rgba(236,231,221,.4)',isMobile?7:8.5,'start');
  lbl(g3,28,26,'ÉGYPTE','rgba(200,160,20,.75)',isMobile?8.5:11);
  lbl(g3,40,9,'ÉTHIOPIE','rgba(30,210,100,.75)',isMobile?8.5:11);

  // L4 — MENA
  var g4 = mapGrp.append('g').attr('id','l4').style('opacity',0);
  LAYERS[4] = g4;
  river(g4,'tigre','rgba(80,160,255,.85)',isMobile?1.2:1.8);
  river(g4,'euphrate','rgba(70,150,245,.8)',isMobile?1.1:1.6);
  river(g4,'jordan','rgba(70,140,235,.65)',isMobile?.8:1.2);
  tension(g4,38,37,'#E04020');
  tension(g4,35,31,'#E04020');
  tension(g4,43,33,'#C03010');
  lbl(g4,36,38.5,'Turquie','rgba(220,60,20,.9)',isMobile?9:11,'start');
  lbl(g4,36,40,'contrôle les sources','rgba(236,231,221,.5)',isMobile?7.5:9,'start');
  lbl(g4,43,34.5,'IRAK','rgba(236,231,221,.35)',isMobile?8:10);
  lbl(g4,37.5,35.5,'Euphrate','rgba(70,150,245,.55)',isMobile?7:8.5,'start');
  lbl(g4,46.5,33.5,'Tigre','rgba(80,160,255,.5)',isMobile?7:8.5,'start');
}

// ══ HIGHLIGHT PAYS ══
function applyHighlights(idx){
  var ch = CHS[idx];
  hlGrp.selectAll('*').remove();
  function paintCountries(ids, fill){
    if(!ids||!ids.length) return;
    hlGrp.selectAll(null)
      .data(allFeatures.filter(function(f){return ids.indexOf(+f.id)>-1}))
      .join('path').attr('d',gp).attr('fill',fill).attr('stroke','none')
      .style('opacity',0).transition().duration(500).delay(200).style('opacity',1);
  }
  paintCountries(ch.hl,  ch.hlFill);
  if(ch.hl2) paintCountries(ch.hl2, ch.hl2Fill);
}

// ══ ZOOM ══
function zoomTo(idx){
  var z = CHS[idx].zoom;
  var center = proj([z.lon, z.lat]); if(!center) return;
  var cx = center[0], cy = center[1], s = z.s;
  var tx = mapW/2 - cx*s, ty = mapH/2 - cy*s;
  mapGrp.transition().duration(1000).ease(d3.easeCubicInOut)
    .attr('transform','translate('+tx+','+ty+') scale('+s+')');
}

// ══ PLAYER ══
var N=5, cur=0, tmr=null, paused=false, progRaf=null, progStart=0;
var DURS=[10000,10000,10000,10000,10000];
for(var i=0;i<N;i++){(function(idx){
  var d=document.createElement('div');d.className='dot';
  d.onclick=function(e){e.stopPropagation();goTo(idx)};
  document.getElementById('dots').appendChild(d);
})(i)}

function setPanel(ch, instant){
  if(!instant){
    ['pTag','pHook','pTitle'].forEach(function(id){document.getElementById(id).className=document.getElementById(id).className.replace('fade-in','fade-out')});
    setTimeout(function(){doSetPanel(ch)},260);
  } else { doSetPanel(ch); }
}
function doSetPanel(ch){
  document.getElementById('pTag').textContent=ch.tag;
  document.getElementById('pTag').style.color=ch.color;
  document.getElementById('pHook').textContent=ch.hook;
  var t=document.getElementById('pTitle'); t.innerHTML=ch.title;
  var em=t.querySelector('em'); if(em) em.style.color=ch.color;
  document.getElementById('pN').textContent=ch.n;
  document.getElementById('pN').style.color=ch.color;
  document.getElementById('pL').innerHTML=ch.l.replace(/\n/g,'<br>');
  document.getElementById('prog-fill').style.background=ch.color;
  document.querySelectorAll('.dot').forEach(function(d){d.style.background=''});
  ['pTag','pHook','pTitle'].forEach(function(id){
    var el=document.getElementById(id);
    el.className=el.className.replace('fade-out','fade-in');
  });
}

function showSlide(idx, instant){
  var ch = CHS[idx];
  // Texte
  setPanel(ch, instant);
  // Numéro slide
  document.getElementById('slide-num').textContent = ROMAN[idx];
  document.getElementById('slide-num').style.color = ch.color;
  document.getElementById('slide-num').style.opacity = '.09';
  // Dots
  document.querySelectorAll('.dot').forEach(function(d,i){
    d.classList.toggle('on',i===idx);
    if(i===idx) d.style.background=ch.color;
    else d.style.background='rgba(255,255,255,.15)';
  });
  document.getElementById('cnt').textContent=(idx+1)+' / '+N;
  // Layers
  Object.keys(LAYERS).forEach(function(k){
    var g=LAYERS[k], active=parseInt(k)===idx;
    g.transition().duration(active?0:350).style('opacity','0');
    if(active){
      setTimeout(function(){
        g.transition().duration(400).style('opacity','1');
        animateRivers(g);
      },120);
    }
  });
  // Highlights pays
  applyHighlights(idx);
  // Zoom
  zoomTo(idx);
  // Légende
  document.getElementById('legend').innerHTML=ch.legs.map(function(x){
    return '<div class="li">'+x.sym+'<span class="li-txt">'+x.l+'</span></div>';
  }).join('');
  // Progress
  startProg();
}

function startProg(){
  if(progRaf) cancelAnimationFrame(progRaf);
  progStart=Date.now(); var dur=DURS[cur];
  (function tick(){
    var p=Math.min((Date.now()-progStart)/dur,1);
    document.getElementById('prog-fill').style.width=(p*100)+'%';
    if(p<1&&!paused) progRaf=requestAnimationFrame(tick);
  })();
}
function seekClick(e){var r=e.currentTarget.getBoundingClientRect();goTo(Math.max(0,Math.min(N-1,Math.round((e.clientX-r.left)/r.width*(N-1)))));}
function next(){if(tmr)clearTimeout(tmr);cur=cur<N-1?cur+1:0;showSlide(cur);if(!paused)schedule();}
function prev(){if(tmr)clearTimeout(tmr);cur=cur>0?cur-1:N-1;showSlide(cur);if(!paused)schedule();}
function schedule(){if(tmr)clearTimeout(tmr);if(!paused)tmr=setTimeout(next,DURS[cur]);}
function goTo(idx){if(tmr)clearTimeout(tmr);cur=idx;showSlide(idx);if(!paused)schedule();}
function togglePlay(){
  paused=!paused;var btn=document.getElementById('bplay');
  if(paused){btn.classList.remove('on');if(tmr)clearTimeout(tmr);if(progRaf)cancelAnimationFrame(progRaf);}
  else{btn.classList.add('on');schedule();startProg();}
}

// ══ INIT ══
d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(function(world){
  calcMapH();
  svg.attr('width',mapW).attr('height',mapH);

  proj = d3.geoNaturalEarth1()
    .scale(Math.min(mapW/5.2, mapH/2.8))
    .translate([mapW*.5, mapH*.52]);
  gp = d3.geoPath().projection(proj);

  // Groupe principal — c'est lui qu'on transforme pour zoomer
  mapGrp = svg.append('g').attr('id','map-g');

  // Fond sombre
  mapGrp.append('rect').attr('width',mapW*4).attr('height',mapH*4).attr('x',-mapW*1.5).attr('y',-mapH*1.5).attr('fill','#060D18');
  // Océan
  mapGrp.append('path').datum({type:'Sphere'}).attr('d',gp).attr('fill','#071220');
  // Grille
  mapGrp.append('path').datum(d3.geoGraticule()()).attr('d',gp).attr('fill','none').attr('stroke','rgba(60,110,180,.06)').attr('stroke-width',.4);

  allFeatures = topojson.feature(world,world.objects.countries).features;

  // Pays de base
  mapGrp.append('g').selectAll('path').data(allFeatures).join('path').attr('d',gp)
    .attr('fill',function(d){
      var arid=[504,12,788,434,818,729,706,682,887,368,792,400,760,364,478,466,562,854,148];
      return arid.indexOf(+d.id)>-1 ? '#0E1830' : '#0C1628';
    }).attr('stroke','none');

  // Frontières
  mapGrp.append('path')
    .datum(topojson.mesh(world,world.objects.countries,function(a,b){return a!==b}))
    .attr('d',gp).attr('fill','none')
    .attr('stroke','rgba(80,130,200,.18)').attr('stroke-width',.4);

  // Contour sphère
  mapGrp.append('path').datum({type:'Sphere'}).attr('d',gp).attr('fill','none').attr('stroke','rgba(80,130,200,.3)').attr('stroke-width',.8);

  // Labels océans
  [[-35,15,'ATLANTIQUE',isMobile?7:9],[-148,3,'PACIFIQUE',isMobile?7:10],[72,-22,'INDIEN',isMobile?7:8.5]].forEach(function(l){
    var pt=proj([l[0],l[1]]); if(!pt) return;
    mapGrp.append('text').attr('x',pt[0]).attr('y',pt[1]).attr('text-anchor','middle')
      .attr('font-family','"Playfair Display",serif').attr('font-size',l[3]).attr('font-style','italic')
      .attr('fill','rgba(80,140,200,.2)').attr('letter-spacing',4).attr('pointer-events','none').text(l[2]);
  });

  // Groupe highlights (au-dessus des pays, sous les fleuves)
  hlGrp = mapGrp.append('g').attr('id','hl-grp');

  // Fleuves de fond (tous les slides)
  var bgRivers = mapGrp.append('g').attr('id','bg-rivers');
  Object.keys(RIV).forEach(function(k){
    var d=smooth(RIV[k]); if(!d) return;
    bgRivers.append('path').attr('d',d).attr('fill','none').attr('stroke','rgba(50,100,180,.18)').attr('stroke-width',.7).attr('stroke-linecap','round');
  });

  // Couches par slide
  buildLayers();

  // Slide initial
  showSlide(0, true);

  // Player
  document.getElementById('bplay').classList.add('on');
  schedule();

  // Clic carte = slide suivant
  document.getElementById('map-wrap').addEventListener('click',function(e){
    if(e.target.closest('#dots,#player,.back,#legend')) return;
    next();
  });

}).catch(function(err){console.error(err);});
</script>
