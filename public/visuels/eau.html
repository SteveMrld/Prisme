<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>L'eau : la prochaine grande fracture · Soara</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#EDE8DF;font-family:"DM Mono",monospace;-webkit-font-smoothing:antialiased}

#stage{position:fixed;top:0;left:0;width:100%;height:calc(100% - 50px);display:flex;flex-direction:column}
#map{flex:1;position:relative;z-index:1}
.leaflet-container{background:#C8D8E4}

/* ══ BANDE TEXTE ══ */
#textband{
  flex-shrink:0;height:clamp(130px,20vh,168px);
  background:#F8F4EE;border-top:2px solid #1C1814;
  display:flex;z-index:10;position:relative;
}
#txt-inner{flex:1;padding:13px 22px 11px;display:flex;flex-direction:column;gap:4px;overflow:hidden;border-right:1px solid rgba(28,24,20,.1)}
.ptag{font-size:7px;font-weight:500;letter-spacing:4px;text-transform:uppercase;transition:color .6s}
.phook{font-family:"Playfair Display",serif;font-size:clamp(10px,1.2vw,13px);font-style:italic;font-weight:300;color:rgba(28,24,20,.35);line-height:1.55;margin-top:2px}
.ptitle{font-family:"Playfair Display",serif;font-size:clamp(15px,1.9vw,21px);font-weight:400;line-height:1.18;letter-spacing:-.25px;color:#1C1814;margin-top:2px}
.ptitle em{font-style:italic;transition:color .6s}
.fade-out{opacity:0;transition:opacity .2s ease}
.fade-in{opacity:1;transition:opacity .32s ease .06s}
#stat{flex-shrink:0;width:clamp(105px,10.5vw,138px);display:flex;flex-direction:column;justify-content:center;padding:12px 15px 12px 12px}
#pN{font-family:"Playfair Display",serif;font-size:clamp(25px,2.7vw,38px);font-weight:300;line-height:1;transition:color .6s;border-bottom:1px solid rgba(28,24,20,.1);padding-bottom:8px}
#pL{font-size:7px;letter-spacing:1.2px;text-transform:uppercase;color:rgba(28,24,20,.3);line-height:2;margin-top:8px}

/* ══ PLAYER ══ */
#player{position:fixed;bottom:0;left:0;right:0;height:50px;z-index:200;display:flex;flex-direction:column;background:#1C1814}
#progbar{width:100%;height:1.5px;background:rgba(255,255,255,.07);cursor:pointer;flex-shrink:0}
#progfill{height:100%;width:0%;transition:width .1s linear}
#ctrl{flex:1;display:flex;align-items:center;justify-content:center;padding:0 14px;position:relative}
#dots{position:absolute;left:14px;display:flex;gap:6px;align-items:center}
.dot{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.18);cursor:pointer;transition:all .25s}
.dot.on{background:#C8A96E;width:14px;border-radius:2px}
.cbtn{width:34px;height:34px;border:none;background:none;color:rgba(255,255,255,.3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:color .2s;padding:0;margin:0 2px}
.cbtn:hover{color:rgba(255,255,255,.8)}
.cbtn svg{width:16px;height:16px;fill:currentColor}
#bplay .ip{display:block}#bplay .ipa{display:none}
#bplay.on .ip{display:none}#bplay.on .ipa{display:block}
#bplay{width:40px;height:40px;background:rgba(255,255,255,.05);color:#fff;border:1px solid rgba(255,255,255,.12);border-radius:0}
#cnt{position:absolute;right:14px;font-size:8px;letter-spacing:2px;color:rgba(255,255,255,.18)}

/* ══ LÉGENDE ══ */
#legend{
  position:absolute;right:12px;top:12px;z-index:500;
  display:flex;flex-direction:column;gap:7px;
  background:rgba(248,244,238,.95);padding:10px 13px;
  border:1px solid rgba(28,24,20,.12);backdrop-filter:blur(6px);
  pointer-events:none;
}
.li{display:flex;align-items:center;gap:8px}
.li-txt{font-size:7px;color:rgba(28,24,20,.5);letter-spacing:.8px;text-transform:uppercase}

/* ══ MARQUEURS LEAFLET ══ */
.dam-marker{
  width:18px;height:12px;
  display:flex;align-items:center;justify-content:center;
}
.tension-marker{
  width:14px;height:14px;
  display:flex;align-items:center;justify-content:center;
}
.map-label{
  background:rgba(248,244,238,.85);
  padding:2px 5px;
  font-family:"DM Mono",monospace;
  font-size:8.5px;
  letter-spacing:1.5px;
  text-transform:uppercase;
  color:rgba(28,24,20,.55);
  white-space:nowrap;
  border:none;
  box-shadow:none;
}
.map-label-river{
  background:rgba(248,244,238,.8);
  padding:1px 4px;
  font-family:"Playfair Display",serif;
  font-size:9px;
  font-style:italic;
  color:rgba(60,100,180,.75);
  white-space:nowrap;
  border:none;
}

.back{position:fixed;top:12px;left:12px;font-size:7px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(28,24,20,.3);text-decoration:none;z-index:600;transition:color .2s;pointer-events:all}
.back:hover{color:#1C1814}

.leaflet-control-attribution{font-size:7px;opacity:.5}

@media(max-width:640px){
  #textband{height:auto;min-height:118px}
  #txt-inner{padding:10px 13px 9px}
  .phook{display:none}
  .ptitle{font-size:14px}
  #stat{width:94px;padding:10px 11px}
  #pN{font-size:22px}
  #legend{right:7px;top:7px;padding:7px 9px}
  .li-txt{font-size:6.5px}
}
</style>

    col:'#8B1A1A',
    view:{ center:[isMobile?33:34,isMobile?42:43], zoom:isMobile?4.5:5.25, opts:{duration:1.4} },
    rivers:[
      { coords:[[38.5,39],[37,40.5],[36.5,41.5],[36,42.5],[35.5,43.5],[34.8,44.5],[34,45.5],[33,46.5],[32,47.5],[31,48],[30.5,48.2]], col:'rgba(40,100,210,.9)', w:isMobile?1.6:2.2, label:'Tigre', lpos:[34,47] },

/* ══ COUCHES ACTIVES ══ */
var activeLayers = [];
function clearLayers(){
  activeLayers.forEach(function(l){ map.removeLayer(l); });
  activeLayers = [];
}

/* SVG barrage — symbole topo IGN */
function damIcon(){
  return L.divIcon({
    className:'dam-marker',
    html:'<svg width="18" height="12" viewBox="0 0 18 12"><line x1="1" y1="6" x2="17" y2="6" stroke="#8B1A1A" stroke-width="2.5" stroke-linecap="square"/><line x1="4" y1="6" x2="3.1" y2="11" stroke="#8B1A1A" stroke-width="1.1"/><line x1="9" y1="6" x2="8.1" y2="11" stroke="#8B1A1A" stroke-width="1.1"/><line x1="14" y1="6" x2="13.1" y2="11" stroke="#8B1A1A" stroke-width="1.1"/></svg>',
    iconSize:[18,12], iconAnchor:[9,6]
  });
}
/* Pin de tension */
function tensionIcon(col){
  col = col||'#8B1A1A';
  return L.divIcon({
    className:'tension-marker',
    html:'<svg width="14" height="18" viewBox="0 0 14 18"><circle cx="7" cy="6" r="5" fill="'+col+'" opacity=".85" stroke="rgba(248,244,238,.8)" stroke-width="1"/><line x1="7" y1="11" x2="7" y2="17" stroke="'+col+'" stroke-width="1.2" stroke-linecap="round"/></svg>',
    iconSize:[14,18], iconAnchor:[7,17]
  });
}
/* Label texte */
function labelIcon(txt, cls){
  return L.divIcon({
    className: cls||'map-label',
    html:txt,
    iconSize:[0,0], iconAnchor:[0,0]
  });
}

/* Dessiner un fleuve avec animation CSS */
function addRiver(coords, color, weight){
  var pl = L.polyline(coords, {
    color: color,
    weight: weight,
    opacity: 1,
    lineCap: 'round',
    lineJoin: 'round',
    smoothFactor: 1.5,
    interactive: false,
  }).addTo(map);
  /* Animation stroke-dashoffset */
  var path = pl.getElement ? pl.getElement() : null;
  if(path){
    var len = path.getTotalLength ? path.getTotalLength() : 2000;
    path.style.strokeDasharray = len+' '+len;
    path.style.strokeDashoffset = len;
    setTimeout(function(){
      path.style.transition = 'stroke-dashoffset 1.4s cubic-bezier(.4,0,.2,1)';
      path.style.strokeDashoffset = '0';
    },50);
  }
  activeLayers.push(pl);
  return pl;
}

function applySlide(idx, animated){
  var s = SL[idx];
  clearLayers();

  /* Zoom sur la région */
  if(animated){
    map.flyTo(s.view.center, s.view.zoom, Object.assign({animate:true,easeLinearity:.4},s.view.opts));
  } else {
    map.setView(s.view.center, s.view.zoom, {animate:false});
  }

  /* Fleuves */
  if(s.rivers){
    s.rivers.forEach(function(r){
      addRiver(r.coords, r.col, r.w);
      if(r.label && r.lpos){
        var m = L.marker(r.lpos, {icon:labelIcon(r.label,'map-label-river'), interactive:false}).addTo(map);
        activeLayers.push(m);
      }
    });
  }

  /* Frontière pointillée */
  if(s.border){
    var bl = L.polyline(s.border, {color:'rgba(28,24,20,.45)',weight:1.2,dashArray:'5 5',interactive:false}).addTo(map);
    activeLayers.push(bl);
  }

  /* Barrages */
  if(s.dams){
    s.dams.forEach(function(d){
      var m = L.marker(d, {icon:damIcon(), interactive:false}).addTo(map);
      activeLayers.push(m);
    });
  }

  /* Tensions */
  if(s.tensions){
    s.tensions.forEach(function(t){
      var m = L.marker(t, {icon:tensionIcon(s.col), interactive:false}).addTo(map);
      activeLayers.push(m);
    });
  }

  /* Labels */
  if(s.labels){
    s.labels.forEach(function(lb){
      var icon = L.divIcon({
        className:'',
        html:'<div style="background:rgba(248,244,238,.82);padding:2px 5px;font-family:\'DM Mono\',monospace;font-size:8px;letter-spacing:1.8px;text-transform:uppercase;color:'+lb[3]+';white-space:nowrap;pointer-events:none">'+lb[2]+'</div>',
        iconSize:[0,0], iconAnchor:[0,0]
      });
      var m = L.marker([lb[0],lb[1]], {icon:icon, interactive:false}).addTo(map);
      activeLayers.push(m);
    });
  }

  /* Légende */
  document.getElementById('legend').innerHTML = s.legs.map(function(x){
    return '<div class="li">'+x.s+'<span class="li-txt">'+x.l+'</span></div>';
  }).join('');
}

/* ══ PANEL TEXTE ══ */
function setPanel(s, instant){
  if(!instant){
    ['pTag','pHook','pTitle'].forEach(function(id){
      var e=document.getElementById(id);
      e.className=e.className.replace('fade-in','fade-out');
    });
    setTimeout(function(){writePanel(s)},210);
  } else writePanel(s);
}
function writePanel(s){
  document.getElementById('pTag').textContent=s.tag;
  document.getElementById('pTag').style.color=s.col;
  var t=document.getElementById('pTitle'); t.innerHTML=s.title;
  var em=t.querySelector('em'); if(em) em.style.color=s.col;
  document.getElementById('pHook').textContent=s.hook;
  document.getElementById('pN').textContent=s.n;
  document.getElementById('pN').style.color=s.col;
  document.getElementById('pL').innerHTML=s.l.replace(/\n/g,'<br>');
  document.getElementById('progfill').style.background=s.col;
  ['pTag','pHook','pTitle'].forEach(function(id){
    var e=document.getElementById(id);
    e.className=e.className.replace('fade-out','fade-in');
  });
}

/* ══ PLAYER ══ */
var N=5,cur=0,tmr=null,paused=false,raf=null,progStart=0;
for(var i=0;i<N;i++){(function(ii){
  var d=document.createElement('div'); d.className='dot';
  d.onclick=function(e){e.stopPropagation();goTo(ii)};
  document.getElementById('dots').appendChild(d);
})(i)}

function showSlide(idx, instant){
  setPanel(SL[idx], instant);
  document.querySelectorAll('.dot').forEach(function(d,i){
    d.classList.toggle('on',i===idx);
    d.style.background=i===idx?'#C8A96E':'rgba(255,255,255,.18)';
  });
  document.getElementById('cnt').textContent=(idx+1)+' / '+N;
  applySlide(idx, !instant);
  startProg();
}
function startProg(){
  if(raf)cancelAnimationFrame(raf); progStart=Date.now();
  (function tick(){
    var p=Math.min((Date.now()-progStart)/7000,1);
    document.getElementById('progfill').style.width=(p*100)+'%';
    if(p<1&&!paused)raf=requestAnimationFrame(tick);
  })();
}
function seek(e){var r=e.currentTarget.getBoundingClientRect();goTo(Math.max(0,Math.min(N-1,Math.round((e.clientX-r.left)/r.width*(N-1)))))}
function next(){if(tmr)clearTimeout(tmr);cur=cur<N-1?cur+1:0;showSlide(cur);if(!paused)sched()}
function prev(){if(tmr)clearTimeout(tmr);cur=cur>0?cur-1:N-1;showSlide(cur);if(!paused)sched()}
function sched(){if(tmr)clearTimeout(tmr);if(!paused)tmr=setTimeout(next,7000)}
function goTo(i){if(tmr)clearTimeout(tmr);cur=i;showSlide(i);if(!paused)sched()}
function togglePlay(){
  paused=!paused; var b=document.getElementById('bplay');
  if(paused){b.classList.remove('on');if(tmr)clearTimeout(tmr);if(raf)cancelAnimationFrame(raf)}
  else{b.classList.add('on');sched();startProg()}
}

/* Clic carte = slide suivant */
document.getElementById('map').addEventListener('click',function(e){
  if(e.target.closest('.back,#legend'))return; next();
});

/* Démarrage */
showSlide(0, true);
document.getElementById('bplay').classList.add('on');
sched();
</script>
