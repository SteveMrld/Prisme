<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#EDE8DF;color:#1A1410;font-family:"DM Sans",sans-serif;-webkit-font-smoothing:antialiased}
#stage{position:fixed;top:0;left:0;width:100%;height:calc(100% - 52px);display:flex;flex-direction:column}
#map-wrap{position:relative;flex:1;overflow:hidden;background:#EDE8DF;cursor:pointer}
#map-svg{position:absolute;top:0;left:0;width:100%;height:100%}

/* ══ TEXTE ══ */
#textband{flex-shrink:0;height:clamp(138px,21vh,180px);background:#F4F0E8;border-top:2px solid #1A1410;display:flex;position:relative;z-index:10}
#text-inner{flex:1;padding:15px 22px 12px;display:flex;flex-direction:column;gap:5px;overflow:hidden;border-right:1px solid rgba(26,20,16,.1)}
.ptag{font-family:"DM Mono",monospace;font-size:7.5px;font-weight:500;letter-spacing:4px;text-transform:uppercase;transition:color .5s}
.phook{font-family:"Playfair Display",serif;font-size:clamp(11px,1.3vw,13.5px);font-style:italic;font-weight:300;color:rgba(26,20,16,.4);line-height:1.5}
.ptitle{font-family:"Playfair Display",serif;font-size:clamp(16px,2vw,23px);font-weight:400;line-height:1.15;letter-spacing:-.3px;color:#1A1410}
.ptitle em{font-style:italic;transition:color .5s}
.fout{opacity:0;transition:opacity .22s ease}
.fin{opacity:1;transition:opacity .32s ease .08s}
#stat{flex-shrink:0;width:clamp(110px,11vw,148px);display:flex;flex-direction:column;justify-content:center;padding:13px 18px 13px 14px}
#pN{font-family:"Playfair Display",serif;font-size:clamp(27px,3vw,42px);font-weight:300;line-height:1;transition:color .5s;border-bottom:1px solid rgba(26,20,16,.1);padding-bottom:8px}
#pL{font-size:7.5px;letter-spacing:1.2px;text-transform:uppercase;color:rgba(26,20,16,.35);line-height:1.9;margin-top:9px}

/* ══ PLAYER ══ */
#player{position:fixed;bottom:0;left:0;right:0;height:52px;z-index:200;display:flex;flex-direction:column;background:#1A1410}
#progbar{width:100%;height:2px;background:rgba(255,255,255,.08);cursor:pointer;flex-shrink:0}
#progfill{height:100%;width:0%;transition:width .1s linear}
#ctrl{flex:1;display:flex;align-items:center;justify-content:center;padding:0 16px;position:relative}
#dots{position:absolute;left:16px;display:flex;gap:7px;align-items:center}
.dot{width:5px;height:2px;border-radius:1px;background:rgba(255,255,255,.18);cursor:pointer;transition:all .25s}
.dot.on{width:16px}
.cbtn{width:36px;height:36px;border:none;background:none;color:rgba(255,255,255,.35);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:color .2s;padding:0;margin:0 3px}
.cbtn:hover{color:#fff}
.cbtn svg{width:18px;height:18px;fill:currentColor}
#bplay .ip{display:block}#bplay .ipa{display:none}
#bplay.on .ip{display:none}#bplay.on .ipa{display:block}
#bplay{width:42px;height:42px;background:rgba(255,255,255,.06);color:#fff;border:1px solid rgba(255,255,255,.15);border-radius:0}
#cnt{position:absolute;right:16px;font-family:"DM Mono",monospace;font-size:8.5px;letter-spacing:2px;color:rgba(255,255,255,.2)}

/* ══ LÉGENDE ══ */
#legend{position:absolute;right:12px;top:12px;z-index:20;display:flex;flex-direction:column;gap:7px;background:rgba(244,240,232,.94);padding:10px 13px;border:1px solid rgba(26,20,16,.12);backdrop-filter:blur(6px)}
.li{display:flex;align-items:center;gap:8px}
.li-txt{font-size:8px;color:rgba(26,20,16,.5);letter-spacing:.3px}

#slidenum{position:absolute;left:14px;bottom:14px;z-index:10;font-family:"Playfair Display",serif;font-size:clamp(60px,9vw,100px);font-weight:300;line-height:1;opacity:.07;pointer-events:none;transition:color .5s;color:#1A1410}
.back{position:fixed;top:13px;left:13px;font-family:"DM Mono",monospace;font-size:7px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(26,20,16,.3);text-decoration:none;z-index:300;transition:color .2s}
.back:hover{color:#1A1410}

@media(max-width:640px){
  #textband{height:auto;min-height:125px}
  #text-inner{padding:11px 14px 9px}
  .phook{font-size:10.5px}
  .ptitle{font-size:14.5px}
  #stat{width:98px;padding:10px 12px}
  #pN{font-size:23px}
  #legend{right:7px;top:7px;padding:7px 9px}
  .li-txt{font-size:7px}
}
</style>

function continentFill(id){
  id=+id;
  for(var k in C){ if(C[k].indexOf(id)>-1) return CC[k]; }

/* Épaisseur par fleuve */
var RW={nile:1.8,nilb:1.3,mekong:1.6,indus:1.6,gange:1.5,brahma:1.3,yangtze:1.7,tigre:1.4,euphrate:1.4,amazon:2,congo:1.8,miss:1.6,danube:1.2,volga:1.2,jordan:1.1};

function smooth(coords){
  var pts=coords.map(function(c){return proj([c[0],c[1]])}).filter(function(p){return p&&p[0]>-100&&p[1]>-100});
  if(pts.length<2) return null;
  return d3.line().x(function(p){return p[0]}).y(function(p){return p[1]}).curve(d3.curveCatmullRom.alpha(0.5))(pts);
}

function drawRiver(g,key,color,widthMult,animate){
  var d=smooth(RIV[key]); if(!d) return null;
  var w=(RW[key]||1.5)*(widthMult||1)*(isMobile?.75:1);
  /* Halo large — effet profondeur eau */
  g.append('path').attr('d',d).attr('fill','none')
    .attr('stroke',color.replace(/[\d.]+\)$/,function(m){return Math.min(1,parseFloat(m)*.15)+')'}))
    .attr('stroke-width',w*9).attr('stroke-linecap','round');
  /* Corps principal */
  var body=g.append('path').attr('d',d).attr('fill','none')
    .attr('stroke',color).attr('stroke-width',w*2.6).attr('stroke-linecap','round').attr('data-riv','1');
  /* Reflet lumineux */
  g.append('path').attr('d',d).attr('fill','none')
    .attr('stroke','rgba(200,235,255,.55)').attr('stroke-width',w*.8).attr('stroke-linecap','round');
  if(animate) body.node()._animate=true;
  return body;
}

function animateGroup(g){
  g.selectAll('[data-riv]').nodes().forEach(function(el,i){
    var len=1500;try{len=el.getTotalLength()||1500}catch(e){}
    el.style.strokeDasharray=len+' '+len;
    el.style.strokeDashoffset=len;
    el.style.transition='none';
    el.getBoundingClientRect();
    el.style.transition='stroke-dashoffset '+(1.2+i*.07)+'s cubic-bezier(.4,0,.2,1) '+(i*35)+'ms';
    el.style.strokeDashoffset='0';
  });
}

function lbl(g,lon,lat,txt,col,sz,anchor){
  var pt=proj([lon,lat]); if(!pt) return;
  g.append('text').attr('x',pt[0]).attr('y',pt[1]).attr('text-anchor',anchor||'middle')
    .attr('font-family','"DM Sans",sans-serif').attr('font-size',sz||(isMobile?8:9.5))
    .attr('font-weight','500').attr('fill',col||'rgba(26,20,16,.5)')
    .attr('letter-spacing',.4).attr('pointer-events','none').text(txt);
}

function drawDam(g,lon,lat,col,sz){
  col=col||'#C0302A'; sz=sz||(isMobile?8:12);
  var pt=proj([lon,lat]); if(!pt) return;
  var dg=g.append('g').attr('transform','translate('+pt[0]+','+pt[1]+')');
  dg.append('rect').attr('x',-sz/2).attr('y',-sz/6).attr('width',sz).attr('height',sz/3).attr('fill',col);
  for(var x=-sz/2+1.5;x<sz/2;x+=2.8) dg.append('line').attr('x1',x).attr('y1',sz/6).attr('x2',x-1.5).attr('y2',sz/3+3).attr('stroke',col).attr('stroke-width',1.2);
}

function drawTension(g,lon,lat,col){
  var pt=proj([lon,lat]); if(!pt) return;
  col=col||'#C0302A';
  var tg=g.append('g').attr('transform','translate('+pt[0]+','+pt[1]+') rotate(45)');
  tg.append('rect').attr('x',-5.5).attr('y',-5.5).attr('width',11).attr('height',11).attr('fill',col);
  ['h','v'].forEach(function(dir){
    tg.append('line').attr('x1',dir==='h'?-5.5:0).attr('y1',dir==='h'?0:-5.5).attr('x2',dir==='h'?5.5:0).attr('y2',dir==='h'?0:5.5).attr('stroke','rgba(244,240,232,.85)').attr('stroke-width',1.5);
  });
}

      lbl(g,41,9,'ÉTHIOPIE','rgba(20,170,70,.85)',isMobile?9:11.5);
    },
    legs:[{sym:'<div style="width:22px;height:3px;border-radius:2px;background:rgba(20,200,100,.9)"></div>',l:'Nil'},{sym:'<div style="width:13px;height:5px;background:#C03030"></div>',l:'Barrage Renaissance'},{sym:'<div style="width:13px;height:13px;background:rgba(20,170,70,.4);border:1.5px solid rgba(20,170,70,.8)"></div>',l:'Éthiopie'},{sym:'<div style="width:13px;height:13px;background:rgba(190,150,20,.35);border:1.5px solid rgba(190,150,20,.75)"></div>',l:'Égypte / Soudan'},]
  },
  { tag:'V · Moyen-Orient · Rupture',
    hook:'Les prochaines guerres ne se feront pas pour le pétrole, mais pour l\'eau.',
    title:'Là où l\'eau <em>vaut plus que le pétrole</em>',
    n:'6×',l:'plus d\'eau utilisée\nque reçue en précipitation',
    col:'#C83020',
    zoom:{lon:42,lat:33,s:isMobile?3.6:4.8},
    rivs:{tigre:'rgba(30,140,255,.95)',euphrate:'rgba(30,130,245,.85)',jordan:'rgba(30,120,235,.7)',nile:'rgba(30,100,200,.25)'},
    hlIds:[792],hlFill:'rgba(210,50,20,.55)',hl2:[368,760,376,400,422,364,682,887],hl2Fill:'rgba(180,40,15,.35)',
    extras:function(g){
      [[38,37.5],[35,31.5],[43,33]].forEach(function(c,i){drawTension(g,c[0],c[1],['#C83020','#A02810','#B83018'][i])});
      lbl(g,37,40.5,'TURQUIE','rgba(210,50,20,.85)',isMobile?9:11.5,'start');
      lbl(g,37,38.5,'contrôle les sources','rgba(26,20,16,.5)',isMobile?7.5:9,'start');
      lbl(g,44,33,'IRAK','rgba(26,20,16,.35)',isMobile?8:10);
      lbl(g,37.5,35.5,'Euphrate','rgba(30,130,245,.65)',isMobile?7.5:9,'start');
      lbl(g,46.5,33.5,'Tigre','rgba(30,140,255,.6)',isMobile?7.5:9,'start');
    },
    legs:[{sym:'<div style="width:22px;height:3px;border-radius:2px;background:rgba(30,140,255,.9)"></div>',l:'Tigre / Euphrate'},{sym:'<div style="width:10px;height:10px;background:#C83020;transform:rotate(45deg)"></div>',l:'Zone de rupture'},{sym:'<div style="width:13px;height:13px;background:rgba(210,50,20,.45);border:1.5px solid rgba(210,50,20,.85)"></div>',l:'Turquie — contrôle amont'},]
  },
];

/* ══ COUCHES ══ */
var LAYERS={};
function buildLayer(idx){
  var g=mapG.append('g').attr('id','rl'+idx).style('opacity','0');
  LAYERS[idx]=g;
  var s=SLIDES[idx];
  Object.keys(s.rivs).forEach(function(k){ drawRiver(g,k,s.rivs[k],1,true); });
  if(s.extras) s.extras(g);
}

/* ══ HIGHLIGHTS ══ */
function applyHL(idx){
  if(hlG) hlG.remove();
  hlG=mapG.append('g').attr('id','hlg');
  var s=SLIDES[idx];
  function paint(ids,fill){
    if(!ids||!ids.length) return;
    hlG.selectAll(null).data(allFeatures.filter(function(f){return ids.indexOf(+f.id)>-1}))
      .join('path').attr('d',gp).attr('fill',fill).attr('stroke','none')
      .style('opacity',0).transition().duration(450).delay(150).style('opacity',1);
  }
  paint(s.hlIds,s.hlFill);
  if(s.hl2) paint(s.hl2,s.hl2Fill);
}

/* ══ ZOOM ══ */
function zoomTo(idx){
  var z=SLIDES[idx].zoom, c=proj([z.lon,z.lat]);
  if(!c) return;
  var s=z.s;
  mapG.transition().duration(1000).ease(d3.easeCubicInOut)
    .attr('transform','translate('+(mapW/2-c[0]*s)+','+(mapH/2-c[1]*s)+') scale('+s+')');
}

/* ══ PLAYER ══ */
var N=5,cur=0,tmr=null,paused=false,raf=null,progStart=0,allFeatures=[];
var DURS=[10000,10000,10000,10000,10000];
var ROMAN=['I','II','III','IV','V'];
for(var i=0;i<N;i++){(function(idx){
  var d=document.createElement('div');d.className='dot';
  d.onclick=function(e){e.stopPropagation();goTo(idx)};
  document.getElementById('dots').appendChild(d);
})(i)}

function setPanel(s,instant){
  var ids=['pTag','pHook','pTitle'];
  if(!instant){
    ids.forEach(function(id){var el=document.getElementById(id);el.className=el.className.replace('fin','fout')});
    setTimeout(function(){writePanel(s);ids.forEach(function(id){var el=document.getElementById(id);el.className=el.className.replace('fout','fin')})},240);
  } else writePanel(s);
}
function writePanel(s){
  document.getElementById('pTag').textContent=s.tag;
  document.getElementById('pTag').style.color=s.col;
  var t=document.getElementById('pTitle'); t.innerHTML=s.title;
  var em=t.querySelector('em'); if(em) em.style.color=s.col;
  document.getElementById('pHook').textContent=s.hook;
  document.getElementById('pN').textContent=s.n;
  document.getElementById('pN').style.color=s.col;
  document.getElementById('pL').innerHTML=s.l.replace(/\n/g,'<br>');
  document.getElementById('progfill').style.background=s.col;
}

function showSlide(idx,instant){
  var s=SLIDES[idx];
  setPanel(s,instant);
  document.getElementById('slidenum').textContent=ROMAN[idx];
  document.getElementById('slidenum').style.color=s.col;
  document.querySelectorAll('.dot').forEach(function(d,i){
    d.classList.toggle('on',i===idx);
    d.style.background=i===idx?s.col:'rgba(26,20,16,.18)';
  });
  document.getElementById('cnt').textContent=(idx+1)+' / '+N;
  Object.keys(LAYERS).forEach(function(k){
    var active=+k===idx;
    LAYERS[k].transition().duration(active?0:300).style('opacity','0');
    if(active) setTimeout(function(){LAYERS[k].transition().duration(380).style('opacity','1');animateGroup(LAYERS[k])},100);
  });
  applyHL(idx);
  zoomTo(idx);
  document.getElementById('legend').innerHTML=s.legs.map(function(x){return'<div class="li">'+x.sym+'<span class="li-txt">'+x.l+'</span></div>'}).join('');
  startProg();
}

function startProg(){
  if(raf) cancelAnimationFrame(raf); progStart=Date.now(); var dur=DURS[cur];
  (function tick(){var p=Math.min((Date.now()-progStart)/dur,1);document.getElementById('progfill').style.width=(p*100)+'%';if(p<1&&!paused)raf=requestAnimationFrame(tick)})();
}
function seek(e){var r=e.currentTarget.getBoundingClientRect();goTo(Math.max(0,Math.min(N-1,Math.round((e.clientX-r.left)/r.width*(N-1)))))}
function next(){if(tmr)clearTimeout(tmr);cur=cur<N-1?cur+1:0;showSlide(cur);if(!paused)sched()}
function prev(){if(tmr)clearTimeout(tmr);cur=cur>0?cur-1:N-1;showSlide(cur);if(!paused)sched()}
function sched(){if(tmr)clearTimeout(tmr);if(!paused)tmr=setTimeout(next,DURS[cur])}
function goTo(i){if(tmr)clearTimeout(tmr);cur=i;showSlide(i);if(!paused)sched()}
function togglePlay(){
  paused=!paused;var b=document.getElementById('bplay');
  if(paused){b.classList.remove('on');if(tmr)clearTimeout(tmr);if(raf)cancelAnimationFrame(raf)}
  else{b.classList.add('on');sched();startProg()}
}

/* ══ INIT ══ */
d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(function(world){
  proj=d3.geoNaturalEarth1().scale(Math.min(mapW/5.2,mapH/2.8)).translate([mapW*.5,mapH*.52]);
  gp=d3.geoPath().projection(proj);

  /* Groupe principal — zoom ici */
  mapG=svg.append('g').attr('id','map-g');

  /* Fond parcheminé (déborde pour le zoom) */
  mapG.append('rect').attr('x',-mapW*2).attr('y',-mapH*2).attr('width',mapW*6).attr('height',mapH*6).attr('fill','#EDE8DF');
  /* Océan */
  mapG.append('path').datum({type:'Sphere'}).attr('d',gp).attr('fill','#B8D4E8');
  /* Grille */
  mapG.append('path').datum(d3.geoGraticule()()).attr('d',gp).attr('fill','none').attr('stroke','rgba(26,20,16,.05)').attr('stroke-width',.3);

  allFeatures=topojson.feature(world,world.objects.countries).features;

  /* Pays colorés par continent */
  mapG.append('g').selectAll('path').data(allFeatures).join('path').attr('d',gp)
    .attr('fill',function(d){return continentFill(d.id)})
    .attr('stroke','none');

  /* Frontières */
  mapG.append('path')
    .datum(topojson.mesh(world,world.objects.countries,function(a,b){return a!==b}))
    .attr('d',gp).attr('fill','none').attr('stroke','rgba(26,20,16,.2)').attr('stroke-width',.35);
  /* Contour sphère */
  mapG.append('path').datum({type:'Sphere'}).attr('d',gp).attr('fill','none').attr('stroke','rgba(26,20,16,.3)').attr('stroke-width',1);

  /* Labels océans */
  [[-35,14,'ATLANTIQUE',isMobile?7:9.5],[-148,2,'PACIFIQUE',isMobile?7:10.5],[72,-22,'INDIEN',isMobile?7:8.5]].forEach(function(l){
    var pt=proj([l[0],l[1]]); if(!pt) return;
    mapG.append('text').attr('x',pt[0]).attr('y',pt[1]).attr('text-anchor','middle')
      .attr('font-family','"Playfair Display",serif').attr('font-size',l[3]).attr('font-style','italic')
      .attr('fill','rgba(30,80,140,.28)').attr('letter-spacing',4).attr('pointer-events','none').text(l[2]);
  });

  /* Placeholder highlights (avant les fleuves) */
  hlG=mapG.append('g').attr('id','hlg');

  /* Fleuves de fond — tous discrets */
  var bgG=mapG.append('g');
  Object.keys(RIV).forEach(function(k){ drawRiver(bgG,k,'rgba(30,90,200,.2)',isMobile?.6:.85); });

  /* Couches slides */
  for(var i=0;i<N;i++) buildLayer(i);

  /* Lancement */
  showSlide(0,true);
  document.getElementById('bplay').classList.add('on');
  sched();
  document.getElementById('map-wrap').addEventListener('click',function(e){
    if(e.target.closest('#dots,#player,.back,#legend')) return; next();
  });
}).catch(function(e){console.error(e)});
</script>
