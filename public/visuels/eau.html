<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L'eau : la prochaine grande fracture · Prisme</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#04080E;color:#fff;font-family:"DM Sans",sans-serif;-webkit-font-smoothing:antialiased}
:root{--gold:#C4A265;--water:#2A6B9A;--stress:#8B3A3A;--glacier:#7ABCE0}

#stage{position:fixed;top:0;left:0;width:100%;height:calc(100% - 52px);display:flex}
#map-wrap{position:relative;flex:1;overflow:hidden;background:#04080E}
#map-svg{position:absolute;top:0;left:0;width:100%;height:100%}
#vignette{position:absolute;inset:0;pointer-events:none;z-index:3;
  background:radial-gradient(ellipse at 50% 50%,transparent 45%,rgba(4,8,14,0.65) 100%)}

/* ══ PANEL ══ */
#panel{
  width:clamp(270px,25vw,318px);flex-shrink:0;
  background:linear-gradient(to right,transparent 0%,rgba(4,8,14,0.96) 15%);
  display:flex;flex-direction:column;justify-content:center;
  padding:48px 34px 48px 26px;position:relative;z-index:10;
}
#panel::before{content:'';position:absolute;left:0;top:12%;bottom:12%;width:1px;
  background:linear-gradient(to bottom,transparent,rgba(255,255,255,0.06),transparent)}
.p-year{font-size:8px;font-weight:500;letter-spacing:4px;text-transform:uppercase;color:rgba(255,255,255,0.18);margin-bottom:26px}
.p-tag{font-size:7px;font-weight:700;letter-spacing:5px;text-transform:uppercase;margin-bottom:14px;transition:color 0.6s}
.p-hook{font-family:"Playfair Display",serif;font-size:clamp(14px,1.5vw,18px);font-style:italic;font-weight:300;color:rgba(255,255,255,0.42);line-height:1.6;margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid rgba(255,255,255,0.06)}
.p-title{font-family:"Playfair Display",serif;font-size:clamp(22px,2.5vw,32px);font-weight:300;line-height:1.12;letter-spacing:-0.5px;color:#fff;margin-bottom:16px}
.p-title em{font-style:italic;transition:color 0.6s}
.p-body{font-size:12.5px;color:rgba(255,255,255,0.44);line-height:1.9}
.p-body strong{color:rgba(255,255,255,0.82);font-weight:500}
.p-stat{margin-top:24px;padding-top:22px;border-top:1px solid rgba(255,255,255,0.06);display:flex;flex-direction:column}
.p-n{font-family:"Playfair Display",serif;font-size:clamp(38px,4vw,52px);font-weight:300;line-height:1;display:block;white-space:nowrap;transition:color 0.6s}
.p-l{font-size:9.5px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.26);display:block;margin-top:10px;line-height:1.8}

/* ══ LÉGENDE ══ */
#legend{position:absolute;left:20px;top:50%;transform:translateY(-50%);z-index:20;display:flex;flex-direction:column;gap:10px}
.li{display:flex;align-items:center;gap:10px;cursor:default;padding:4px 8px;border-radius:4px}
.li-bar{width:22px;height:3px;border-radius:2px;flex-shrink:0}
.li-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.li-txt{font-size:10px;color:rgba(255,255,255,0.45);letter-spacing:0.3px}

/* ══ TOOLTIP ══ */
#tip{position:absolute;pointer-events:none;z-index:100;background:rgba(4,8,14,0.95);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:12px 16px;font-size:12px;color:#fff;opacity:0;transition:opacity 0.12s;min-width:160px;backdrop-filter:blur(16px);box-shadow:0 8px 40px rgba(0,0,0,0.6)}
#tip-name{font-weight:600;font-size:13px;margin-bottom:3px}
#tip-info{font-size:10px;letter-spacing:1px;text-transform:uppercase;opacity:0.5;margin-bottom:5px}
#tip-detail{font-size:11px;color:rgba(255,255,255,0.45);line-height:1.55}

/* ══ ANIMATIONS ══ */
@keyframes flow{to{stroke-dashoffset:-30}}
@keyframes pulse{0%,100%{opacity:0.08}50%{opacity:0.24}}
@keyframes ring{0%{r:4;opacity:0.85}100%{r:24;opacity:0}}
@keyframes glacierMelt{0%,100%{opacity:0.55}50%{opacity:0.85}}
@keyframes stressWave{0%,100%{opacity:0.06}50%{opacity:0.18}}
.rf{stroke-dasharray:10 7;animation:flow 4s linear infinite}
.zp{animation:pulse 3s ease-in-out infinite}
.pr{animation:ring 2.4s ease-out infinite}
.gm{animation:glacierMelt 2.5s ease-in-out infinite}
.sw{animation:stressWave 3.5s ease-in-out infinite}

/* ══ PLAYER ══ */
#player{position:fixed;bottom:0;left:0;right:0;height:52px;z-index:200;display:flex;flex-direction:column;background:rgba(4,8,14,0.98);border-top:1px solid rgba(255,255,255,0.06)}
#prog-bar{width:100%;height:2px;background:rgba(255,255,255,0.06);cursor:pointer}
#prog-fill{height:100%;background:var(--water);width:0%;transition:width 0.1s linear}
#ctrl{flex:1;display:flex;align-items:center;justify-content:center;padding:0 20px;position:relative}
#dots{position:absolute;left:20px;display:flex;gap:6px;align-items:center}
.dot{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,0.15);cursor:pointer;transition:all .2s}
.dot.on{background:var(--water);transform:scale(1.5)}
.cbtn{width:36px;height:36px;border:none;background:none;color:rgba(255,255,255,0.38);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:color .2s;padding:0;margin:0 4px}
.cbtn:hover{color:var(--water)}
.cbtn svg{width:18px;height:18px;fill:currentColor}
#bplay .ip{display:block}#bplay .ipa{display:none}
#bplay.on .ip{display:none}#bplay.on .ipa{display:block}
#bplay{width:42px;height:42px;border-radius:50%;background:rgba(42,107,154,0.15);color:var(--water);border:1px solid rgba(42,107,154,0.3)}
#cnt{position:absolute;right:20px;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.2)}
#wm{position:fixed;bottom:74px;left:20px;z-index:50;pointer-events:none;font-size:8px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:rgba(196,162,101,0.32)}
#wm span{color:rgba(196,162,101,0.16)}
.back{position:fixed;top:20px;left:20px;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.2);text-decoration:none;z-index:300;transition:color .2s}
.back:hover{color:var(--gold)}

/* ══ MOBILE ══ */
@media(max-width:680px){
  #stage{flex-direction:column}
  #map-wrap{flex:0 0 50vh;overflow:hidden}
  #panel{width:100%;flex:1;background:rgba(4,8,14,0.97);padding:14px 20px;justify-content:flex-start;overflow-y:auto;border-top:1px solid rgba(255,255,255,0.07)}
  #panel::before{display:none}
  .p-year{margin-bottom:10px}
  .p-hook{font-size:12px;margin-bottom:12px;padding-bottom:12px}
  .p-title{font-size:17px;margin-bottom:8px}
  .p-body{font-size:11.5px}
  .p-stat{margin-top:10px;padding-top:10px;flex-direction:row;align-items:baseline;gap:10px}
  .p-n{font-size:28px}.p-l{margin-top:0;font-size:8.5px}
  #legend{display:none}
}
</style>
</head>
<body>
<a class="back" href="/">← Prisme</a>
<div id="wm">PRISME<span>.FR</span></div>

<div id="stage">
<div id="map-wrap">
  <svg id="map-svg"></svg>
  <div id="vignette"></div>
  <div id="legend"></div>
  <div id="tip"><div id="tip-name"></div><div id="tip-info"></div><div id="tip-detail"></div></div>
</div>

<div id="panel">
  <div class="p-year">En 2026</div>
  <div id="pTag" class="p-tag"></div>
  <div id="pHook" class="p-hook"></div>
  <h2 id="pTitle" class="p-title"></h2>
  <div id="pBody" class="p-body"></div>
  <div class="p-stat">
    <span id="pN" class="p-n"></span>
    <span id="pL" class="p-l"></span>
  </div>
</div>
</div>

<div id="player">
  <div id="prog-bar" onclick="seekClick(event)"><div id="prog-fill"></div></div>
  <div id="ctrl">
    <div id="dots"></div>
    <button class="cbtn" onclick="prev()"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg></button>
    <button class="cbtn" id="bplay" onclick="togglePlay()"><svg class="ip" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg><svg class="ipa" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg></button>
    <button class="cbtn" onclick="next()"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
    <span id="cnt">1 / 5</span>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script>
/* ══ DIMENSIONS ══ */
var wrap=document.getElementById('map-wrap');
var mapW=wrap.offsetWidth||window.innerWidth;
var mapH=wrap.offsetHeight||(window.innerHeight-52);
var isMobile=window.innerWidth<680;
var svg=d3.select('#map-svg').attr('width',mapW).attr('height',mapH);
var proj=d3.geoNaturalEarth1().scale(mapW/6.0).translate([mapW*0.48,mapH*0.535]);
var gp=d3.geoPath().projection(proj);
var P=function(lon,lat){var r=proj([lon,lat]);return r||[0,0]};

/* Courbe fluide Catmull-Rom */
function smoothPath(coords){
  var pts=coords.map(function(c){return P(c[0],c[1])}).filter(function(p){return p[0]>0&&p[1]>0});
  if(pts.length<2) return null;
  return d3.line().x(function(p){return p[0]}).y(function(p){return p[1]}).curve(d3.curveCatmullRom.alpha(0.5))(pts);
}

/* ══ DEFS ══ */
var defs=svg.append('defs');
function addGlow(id,b){
  var f=defs.append('filter').attr('id',id).attr('x','-80%').attr('y','-80%').attr('width','260%').attr('height','260%');
  f.append('feGaussianBlur').attr('stdDeviation',b).attr('result','b');
  var m=f.append('feMerge');m.append('feMergeNode').attr('in','b');m.append('feMergeNode').attr('in','SourceGraphic');
}
addGlow('gw',3);addGlow('gr',4);addGlow('gb',3);addGlow('gs',2);

/* ══ CHAPITRES ══ */
var CHS=[
  {tag:'I · Vue mondiale · En 2026',
   hook:'L\'eau n\'est pas rare en moyenne. Elle est mal distribuee. Et cette distribution est une question politique.',
   title:'La grande <em>fracture hydrique</em>',
   body:'4 milliards de personnes subissent une penurie d\'eau au moins un mois par an. 310 bassins fluviaux traversent des frontieres internationales. L\'eau, bien naturel universel, est devenue l\'enjeu geopolitique majeur du siecle.',
   n:'310',l:'bassins fluviaux\ntransfrontaliers dans le monde',c:'#4A9AC4',
   layer:'l0'},
  {tag:'II · Himalaya · En 2026',
   hook:'La Chine controle les sources de l\'Indus, du Gange, du Mekong et du Brahmapoutre. Soit l\'eau de 2 milliards de personnes.',
   title:'L\'empire <em>hydraulique chinois</em>',
   body:'Les glaciers himalayens perdent leur masse 10 fois plus vite qu\'au debut du XXe siecle. La Chine a bati <strong>11 barrages</strong> sur le Mekong superieur. En 2020, une secheresse severe en Thailande et au Cambodge coincidait avec des retenues chinoises pleines.',
   n:'2 Mds',l:'de personnes dependent\ndes fleuves himalayens',c:'#7ABCE0',
   layer:'l1'},
  {tag:'III · Inde-Pakistan · En 2026',
   hook:'Le traite de l\'Indus a survecu a trois guerres. Il ne survivra peut-etre pas au changement climatique.',
   title:'L\'eau entre <em>deux bombes atomiques</em>',
   body:'Signe en 1960 sous l\'egide de la Banque mondiale, le traite de l\'Indus est le plus solide accord de partage des eaux au monde. Il montre aujourd\'hui ses limites face au rechauffement climatique et aux tensions entre <strong>deux puissances nucleaires</strong>.',
   n:'1960',l:'Traite de l\'Indus signe\ntoujours en vigueur — mais fragilise',c:'#C4924A',
   layer:'l2'},
  {tag:'IV · Nil · En 2026',
   hook:'L\'Egypte a vecu pendant des millenaires grace au Nil. L\'Ethiopie decide aujourd\'hui de son debit.',
   title:'Le barrage <em>de la Renaissance</em>',
   body:'Le Grand Barrage de la Renaissance ethiopien retient le Nil Bleu, source de <strong>85% de l\'eau egyptienne</strong>. Le Caire menace, negocie, echoue. Khartoum arbitre. Le premier grand conflit pour l\'eau du XXIe siecle se joue ici.',
   n:'85%',l:'du debit du Nil provient\nde l\'Ethiopie — en aval, l\'Egypte',c:'#8B3A3A',
   layer:'l3'},
  {tag:'V · Moyen-Orient · En 2026',
   hook:'Les prochaines guerres ne se feront pas pour le petrole, mais pour l\'eau. — Boutros Boutros-Ghali, 1985',
   title:'La ou l\'eau vaut <em>plus que le petrole</em>',
   body:'La Turquie controle les sources du Tigre et de l\'Euphrate, dont depend l\'agriculture irakienne. La region MENA utilise <strong>6 fois plus d\'eau</strong> qu\'elle n\'en recoit par les pluies. Les aquiferes fossiles s\'epuisent. Le point de rupture approche.',
   n:'6x',l:'plus d\'eau utilisee\nque recue par precipitation',c:'#A85028',
   layer:'l4'},
];

/* ══ FLEUVES — coordonnées réelles ══ */
var RIVERS = {
  mekong:  [[97,32],[100,22],[102,16],[104,12],[105,11],[106,10]],
  indus:   [[76,35],[73,32],[70,28],[67,25],[67,23]],
  gange:   [[80,31],[82,28],[84,26],[88,24],[90,23]],
  brahma:  [[92,30],[90,27],[89,26],[90,25],[91,24]],
  nile:    [[37,14],[35,16],[33,20],[32,26],[31,30],[30,31]],
  nil_bleu:[[38,9],[38,11],[37,14]],
  tigre:   [[38,38],[40,37],[43,35],[44,33],[47,31],[48,30]],
  euphrate:[[38,37],[39,36],[40,35],[41,34],[43,33],[45,32],[47,31],[48,30]],
  jordan:  [[36,33],[35,32],[35,31]],
  amu:     [[68,38],[63,40],[60,41]],
  syr:     [[72,42],[66,41],[62,40]],
};

/* ══ BASSINS TRANSFRONTALIERS — zones de tension ══ */
var BASINS = [
  {id:'himalaya',  cx:88, cy:30, r:isMobile?55:80,  col:'rgba(122,188,224,0.18)', label:'Himalaya',    stroke:'rgba(122,188,224,0.5)'},
  {id:'nil',       cx:35, cy:20, r:isMobile?40:58,  col:'rgba(196,146,74,0.15)',  label:'Bassin du Nil',stroke:'rgba(196,146,74,0.45)'},
  {id:'mena',      cx:44, cy:32, r:isMobile?45:65,  col:'rgba(139,58,40,0.14)',   label:'MENA',         stroke:'rgba(200,100,60,0.4)'},
  {id:'indus',     cx:70, cy:28, r:isMobile?30:44,  col:'rgba(196,162,101,0.13)', label:'Indus',        stroke:'rgba(196,162,101,0.38)'},
];

/* ══ POINTS DE TENSION ══ */
var TENSIONS = [
  {lon:35,  lat:11,  label:'Barrage Renaissance',  detail:'85% eau egyptienne retenue',  col:'#8B3A3A', layer:'l3'},
  {lon:45,  lat:36,  label:'Tigre-Euphrate',        detail:'Turquie vs Irak/Syrie',       col:'#A85028', layer:'l4'},
  {lon:35,  lat:31,  label:'Jourdain',              detail:'5 Etats, 1 fleuve epuise',    col:'#A85028', layer:'l4'},
  {lon:100, lat:20,  label:'Mekong',                detail:'11 barrages chinois en amont',col:'#7ABCE0', layer:'l1'},
  {lon:71,  lat:30,  label:'Traite de l\'Indus',    detail:'Inde-Pakistan : accord fragile',col:'#C4924A',layer:'l2'},
];

/* ══ BUILD MAP ══ */
var layers={};
setTimeout(function(){initPlayer()},50);

d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(function(world){
  /* Fond */
  svg.append('rect').attr('width',mapW).attr('height',mapH).attr('fill','#04080E');
  svg.append('path').datum({type:'Sphere'}).attr('d',gp).attr('fill','#060B16');
  /* Grille */
  svg.append('path').datum(d3.geoGraticule()()).attr('d',gp).attr('fill','none').attr('stroke','rgba(255,255,255,0.035)').attr('stroke-width',0.4);
  /* Equateur */
  svg.append('path').datum({type:'LineString',coordinates:[[-180,0],[180,0]]}).attr('d',gp).attr('fill','none').attr('stroke','rgba(255,255,255,0.08)').attr('stroke-width',0.6);

  /* Pays */
  var features=topojson.feature(world,world.objects.countries).features;
  svg.append('g').selectAll('path').data(features).join('path').attr('d',gp).attr('fill','#0B1520').attr('stroke','none');
  /* Frontières */
  svg.append('path').datum(topojson.mesh(world,world.objects.countries,function(a,b){return a!==b})).attr('d',gp).attr('fill','none').attr('stroke','rgba(255,255,255,0.08)').attr('stroke-width',0.4);
  /* Contour */
  svg.append('path').datum({type:'Sphere'}).attr('d',gp).attr('fill','none').attr('stroke','rgba(255,255,255,0.1)').attr('stroke-width',0.8);

  /* Labels oceans */
  [[-35,18,'ATLANTIQUE',isMobile?8:11],[-148,3,'PACIFIQUE',isMobile?8:12],[72,-22,'INDIEN',isMobile?8:10]]
    .forEach(function(l){var pt=P(l[0],l[1]);svg.append('text').attr('x',pt[0]).attr('y',pt[1]).attr('text-anchor','middle').attr('font-family','"Playfair Display",serif').attr('font-size',l[3]).attr('font-style','italic').attr('fill','rgba(255,255,255,0.07)').attr('letter-spacing',4).attr('pointer-events','none').text(l[2])});

  buildL0(); buildL1(); buildL2(); buildL3(); buildL4();
  showSlide(0,true);
});

/* ══ HELPER : trace un fleuve ══ */
function drawRiver(g, coords, col, w, delay){
  var d=smoothPath(coords); if(!d) return;
  /* Halo */
  g.append('path').attr('d',d).attr('fill','none').attr('stroke',col.replace(/[\d.]+\)$/,'0.06)')).attr('stroke-width',w*4).attr('stroke-linecap','round');
  /* Corps */
  g.append('path').attr('d',d).attr('fill','none').attr('stroke',col.replace(/[\d.]+\)$/,'0.25)')).attr('stroke-width',w*1.8).attr('stroke-linecap','round');
  /* Flux animé */
  g.append('path').attr('d',d).attr('fill','none').attr('stroke',col).attr('stroke-width',w).attr('stroke-linecap','round').attr('class','rf').style('animation-delay',(delay||0)+'s');
}

/* ══ HELPER : point de tension ══ */
function drawTension(g, lon, lat, col, delay){
  var pt=P(lon,lat); var x=pt[0],y=pt[1]; if(!x) return;
  var wg=g.append('g').attr('transform','translate('+x+','+y+')');
  for(var r=0;r<2;r++) wg.append('circle').attr('r',1).attr('fill','none').attr('stroke',col).attr('stroke-width',1.8).attr('class','pr').style('animation-delay',((delay||0)+r*0.8)+'s');
  wg.append('circle').attr('r',5).attr('fill',col).attr('filter','url(#gr)');
  wg.append('circle').attr('r',2.5).attr('fill','rgba(255,255,255,0.92)');
}

/* ══ LAYER 0 — Vue mondiale ══ */
function buildL0(){
  var g=svg.append('g').attr('id','l0').attr('opacity',0).style('transition','opacity 1.2s');
  layers.l0=g;

  /* Tous les bassins en fond subtil */
  BASINS.forEach(function(b){
    var pt=P(b.cx,b.cy);
    g.append('circle').attr('cx',pt[0]).attr('cy',pt[1]).attr('r',b.r).attr('fill',b.col).attr('stroke',b.stroke).attr('stroke-width',1.2).attr('stroke-dasharray','5 3').attr('class','sw');
  });

  /* Tous les grands fleuves */
  var rCols={'mekong':'rgba(122,188,224,0.7)','indus':'rgba(196,162,101,0.65)','gange':'rgba(122,188,224,0.65)','brahma':'rgba(122,188,224,0.6)','nile':'rgba(196,146,74,0.65)','nil_bleu':'rgba(139,100,40,0.6)','tigre':'rgba(168,80,40,0.6)','euphrate':'rgba(168,80,40,0.55)','amu':'rgba(122,188,224,0.5)','syr':'rgba(122,188,224,0.45)'};
  Object.keys(RIVERS).forEach(function(k,i){drawRiver(g,RIVERS[k],rCols[k]||'rgba(100,160,200,0.6)',isMobile?1:1.6,i*0.3)});

  /* Stat : 310 bassins label */
  var world_lbl=P(-20,52);
  g.append('text').attr('x',world_lbl[0]).attr('y',world_lbl[1]).attr('text-anchor','middle').attr('font-family','"Playfair Display",serif').attr('font-size',isMobile?11:14).attr('font-weight','300').attr('fill','rgba(74,154,196,0.65)').attr('pointer-events','none').text('310 bassins transfrontaliers');
  g.append('text').attr('x',world_lbl[0]).attr('y',world_lbl[1]+14).attr('text-anchor','middle').attr('font-family','"DM Sans",sans-serif').attr('font-size',isMobile?7:8.5).attr('font-weight','300').attr('fill','rgba(74,154,196,0.4)').attr('letter-spacing',1).attr('pointer-events','none').text('153 Etats impliques');
}

/* ══ LAYER 1 — Himalaya ══ */
function buildL1(){
  var g=svg.append('g').attr('id','l1').attr('opacity',0).style('transition','opacity 1.2s');
  layers.l1=g;

  /* Zone himalayenne */
  var himPt=P(88,33);

var LEGS=[
  [{t:'line',c:'rgba(122,188,224,0.7)',l:'Fleuve transfrontalier'},{t:'zone',c:'rgba(74,120,160,0.2)',bc:'rgba(74,154,196,0.4)',l:'Bassin en tension'}],
  [{t:'line',c:'rgba(122,188,224,0.8)',l:'Fleuve himalayen'},{t:'rect',c:'rgba(139,58,58,0.85)',l:'Barrage chinois (Mekong)'},{t:'dot',c:'rgba(122,188,224,0.85)',l:'Point de tension'}],
  [{t:'line',c:'rgba(196,162,101,0.75)',l:'Fleuve Indus'},{t:'zone',c:'rgba(196,146,74,0.15)',bc:'rgba(196,146,74,0.35)',l:'Zone Inde-Pakistan'},{t:'dash',c:'rgba(196,146,74,0.4)',l:'Frontiere disputee'}],
  [{t:'line',c:'rgba(196,146,74,0.72)',l:'Nil — fleuve principal'},{t:'line',c:'rgba(139,58,40,0.8)',l:'Nil Bleu — 85% du debit'},{t:'rect',c:'rgba(139,58,40,0.9)',l:'Barrage de la Renaissance'}],
  [{t:'line',c:'rgba(168,80,40,0.72)',l:'Tigre et Euphrate'},{t:'dot',c:'rgba(168,80,40,0.88)',l:'Point de rupture'},{t:'zone',c:'rgba(168,80,40,0.08)',bc:'rgba(168,80,40,0.28)',l:'Zone de stress hydrique'}],
];

function updateLegend(idx){
  var el=document.getElementById('legend');
  el.style.cssText='position:absolute;left:20px;bottom:26px;display:flex;flex-direction:column;gap:10px;z-index:20';
  var items=LEGS[idx]||[];
  el.innerHTML=items.map(function(item){
    var icon='';
    if(item.t==='dot') icon='<div style="width:10px;height:10px;border-radius:50%;background:'+item.c+';flex-shrink:0"></div>';
    else if(item.t==='line') icon='<div style="width:24px;height:2.5px;border-radius:2px;background:'+item.c+';flex-shrink:0"></div>';
    else if(item.t==='dash') icon='<div style="width:24px;height:0;border-top:2px dashed '+item.c+';flex-shrink:0"></div>';
    else if(item.t==='zone') icon='<div style="width:14px;height:10px;border-radius:2px;background:'+item.c+';border:1px dashed '+(item.bc||'#fff')+';flex-shrink:0"></div>';
    else if(item.t==='rect') icon='<div style="width:16px;height:7px;border-radius:1px;background:'+item.c+';flex-shrink:0"></div>';
    return '<div style="display:flex;align-items:center;gap:10px">'+icon+'<span style="font-size:10px;color:rgba(255,255,255,0.45);letter-spacing:0.3px">'+item.l+'</span></div>';
  }).join('');
}

/* ══ PLAYER ══ */
var N=5,cur=0,tmr=null,paused=false,progRaf=null,progStart=0;
var DURS=[11000,11000,11000,11000,11000];
var dotsEl=document.getElementById('dots');
for(var i=0;i<N;i++){(function(idx){var d=document.createElement('div');d.className='dot';d.onclick=function(e){e.stopPropagation();goTo(idx)};dotsEl.appendChild(d)})(i)}

function updatePanel(idx){
  var ch=CHS[idx];
  document.getElementById('pTag').textContent=ch.tag;
  document.getElementById('pTag').style.color=ch.c;
  document.getElementById('pHook').textContent=ch.hook;
  document.getElementById('pTitle').innerHTML=ch.title;
  document.getElementById('pBody').innerHTML=ch.body;
  document.getElementById('pN').textContent=ch.n;
  document.getElementById('pN').style.color=ch.c;
  document.getElementById('pL').innerHTML=ch.l.replace(/\n/g,'<br>');
}
function updateLayers(idx){
  var order=['l0','l1','l2','l3','l4'];
  order.forEach(function(id){
    if(layers[id]) layers[id].style('opacity',id===CHS[idx].layer?'1':'0');
  });
  updateLegend(idx);
}
function startProg(){
  if(progRaf)cancelAnimationFrame(progRaf);
  progStart=Date.now();var dur=DURS[cur];
  (function tick(){var p=Math.min((Date.now()-progStart)/dur,1);document.getElementById('prog-fill').style.width=(p*100)+'%';if(p<1&&!paused)progRaf=requestAnimationFrame(tick)})();
}
function seekClick(e){var r=e.currentTarget.getBoundingClientRect();goTo(Math.max(0,Math.min(N-1,Math.round((e.clientX-r.left)/r.width*(N-1)))))}
function showSlide(idx,skipLayers){
  updatePanel(idx);
  if(!skipLayers)updateLayers(idx);
  document.querySelectorAll('.dot').forEach(function(d,i){d.classList.toggle('on',i===idx)});
  document.getElementById('cnt').textContent=(idx+1)+' / '+N;
  startProg();
}
function next(){if(tmr)clearTimeout(tmr);cur=cur<N-1?cur+1:0;showSlide(cur);if(!paused)schedule()}
function prev(){if(tmr)clearTimeout(tmr);cur=cur>0?cur-1:N-1;showSlide(cur);if(!paused)schedule()}
function schedule(){if(tmr)clearTimeout(tmr);if(!paused)tmr=setTimeout(next,DURS[cur])}
function goTo(idx){if(tmr)clearTimeout(tmr);cur=idx;showSlide(idx);if(!paused)schedule()}
function togglePlay(){
  paused=!paused;var btn=document.getElementById('bplay');
  if(paused){btn.classList.remove('on');if(tmr)clearTimeout(tmr);if(progRaf)cancelAnimationFrame(progRaf)}
  else{btn.classList.add('on');schedule();startProg()}
}
function initPlayer(){
  showSlide(0,false);
  document.getElementById('bplay').classList.add('on');
  schedule();
  document.getElementById('stage').addEventListener('click',function(e){
    if(e.target.closest('#dots,#player,.back,#legend,#panel'))return;next();
  });
}
</script>
