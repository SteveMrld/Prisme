<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L'eau : la prochaine grande fracture · Prisme</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;
  background:#F4F0E8;color:#1A1410;
  font-family:"DM Sans",sans-serif;-webkit-font-smoothing:antialiased}

/* ══ LAYOUT ══ */
#stage{position:fixed;top:0;left:0;width:100%;height:calc(100% - 52px);display:flex;flex-direction:column}
#map-wrap{position:relative;flex:1;overflow:hidden}
#map-svg{position:absolute;top:0;left:0;width:100%;height:100%}

/* ══ BANDE TEXTE EN BAS — style éditorial papier ══ */
#textband{
  flex-shrink:0;
  height:clamp(150px,24vh,200px);
  background:#F4F0E8;
  border-top:2px solid #1A1410;
  display:flex;
  position:relative;z-index:10;
}
#text-inner{
  flex:1;padding:18px 44px 12px;
  display:flex;flex-direction:column;gap:5px;
  border-right:1px solid rgba(26,20,16,0.12);
}
.p-tag{
  font-size:7px;font-weight:700;letter-spacing:5px;
  text-transform:uppercase;color:rgba(26,20,16,0.35);
  transition:color 0.5s;
}
.p-hook{
  font-family:"Playfair Display",serif;
  font-size:clamp(13px,1.4vw,17px);font-style:italic;font-weight:300;
  color:rgba(26,20,16,0.5);line-height:1.45;
}
.p-title{
  font-family:"Playfair Display",serif;
  font-size:clamp(18px,2vw,26px);font-weight:400;
  line-height:1.1;letter-spacing:-0.3px;color:#1A1410;
}
.p-title em{font-style:italic;transition:color 0.5s}
.p-body{font-size:11.5px;color:rgba(26,20,16,0.55);line-height:1.65;max-width:520px}
.p-body strong{color:#1A1410;font-weight:600}

/* Stat à droite */
#stat-block{
  flex-shrink:0;width:clamp(130px,13vw,168px);
  display:flex;flex-direction:column;justify-content:center;
  padding:16px 28px 16px 20px;
}
#pN{
  font-family:"Playfair Display",serif;
  font-size:clamp(30px,3.2vw,44px);font-weight:300;
  line-height:1;color:#1A3A5A;transition:color 0.5s;
  border-bottom:1px solid rgba(26,20,16,0.12);
  padding-bottom:10px;
}
#pL{
  font-size:8px;letter-spacing:1.2px;text-transform:uppercase;
  color:rgba(26,20,16,0.4);line-height:1.8;margin-top:10px;
}

/* ══ PLAYER — style épuré ══ */
#player{position:fixed;bottom:0;left:0;right:0;height:52px;z-index:200;
  display:flex;flex-direction:column;background:#1A1410;border-top:2px solid #1A1410}
#prog-bar{width:100%;height:2px;background:rgba(255,255,255,0.1);cursor:pointer}
#prog-fill{height:100%;background:#4A8AB0;width:0%;transition:width 0.1s linear}
#ctrl{flex:1;display:flex;align-items:center;justify-content:center;padding:0 20px;position:relative}
#dots{position:absolute;left:20px;display:flex;gap:7px;align-items:center}
.dot{width:5px;height:2px;border-radius:1px;background:rgba(255,255,255,0.2);cursor:pointer;transition:all .2s}
.dot.on{background:#4A8AB0;width:12px}
.cbtn{width:36px;height:36px;border:none;background:none;color:rgba(255,255,255,0.4);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:color .2s;padding:0;margin:0 4px}
.cbtn:hover{color:#fff}
.cbtn svg{width:18px;height:18px;fill:currentColor}
#bplay .ip{display:block}#bplay .ipa{display:none}
#bplay.on .ip{display:none}#bplay.on .ipa{display:block}
#bplay{width:42px;height:42px;border-radius:0;background:rgba(255,255,255,0.06);color:#fff;border:1px solid rgba(255,255,255,0.15)}
#cnt{position:absolute;right:20px;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.2)}
#wm{position:fixed;bottom:74px;right:20px;z-index:50;pointer-events:none;font-size:8px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:rgba(26,20,16,0.22)}
#wm span{color:rgba(26,20,16,0.12)}
.back{position:fixed;top:20px;left:20px;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:rgba(26,20,16,0.3);text-decoration:none;z-index:300}
.back:hover{color:#1A1410}

/* ══ LÉGENDE ══ */
#legend{position:absolute;right:20px;top:20px;z-index:20;display:flex;flex-direction:column;gap:9px;background:rgba(244,240,232,0.88);padding:12px 14px;border:1px solid rgba(26,20,16,0.1)}
.li{display:flex;align-items:center;gap:9px}
.li-txt{font-size:9px;color:rgba(26,20,16,0.5);letter-spacing:0.3px}

/* ══ ANIMATIONS ══ */
@keyframes riverFlow{to{stroke-dashoffset:-28}}
@keyframes stressPulse{0%,100%{opacity:0.08}50%{opacity:0.2}}
@keyframes dotRing{0%{r:4;opacity:0.7}100%{r:20;opacity:0}}
@keyframes barrageAnim{0%,100%{opacity:0.85}50%{opacity:1}}
.rf{stroke-dasharray:10 8;animation:riverFlow 4.5s linear infinite}
.rfs{stroke-dasharray:7 10;animation:riverFlow 7s linear infinite}
.sp{animation:stressPulse 4s ease-in-out infinite}
.pr{animation:dotRing 2.6s ease-out infinite}
.ba{animation:barrageAnim 2s ease-in-out infinite}

/* ══ MOBILE ══ */
@media(max-width:680px){
  #textband{height:auto;min-height:140px}
  #text-inner{padding:12px 18px 10px}
  .p-hook{font-size:12px}
  .p-title{font-size:16px}
  #stat-block{width:110px;padding:12px 16px}
  #pN{font-size:26px}
  #legend{right:10px;top:10px;padding:8px 10px}
  .li-txt{font-size:8px}
}
</style>
</head>
<body>
<a class="back" href="/">← Prisme</a>
<div id="wm">PRISME<span>.FR</span></div>

<div id="stage">
  <div id="map-wrap">
    <svg id="map-svg"></svg>
    <div id="legend"></div>
  </div>

  <div id="textband">
    <div id="text-inner">
      <div id="pTag" class="p-tag"></div>
      <div id="pHook" class="p-hook"></div>
      <h2 id="pTitle" class="p-title"></h2>
    </div>
    <div id="stat-block">
      <span id="pN"></span>
      <span id="pL"></span>
    </div>
  </div>
</div>

<div id="player">
  <div id="prog-bar" onclick="seekClick(event)"><div id="prog-fill"></div></div>
  <div id="ctrl">
    <div id="dots"></div>
    <button class="cbtn" onclick="prev()"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg></button>
    <button class="cbtn" id="bplay" onclick="togglePlay()"><svg class="ip" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg><svg class="ipa" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg></button>
    <button class="cbtn" onclick="next()"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
    <span id="cnt">1 / 5</span>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script>
var wrap=document.getElementById('map-wrap');
var mapW=wrap.offsetWidth||window.innerWidth;
var mapH=wrap.offsetHeight||(window.innerHeight*0.7);
var isMobile=window.innerWidth<680;
var svg=d3.select('#map-svg').attr('width',mapW).attr('height',mapH);
var proj=d3.geoNaturalEarth1().scale(mapW/5.8).translate([mapW*0.5,mapH*0.52]);
var gp=d3.geoPath().projection(proj);
var P=function(lon,lat){var r=proj([lon,lat]);return r||[0,0]};

function smoothPath(coords){
  var pts=coords.map(function(c){return P(c[0],c[1])}).filter(function(p){return p[0]>5&&p[1]>5});
  if(pts.length<2) return null;
  return d3.line().x(function(p){return p[0]}).y(function(p){return p[1]}).curve(d3.curveCatmullRom.alpha(0.5))(pts);
}

/* ══ CHAPITRES ══ */
var CHS=[
  {tag:'I · Vue mondiale · 2026',
   hook:'L\'eau n\'est pas rare en moyenne. Elle est mal distribuee. Et cette distribution est une question politique.',
   title:'La grande <em>fracture hydrique</em>',
   n:'310',l:'bassins fluviaux\ntransfrontaliers',
   c:'#1A3A5A',layer:'l0'},
  {tag:'II · Himalaya · Empire hydraulique',
   hook:'La Chine controle les sources de l\'Indus, du Gange, du Mekong. Soit l\'eau de 2 milliards de personnes.',
   title:'L\'empire <em>hydraulique chinois</em>',
   n:'2 Mds',l:'de personnes dependent\ndes fleuves himalayens',
   c:'#2A6A9A',layer:'l1'},
  {tag:'III · Inde-Pakistan · Nucleaire',
   hook:'Le traite de l\'Indus a survecu a trois guerres. Il ne survivra pas au changement climatique.',
   title:'L\'eau entre <em>deux bombes</em>',
   n:'1960',l:'Traite de l\'Indus\nfragilise par le climat',
   c:'#5A4020',layer:'l2'},
  {tag:'IV · Nil · Ethiopie vs Egypte',
   hook:'L\'Egypte a vecu grace au Nil depuis l\'Antiquite. L\'Ethiopie decide aujourd\'hui de son debit.',
   title:'Le barrage <em>de la Renaissance</em>',
   n:'85%',l:'de l\'eau egyptienne\ncontrôlee par l\'Ethiopie',
   c:'#3A5A2A',layer:'l3'},
  {tag:'V · Moyen-Orient · Rupture',
   hook:'Les prochaines guerres ne se feront pas pour le petrole, mais pour l\'eau.',
   title:'La ou l\'eau <em>vaut plus que le petrole</em>',
   n:'6×',l:'plus d\'eau utilisee\nque recue en precipitation',
   c:'#7A4A10',layer:'l4'},
];

/* ══ FLEUVES ══ */
var RIV={
  mekong:  [[97,32],[100,24],[102,18],[104,14],[105,12],[106,10]],
  indus:   [[76,35],[73,32],[71,28],[68,25],[67,23]],
  gange:   [[80,31],[83,28],[85,26],[88,24],[90,23]],
  brahma:  [[92,30],[90,27],[89,26],[90,24],[91,23]],
  nile:    [[37,14],[36,16],[34,20],[33,24],[32,27],[31,30],[30,31]],
  nil_bleu:[[38,8],[38,10],[37,13],[37,14]],
  tigre:   [[39,38],[41,37],[43,35],[45,33],[47,31],[48,30]],
  euphrate:[[38,37],[40,36],[42,35],[44,33],[46,32],[48,30]],
  jordan:  [[36,33],[35,32],[35,31],[35,30]],
};

var layers={};
setTimeout(function(){initPlayer()},50);

d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(function(world){

  /* ══ FOND PAPIER ══ */
  svg.append('rect').attr('width',mapW).attr('height',mapH).attr('fill','#F4F0E8');
  /* Ocean — bleu encre pâle */
  svg.append('path').datum({type:'Sphere'}).attr('d',gp).attr('fill','#D0E4F0');
  /* Grille légère */
  svg.append('path').datum(d3.geoGraticule()()).attr('d',gp).attr('fill','none').attr('stroke','rgba(26,20,16,0.06)').attr('stroke-width',0.4);

  var features=topojson.feature(world,world.objects.countries).features;

  /* Pays — teinte papier naturelle, légèrement chaude */
  svg.append('g').selectAll('path').data(features).join('path')
    .attr('d',gp)
    .attr('fill',function(d){
      /* Zones arides : teinte sable/ocre */
      var arid=[504,788,434,818,729,706,682,887,368,792,400,422,760,364];
      return arid.indexOf(+d.id)>-1 ? '#E8D8B0' : '#EDE8DC';
    })
    .attr('stroke','none');

  /* Frontières — trait fin encre */
  svg.append('path')
    .datum(topojson.mesh(world,world.objects.countries,function(a,b){return a!==b}))
    .attr('d',gp).attr('fill','none')
    .attr('stroke','rgba(26,20,16,0.18)').attr('stroke-width',0.4);

  /* Contour sphère */
  svg.append('path').datum({type:'Sphere'}).attr('d',gp)
    .attr('fill','none').attr('stroke','rgba(26,20,16,0.25)').attr('stroke-width',1);

  /* Labels océans — style cartographique classique */
  [[-35,15,'ATLANTIQUE',isMobile?7:10],[-148,3,'PACIFIQUE',isMobile?7:11],[72,-22,'INDIEN',isMobile?7:9]]
    .forEach(function(l){
      var pt=P(l[0],l[1]);
      svg.append('text').attr('x',pt[0]).attr('y',pt[1]).attr('text-anchor','middle')
        .attr('font-family','"Playfair Display",serif').attr('font-size',l[3]).attr('font-style','italic')
        .attr('fill','rgba(26,60,90,0.22)').attr('letter-spacing',4).attr('pointer-events','none').text(l[2]);
    });

  buildL0(); buildL1(); buildL2(); buildL3(); buildL4();
  showSlide(0,true);
});

/* ── Fleuve en bleu encre ── */
function river(g,coords,opacity,w,delay,fast){
  var d=smoothPath(coords); if(!d) return;
  /* Halo doux */
  g.append('path').attr('d',d).attr('fill','none')
    .attr('stroke','rgba(30,80,140,'+opacity*0.3+')').attr('stroke-width',w*3.5).attr('stroke-linecap','round');
  /* Corps */
  g.append('path').attr('d',d).attr('fill','none')
    .attr('stroke','rgba(30,80,140,'+opacity+')').attr('stroke-width',w*1.5).attr('stroke-linecap','round');
  /* Flux animé — éclair de surface */
  g.append('path').attr('d',d).attr('fill','none')
    .attr('stroke','rgba(80,150,220,'+(opacity*0.8)+')').attr('stroke-width',w*0.7).attr('stroke-linecap','round')
    .attr('class',fast?'rf':'rfs').style('animation-delay',(delay||0)+'s');
}

/* ── Point de tension encre ── */
function tension(g,lon,lat,col,delay){
  var pt=P(lon,lat); var x=pt[0],y=pt[1]; if(!x) return;
  var wg=g.append('g').attr('transform','translate('+x+','+y+')');
  for(var r=0;r<2;r++) wg.append('circle').attr('r',1).attr('fill','none').attr('stroke',col).attr('stroke-width',1.5).attr('class','pr').style('animation-delay',((delay||0)+r*0.8)+'s');
  wg.append('circle').attr('r',4.5).attr('fill',col);
  wg.append('circle').attr('r',2).attr('fill','rgba(244,240,232,0.95)');
}

/* ── Label sobre ── */
function lbl(g,lon,lat,text,col,size,anchor){
  var pt=P(lon,lat);
  g.append('text').attr('x',pt[0]).attr('y',pt[1]).attr('text-anchor',anchor||'middle')
    .attr('font-family','"DM Sans",sans-serif').attr('font-size',size||9).attr('font-weight','300')
    .attr('fill',col||'rgba(26,20,16,0.45)').attr('letter-spacing',0.5).attr('pointer-events','none').text(text);
}

/* ══ LAYER 0 — Vue mondiale ══ */
function buildL0(){
  var g=svg.append('g').attr('id','l0').attr('opacity',0).style('transition','opacity 1.2s');
  layers.l0=g;
  /* Zones de stress — teinte sable clair */
  [[44,25,isMobile?55:80],[88,28,isMobile?60:88],[35,17,isMobile?40:58]].forEach(function(z,i){
    var pt=P(z[0],z[1]);
    g.append('circle').attr('cx',pt[0]).attr('cy',pt[1]).attr('r',z[2])
      .attr('fill','rgba(180,140,60,0.12)').attr('stroke','rgba(140,100,30,0.25)').attr('stroke-width',0.8).attr('stroke-dasharray','4 3').attr('class','sp');
  });
  /* Tous les fleuves en bleu encre discret */
  Object.keys(RIV).forEach(function(k,i){river(g,RIV[k],0.45,isMobile?0.8:1.2,i*0.2,false)});
  lbl(g,-18,52,'4 milliards de personnes en penurie','rgba(26,20,16,0.45)',isMobile?7.5:9.5);
  lbl(g,-18,46,'au moins un mois par an','rgba(26,20,16,0.3)',isMobile?7:8.5);
}

/* ══ LAYER 1 — Himalaya ══ */
function buildL1(){
  var g=svg.append('g').attr('id','l1').attr('opacity',0).style('transition','opacity 1.2s');
  layers.l1=g;
  /* Zone himalayenne — teinte bleu glacé très pâle */
  var himPt=P(88,33);
  g.append('circle').attr('cx',himPt[0]).attr('cy',himPt[1]).attr('r',isMobile?55:82)
    .attr('fill','rgba(30,80,140,0.06)').attr('stroke','rgba(30,80,140,0.22)').attr('stroke-width',0.8).attr('stroke-dasharray','4 3').attr('class','sp');
  /* Fleuves himalayens — bleu encre plus soutenu */
  [['mekong',0.75],['indus',0.65],['gange',0.7],['brahma',0.65]].forEach(function(r,i){
    river(g,RIV[r[0]],r[1],isMobile?1:1.5,i*0.3,true);
  });
  /* Barrages — petits rectangles noirs */
  [[99,24],[100,21],[101,19],[102,17],[103,15]].forEach(function(c){
    var pt=P(c[0],c[1]);
    g.append('rect').attr('x',pt[0]-4).attr('y',pt[1]-1.5).attr('width',8).attr('height',3).attr('rx',0).attr('fill','#1A1410').attr('class','ba');
  });
  lbl(g,97,37,'Empire hydraulique chinois','rgba(26,20,16,0.45)',isMobile?7.5:9.5);
  lbl(g,107,9,'Mekong','rgba(30,80,140,0.5)',isMobile?7:8,'start');
  lbl(g,65,21,'Indus','rgba(30,80,140,0.5)',isMobile?7:8,'end');
  tension(g,100,20,'#1A3A5A',0);
  var tPt=P(100,20);
  lbl(g,112,20,'11 barrages','rgba(26,20,16,0.5)',isMobile?7.5:9,'start');
}

/* ══ LAYER 2 — Inde-Pakistan ══ */
function buildL2(){
  var g=svg.append('g').attr('id','l2').attr('opacity',0).style('transition','opacity 1.2s');
  layers.l2=g;
  /* Zone Indus — teinte ocre */
  var inPt=P(70,28);
  g.append('circle').attr('cx',inPt[0]).attr('cy',inPt[1]).attr('r',isMobile?45:65)
    .attr('fill','rgba(140,100,30,0.07)').attr('stroke','rgba(120,80,20,0.2)').attr('stroke-width',0.8).attr('stroke-dasharray','4 3').attr('class','sp');
  river(g,RIV.indus,0.75,isMobile?1.2:1.8,0,true);
  /* Frontiere pointillés */
  var brd=smoothPath([[73,37],[74,34],[74,32],[72,30],[70,28],[68,25],[67,23]]);
  if(brd) g.append('path').attr('d',brd).attr('fill','none').attr('stroke','rgba(26,20,16,0.25)').attr('stroke-width',0.8).attr('stroke-dasharray','3 4');
  lbl(g,78,22,'INDE','rgba(26,20,16,0.35)',isMobile?7:9);
  lbl(g,69,30,'PAKISTAN','rgba(26,20,16,0.35)',isMobile?7:9);
  tension(g,71,30,'#5A3A10',0);
  var tPt=P(71,30);
  lbl(g,tPt[0]+12,tPt[1]-2,'Traite de l\'Indus','rgba(26,20,16,0.55)',isMobile?7.5:9,'start');
  lbl(g,tPt[0]+12,tPt[1]+10,'1960 — accord fragilise','rgba(26,20,16,0.3)',isMobile?7:8,'start');
}

/* ══ LAYER 3 — Nil ══ */
function buildL3(){
  var g=svg.append('g').attr('id','l3').attr('opacity',0).style('transition','opacity 1.2s');
  layers.l3=g;
  var nilPt=P(35,20);
  g.append('circle').attr('cx',nilPt[0]).attr('cy',nilPt[1]).attr('r',isMobile?50:72)
    .attr('fill','rgba(60,100,40,0.06)').attr('stroke','rgba(60,100,40,0.18)').attr('stroke-width',0.8).attr('stroke-dasharray','4 3').attr('class','sp');
  river(g,RIV.nile,0.7,isMobile?1.2:1.8,0,true);
  river(g,RIV.nil_bleu,0.65,isMobile?1:1.5,0.2,true);
  /* Barrage — rectangle plein */
  var bPt=P(35,11);
  g.append('rect').attr('x',bPt[0]-10).attr('y',bPt[1]-3).attr('width',20).attr('height',6).attr('rx',0).attr('fill','#1A1410').attr('class','ba');
  lbl(g,49,11,'Barrage de la Renaissance','rgba(26,20,16,0.55)',isMobile?7.5:9.5,'start');
  lbl(g,49,19,'Ethiopie — 85% eau egyptienne','rgba(26,20,16,0.35)',isMobile?7:8.5,'start');
  lbl(g,30,27,'EGYPTE','rgba(26,20,16,0.3)',isMobile?7:8.5);
  lbl(g,39,9,'ETHIOPIE','rgba(26,20,16,0.35)',isMobile?7:8.5);
  /* Fleche */
  var arr=smoothPath([[35,11],[34,15],[33,20],[32,25],[31,29]]);
  if(arr) g.append('path').attr('d',arr).attr('fill','none').attr('stroke','rgba(26,20,16,0.18)').attr('stroke-width',0.7).attr('stroke-dasharray','3 4');
}

/* ══ LAYER 4 — Moyen-Orient ══ */
function buildL4(){
  var g=svg.append('g').attr('id','l4').attr('opacity',0).style('transition','opacity 1.2s');
  layers.l4=g;
  var menaPt=P(44,28);
  g.append('circle').attr('cx',menaPt[0]).attr('cy',menaPt[1]).attr('r',isMobile?58:85)
    .attr('fill','rgba(160,110,30,0.08)').attr('stroke','rgba(140,90,20,0.2)').attr('stroke-width',0.8).attr('stroke-dasharray','4 3').attr('class','sp');
  river(g,RIV.tigre,0.65,isMobile?1:1.5,0,true);
  river(g,RIV.euphrate,0.6,isMobile?1:1.4,0.4,true);
  river(g,RIV.jordan,0.5,isMobile?0.7:1,0.7,false);
  tension(g,38,37,'#5A3A10',0);
  tension(g,35,31,'#7A4A10',1);
  lbl(g,36,37,'Turquie — sources','rgba(26,20,16,0.5)',isMobile?7.5:9,'end');
  lbl(g,44,24,'ZONE ARIDE','rgba(26,20,16,0.3)',isMobile?7:8.5);
  lbl(g,42,33,'Euphrate','rgba(30,80,140,0.45)',isMobile?7:8,'start');
  lbl(g,47,34,'Tigre','rgba(30,80,140,0.4)',isMobile?7:8,'start');
}

/* ══ LÉGENDES ══ */
var LEGS=[
  [{sym:'<div style="width:22px;height:2px;background:rgba(30,80,140,0.55);border-radius:1px"></div>',l:'Fleuve transfrontalier'},{sym:'<div style="width:13px;height:9px;background:rgba(180,140,60,0.15);border:1px dashed rgba(140,100,30,0.3)"></div>',l:'Zone de stress hydrique'}],
  [{sym:'<div style="width:22px;height:2px;background:rgba(30,80,140,0.75);border-radius:1px"></div>',l:'Fleuve himalayen'},{sym:'<div style="width:14px;height:4px;background:#1A1410"></div>',l:'Barrage chinois (Mekong)'}],
  [{sym:'<div style="width:22px;height:2px;background:rgba(30,80,140,0.75);border-radius:1px"></div>',l:'Fleuve Indus'},{sym:'<div style="width:22px;height:0;border-top:1px dashed rgba(26,20,16,0.3)"></div>',l:'Frontiere disputee'}],
  [{sym:'<div style="width:22px;height:2px;background:rgba(30,80,140,0.7);border-radius:1px"></div>',l:'Nil'},{sym:'<div style="width:22px;height:2px;background:rgba(30,80,140,0.6);border-radius:1px"></div>',l:'Nil Bleu (Ethiopie)'},{sym:'<div style="width:14px;height:5px;background:#1A1410"></div>',l:'Barrage Renaissance'}],
  [{sym:'<div style="width:22px;height:2px;background:rgba(30,80,140,0.65);border-radius:1px"></div>',l:'Tigre / Euphrate'},{sym:'<div style="width:9px;height:9px;border-radius:50%;background:#5A3A10"></div>',l:'Zone de rupture'}],
];

function updateLegend(idx){
  var el=document.getElementById('legend');
  el.innerHTML=LEGS[idx].map(function(item){
    return '<div class="li">'+item.sym+'<span class="li-txt">'+item.l+'</span></div>';
  }).join('');
}

/* ══ PLAYER ══ */
var N=5,cur=0,tmr=null,paused=false,progRaf=null,progStart=0;
var DURS=[11000,11000,11000,11000,11000];
var dotsEl=document.getElementById('dots');
for(var i=0;i<N;i++){(function(idx){var d=document.createElement('div');d.className='dot';d.onclick=function(e){e.stopPropagation();goTo(idx)};dotsEl.appendChild(d)})(i)}

var isBuilt=false;
function updatePanel(idx){
  var ch=CHS[idx];
  document.getElementById('pTag').textContent=ch.tag;
  document.getElementById('pTag').style.color=ch.c;
  document.getElementById('pHook').textContent=ch.hook;
  var titleEl=document.getElementById('pTitle');
  titleEl.innerHTML=ch.title;
  var em=titleEl.querySelector('em');
  if(em) em.style.color=ch.c;
  document.getElementById('pN').textContent=ch.n;
  document.getElementById('pN').style.color=ch.c;
  document.getElementById('pL').innerHTML=ch.l.replace(/\n/g,'<br>');
}
function updateLayers(idx){
  if(!isBuilt) return;
  var order=['l0','l1','l2','l3','l4'];
  order.forEach(function(id){if(layers[id])layers[id].style('opacity',id===CHS[idx].layer?'1':'0')});
  updateLegend(idx);
}
function startProg(){
  if(progRaf)cancelAnimationFrame(progRaf);
  progStart=Date.now();var dur=DURS[cur];
  (function tick(){var p=Math.min((Date.now()-progStart)/dur,1);document.getElementById('prog-fill').style.width=(p*100)+'%';if(p<1&&!paused)progRaf=requestAnimationFrame(tick)})();
}
function seekClick(e){var r=e.currentTarget.getBoundingClientRect();goTo(Math.max(0,Math.min(N-1,Math.round((e.clientX-r.left)/r.width*(N-1)))))}
function showSlide(idx,skipLayers){
  updatePanel(idx);
  if(!skipLayers)updateLayers(idx);
  document.querySelectorAll('.dot').forEach(function(d,i){d.classList.toggle('on',i===idx)});
  document.getElementById('cnt').textContent=(idx+1)+' / '+N;
  startProg();
  if(!isBuilt){isBuilt=true;updateLayers(idx)}
}
function next(){if(tmr)clearTimeout(tmr);cur=cur<N-1?cur+1:0;showSlide(cur);if(!paused)schedule()}
function prev(){if(tmr)clearTimeout(tmr);cur=cur>0?cur-1:N-1;showSlide(cur);if(!paused)schedule()}
function schedule(){if(tmr)clearTimeout(tmr);if(!paused)tmr=setTimeout(next,DURS[cur])}
function goTo(idx){if(tmr)clearTimeout(tmr);cur=idx;showSlide(idx);if(!paused)schedule()}
function togglePlay(){
  paused=!paused;var btn=document.getElementById('bplay');
  if(paused){btn.classList.remove('on');if(tmr)clearTimeout(tmr);if(progRaf)cancelAnimationFrame(progRaf)}
  else{btn.classList.add('on');schedule();startProg()}
}
function initPlayer(){
  showSlide(0,false);
  document.getElementById('bplay').classList.add('on');
  schedule();
  document.getElementById('stage').addEventListener('click',function(e){
    if(e.target.closest('#dots,#player,.back,#legend'))return;next();
  });
}
</script>
