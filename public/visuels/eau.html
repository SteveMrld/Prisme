<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#F0EAE2;color:#1C1814;font-family:"DM Sans",sans-serif;-webkit-font-smoothing:antialiased}
#stage{position:fixed;top:0;left:0;width:100%;height:calc(100% - 50px);display:flex;flex-direction:column}
#map-wrap{position:relative;flex:1;overflow:hidden;background:#F0EAE2;cursor:pointer}
#map-svg{position:absolute;top:0;left:0;width:100%;height:100%}

/* ══ BANDE TEXTE — style journal ══ */
#textband{
  flex-shrink:0;height:clamp(132px,20vh,172px);
  background:#F8F4EE;border-top:2px solid #1C1814;
  display:flex;position:relative;z-index:10;
}
#text-inner{flex:1;padding:14px 24px 12px;display:flex;flex-direction:column;gap:4px;overflow:hidden;border-right:1px solid rgba(28,24,20,.1)}
.ptag{font-family:"DM Mono",monospace;font-size:7px;font-weight:500;letter-spacing:4.5px;text-transform:uppercase;transition:color .6s}
.phook{font-family:"Playfair Display",serif;font-size:clamp(10.5px,1.2vw,13px);font-style:italic;font-weight:300;color:rgba(28,24,20,.38);line-height:1.55}
.ptitle{font-family:"Playfair Display",serif;font-size:clamp(15.5px,1.9vw,22px);font-weight:400;line-height:1.18;letter-spacing:-.25px;color:#1C1814}
.ptitle em{font-style:italic;transition:color .6s}
.fout{opacity:0;transition:opacity .2s ease}
.fin{opacity:1;transition:opacity .3s ease .05s}
#stat{flex-shrink:0;width:clamp(108px,10.5vw,142px);display:flex;flex-direction:column;justify-content:center;padding:12px 16px 12px 13px}
#pN{font-family:"Playfair Display",serif;font-size:clamp(26px,2.8vw,40px);font-weight:300;line-height:1;transition:color .6s;border-bottom:1px solid rgba(28,24,20,.1);padding-bottom:8px}
#pL{font-size:7px;letter-spacing:1.2px;text-transform:uppercase;color:rgba(28,24,20,.32);line-height:2;margin-top:8px}

/* ══ PLAYER ══ */
#player{position:fixed;bottom:0;left:0;right:0;height:50px;z-index:200;display:flex;flex-direction:column;background:#1C1814}
#progbar{width:100%;height:1.5px;background:rgba(255,255,255,.08);cursor:pointer;flex-shrink:0}
#progfill{height:100%;width:0%;transition:width .1s linear}
#ctrl{flex:1;display:flex;align-items:center;justify-content:center;padding:0 14px;position:relative}
#dots{position:absolute;left:14px;display:flex;gap:6px;align-items:center}
.dot{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.18);cursor:pointer;transition:all .25s}
.dot.on{background:#C8A96E;width:12px;border-radius:2px}
.cbtn{width:34px;height:34px;border:none;background:none;color:rgba(255,255,255,.3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:color .2s;padding:0;margin:0 2px}
.cbtn:hover{color:rgba(255,255,255,.8)}
.cbtn svg{width:16px;height:16px;fill:currentColor}
#bplay .ip{display:block}#bplay .ipa{display:none}
#bplay.on .ip{display:none}#bplay.on .ipa{display:block}
#bplay{width:40px;height:40px;background:rgba(255,255,255,.05);color:#fff;border:1px solid rgba(255,255,255,.12);border-radius:0}
#cnt{position:absolute;right:14px;font-family:"DM Mono",monospace;font-size:8px;letter-spacing:2px;color:rgba(255,255,255,.18)}

/* ══ LÉGENDE ══ */
#legend{position:absolute;right:14px;top:14px;z-index:20;display:flex;flex-direction:column;gap:7px;background:rgba(248,244,238,.95);padding:10px 13px;border:1px solid rgba(28,24,20,.1)}
.li{display:flex;align-items:center;gap:8px}
.li-txt{font-family:"DM Mono",monospace;font-size:7px;color:rgba(28,24,20,.45);letter-spacing:.5px;text-transform:uppercase}

.back{position:fixed;top:13px;left:13px;font-family:"DM Mono",monospace;font-size:7px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(28,24,20,.28);text-decoration:none;z-index:300;transition:color .2s}
.back:hover{color:#1C1814}

@media(max-width:640px){
  #textband{height:auto;min-height:120px}
  #text-inner{padding:10px 14px 8px}
  .phook{display:none}
  .ptitle{font-size:14px}
  #stat{width:95px;padding:10px 12px}
  #pN{font-size:22px}
  #legend{right:8px;top:8px;padding:7px 9px}
  .li-txt{font-size:6.5px}
}
</style>
</head>

function smooth(coords){
  var pts=coords.map(function(c){return proj([c[0],c[1]])}).filter(function(p){return p&&p[0]>-200&&p[1]>-200&&p[0]<mapW*3&&p[1]<mapH*3});
  if(pts.length<2)return null;
  return d3.line().x(function(p){return p[0]}).y(function(p){return p[1]}).curve(d3.curveCatmullRom.alpha(0.5))(pts);
}

/* ══ FLEUVE — style cartographique fin ══ */
function drawRiver(g,key,opacity,width){
  var d=smooth(RIV[key]); if(!d)return;
  var w=(isMobile?0.7:1)*width;
  /* Trait fin, précis, pas de glow */
  g.append('path').attr('d',d).attr('fill','none')
    .attr('stroke','rgba(60,100,180,'+opacity+')').attr('stroke-width',w)
    .attr('stroke-linecap','round').attr('data-riv','1');
}

function animGroup(g){
  g.selectAll('[data-riv]').nodes().forEach(function(el,i){
    var len=1500; try{len=el.getTotalLength()||1500}catch(e){}
    el.style.strokeDasharray=len+' '+len;
    el.style.strokeDashoffset=len;
    el.style.transition='none';
    el.getBoundingClientRect();
    el.style.transition='stroke-dashoffset '+(1.0+i*.06)+'s cubic-bezier(.4,0,.2,1) '+(i*30)+'ms';
    el.style.strokeDashoffset='0';
  });
}

/* ══ BARRAGE — pictogramme architectural élégant ══ */
function drawDam(g,lon,lat,col){
  var pt=proj([lon,lat]); if(!pt)return;
  col=col||'#8B1A1A';
  var w=isMobile?8:12, h=isMobile?3:4;
  var dg=g.append('g').attr('transform','translate('+pt[0]+','+pt[1]+')');
  /* Corps du barrage — rectangle plein */
  dg.append('rect').attr('x',-w/2).attr('y',-h/2).attr('width',w).attr('height',h)
    .attr('fill',col).attr('rx',0);
  /* Ligne eau amont — trait très fin au-dessus */
  dg.append('line').attr('x1',-w/2).attr('y1',-h/2-2).attr('x2',w/2).attr('y2',-h/2-2)
    .attr('stroke','rgba(60,100,180,.5)').attr('stroke-width',.8);
}

/* ══ TENSION — diamant cartographique fin ══ */
function drawTension(g,lon,lat,col){
  var pt=proj([lon,lat]); if(!pt)return;
  col=col||'#8B1A1A';
  var r=isMobile?5:6.5;
  var tg=g.append('g').attr('transform','translate('+pt[0]+','+pt[1]+')');
  /* Anneau extérieur très fin */
  tg.append('circle').attr('r',r).attr('fill','none')
    .attr('stroke',col).attr('stroke-width',.8).attr('opacity',.7);
  /* Anneau intérieur */
  tg.append('circle').attr('r',r*.45).attr('fill','none')
    .attr('stroke',col).attr('stroke-width',.8);
  /* Centre plein */
  tg.append('circle').attr('r',1.5).attr('fill',col);
}

/* Étiquette — style cartographique précis */
function lbl(g,lon,lat,txt,col,sz,anchor,italic){
  var pt=proj([lon,lat]); if(!pt)return;
  var t=g.append('text').attr('x',pt[0]).attr('y',pt[1]).attr('text-anchor',anchor||'middle')
    .attr('font-family',italic?'"Playfair Display",serif':'"DM Mono",monospace')
    .attr('font-size',sz||(isMobile?7:8.5)).attr('font-weight','400')
    .attr('font-style',italic?'italic':'normal')
    .attr('fill',col||'rgba(28,24,20,.42)').attr('letter-spacing',italic?.3:1.5)
    .attr('pointer-events','none').text(txt);
  return t;
}

    n:'6×',l:'plus d\'eau utilisée\nque reçue en précipitation',
    col:'#8B1A1A',
    zoom:{lon:42,lat:33,s:isMobile?3.6:4.8},
    build:function(g){
      drawRiver(g,'tigre',.88,1.5);
      drawRiver(g,'euphrate',.8,1.4);
      drawRiver(g,'jordan',.65,1.0);
      drawTension(g,38.5,37.5,'#8B1A1A');
      drawTension(g,35.5,31.5,'#8B1A1A');
      lbl(g,36.5,40,'Turquie','rgba(28,24,20,.55)',isMobile?7.5:9.5,'start');
      lbl(g,36.5,41.5,'contrôle les sources','rgba(28,24,20,.38)',isMobile?6.5:8,'start');
      lbl(g,44,34,'IRAK','rgba(28,24,20,.35)',isMobile?7:9);
      lbl(g,36.5,35.5,'Euphrate','rgba(60,100,180,.6)',isMobile?6.5:8,'start',true);
      lbl(g,47,33.5,'Tigre','rgba(60,100,180,.55)',isMobile?6.5:8,'start',true);
      lbl(g,35.5,29,'Jourdain','rgba(60,100,180,.5)',isMobile?6.5:8,'start',true);
    },
    hl:[792],hf:'rgba(140,30,20,.25)',hl2:[368,760,376,400,422,364,682,887],hf2:'rgba(120,25,15,.15)',
    legs:[{s:'<div style="width:20px;height:1.5px;background:rgba(60,100,180,.85);border-radius:1px"></div>',l:'Tigre / Euphrate / Jourdain'},{s:'<div style="width:8px;height:8px;border-radius:50%;border:1.5px solid #8B1A1A"></div>',l:'Zone de tension'},{s:'<div style="width:12px;height:12px;background:rgba(140,30,20,.22);border:1px solid rgba(140,30,20,.5)"></div>',l:'Turquie (contrôle amont)'},]
  },
];

/* ══ COUCHES ══ */
var LAYERS={};
function buildLayer(i){
  var g=mapG.append('g').attr('id','rl'+i).style('opacity','0');
  LAYERS[i]=g; SL[i].build(g);
}

function applyHL(i){
  if(hlG) hlG.remove();
  hlG=mapG.append('g').attr('id','hlg');
  var s=SL[i];
  function paint(ids,fill){
    if(!ids||!ids.length)return;
    hlG.selectAll(null).data(allFeatures.filter(function(f){return ids.indexOf(+f.id)>-1}))
      .join('path').attr('d',gp).attr('fill',fill).attr('stroke','none')
      .style('opacity',0).transition().duration(400).delay(180).style('opacity',1);
  }
  paint(s.hl,s.hf); if(s.hl2)paint(s.hl2,s.hf2);
}

function zoomTo(i){
  var z=SL[i].zoom,c=proj([z.lon,z.lat]); if(!c)return;
  mapG.transition().duration(950).ease(d3.easeCubicInOut)
    .attr('transform','translate('+(mapW/2-c[0]*z.s)+','+(mapH/2-c[1]*z.s)+') scale('+z.s+')');
}

/* ══ PLAYER ══ */
var N=5,cur=0,tmr=null,paused=false,raf=null,progStart=0;
for(var i=0;i<N;i++){(function(ii){
  var d=document.createElement('div');d.className='dot';
  d.onclick=function(e){e.stopPropagation();goTo(ii)};
  document.getElementById('dots').appendChild(d);
})(i)}

function setPanel(s,instant){
  if(!instant){
    ['pTag','pHook','pTitle'].forEach(function(id){var e=document.getElementById(id);e.className=e.className.replace('fin','fout')});
    setTimeout(function(){write(s);['pTag','pHook','pTitle'].forEach(function(id){var e=document.getElementById(id);e.className=e.className.replace('fout','fin')})},210);
  } else write(s);
}
function write(s){
  document.getElementById('pTag').textContent=s.tag;
  document.getElementById('pTag').style.color=s.col;
  var t=document.getElementById('pTitle');t.innerHTML=s.title;
  var em=t.querySelector('em');if(em)em.style.color=s.col;
  document.getElementById('pHook').textContent=s.hook;
  document.getElementById('pN').textContent=s.n;
  document.getElementById('pN').style.color=s.col;
  document.getElementById('pL').innerHTML=s.l.replace(/\n/g,'<br>');
  document.getElementById('progfill').style.background=s.col;
}
function showSlide(i,instant){
  var s=SL[i]; setPanel(s,instant);
  document.querySelectorAll('.dot').forEach(function(d,j){d.classList.toggle('on',j===i);d.style.background=j===i?'#C8A96E':'rgba(255,255,255,.18)';});
  document.getElementById('cnt').textContent=(i+1)+' / '+N;
  Object.keys(LAYERS).forEach(function(k){
    var active=+k===i;
    LAYERS[k].transition().duration(active?0:280).style('opacity','0');
    if(active)setTimeout(function(){LAYERS[k].transition().duration(350).style('opacity','1');animGroup(LAYERS[k])},90);
  });
  applyHL(i); zoomTo(i);
  document.getElementById('legend').innerHTML=s.legs.map(function(x){return'<div class="li">'+x.s+'<span class="li-txt">'+x.l+'</span></div>'}).join('');
  startProg();
}
function startProg(){
  if(raf)cancelAnimationFrame(raf);progStart=Date.now();var dur=10000;
  (function tick(){var p=Math.min((Date.now()-progStart)/dur,1);document.getElementById('progfill').style.width=(p*100)+'%';if(p<1&&!paused)raf=requestAnimationFrame(tick)})();
}
function seek(e){var r=e.currentTarget.getBoundingClientRect();goTo(Math.max(0,Math.min(N-1,Math.round((e.clientX-r.left)/r.width*(N-1)))))}
function next(){if(tmr)clearTimeout(tmr);cur=cur<N-1?cur+1:0;showSlide(cur);if(!paused)sched()}
function prev(){if(tmr)clearTimeout(tmr);cur=cur>0?cur-1:N-1;showSlide(cur);if(!paused)sched()}
function sched(){if(tmr)clearTimeout(tmr);if(!paused)tmr=setTimeout(next,7000)}
function goTo(i){if(tmr)clearTimeout(tmr);cur=i;showSlide(i);if(!paused)sched()}
function togglePlay(){
  paused=!paused;var b=document.getElementById('bplay');
  if(paused){b.classList.remove('on');if(tmr)clearTimeout(tmr);if(raf)cancelAnimationFrame(raf)}
  else{b.classList.add('on');sched();startProg()}
}

/* ══ INIT ══ */
d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
  .catch(function(){ return d3.json('https://unpkg.com/world-atlas@2/countries-110m.json'); })
  .then(function(world){
  /* Recalcule les dimensions maintenant que le DOM est rendu */
  var tbEl = document.getElementById('textband');
  mapH = window.innerHeight - (tbEl ? tbEl.getBoundingClientRect().height : 145) - 50;
  svg.attr('height', mapH);
  proj=d3.geoNaturalEarth1().scale(Math.min(mapW/5.2,mapH/2.8)).translate([mapW*.5,mapH*.52]);
  gp=d3.geoPath().projection(proj);

  mapG=svg.append('g').attr('id','map-g');

  /* Fond */
  mapG.append('rect').attr('x',-mapW*2).attr('y',-mapH*2).attr('width',mapW*6).attr('height',mapH*6).attr('fill','#F0EAE2');
  /* Océan — bleu gris pâle */
  mapG.append('path').datum({type:'Sphere'}).attr('d',gp).attr('fill','#C8D8E4');
  /* Grille très légère */
  mapG.append('path').datum(d3.geoGraticule()()).attr('d',gp).attr('fill','none').attr('stroke','rgba(28,24,20,.04)').attr('stroke-width',.3);

  allFeatures=topojson.feature(world,world.objects.countries).features;

  /* Pays — couleurs par continent, très subtiles */
  mapG.append('g').attr('id','countries').selectAll('path').data(allFeatures).join('path')
    .attr('d',gp).attr('fill',function(d){return getCFill(d.id)}).attr('stroke','none');

  /* Frontières fines */
  mapG.append('path')
    .datum(topojson.mesh(world,world.objects.countries,function(a,b){return a!==b}))
    .attr('d',gp).attr('fill','none').attr('stroke','rgba(28,24,20,.18)').attr('stroke-width',.3);
  /* Contour sphère */
  mapG.append('path').datum({type:'Sphere'}).attr('d',gp).attr('fill','none').attr('stroke','rgba(28,24,20,.25)').attr('stroke-width',.8);

  /* Labels océans — style cartographique italique */
  [[-35,14,'ATLANTIQUE',isMobile?6.5:9],[-148,2,'PACIFIQUE',isMobile?6.5:9.5],[72,-22,'INDIEN',isMobile?6.5:8.5]].forEach(function(l){
    var pt=proj([l[0],l[1]]); if(!pt)return;
    mapG.append('text').attr('x',pt[0]).attr('y',pt[1]).attr('text-anchor','middle')
      .attr('font-family','"Playfair Display",serif').attr('font-size',l[3]).attr('font-style','italic').attr('font-weight','300')
      .attr('fill','rgba(30,70,120,.22)').attr('letter-spacing',3.5).attr('pointer-events','none').text(l[2]);
  });

  /* Highlights (au-dessus pays, sous fleuves) */
  hlG=mapG.append('g').attr('id','hlg');

  /* Fleuves de fond — très discrets sur tous les slides */
  var bg=mapG.append('g');
  Object.keys(RIV).forEach(function(k){
    var d=smooth(RIV[k]); if(!d)return;
    bg.append('path').attr('d',d).attr('fill','none')
      .attr('stroke','rgba(60,100,180,.14)').attr('stroke-width',isMobile?.5:.7).attr('stroke-linecap','round');
  });

  /* Couches par slide */
  for(var i=0;i<N;i++)buildLayer(i);

  showSlide(0,true);
  document.getElementById('bplay').classList.add('on');
  sched();
  document.getElementById('map-wrap').addEventListener('click',function(e){
    if(e.target.closest('#dots,#player,.back,#legend'))return; next();
  });
}).catch(function(e){
  console.error('Erreur chargement carte:',e);
  document.getElementById('map-wrap').innerHTML += '<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;font-family:DM Mono,monospace;font-size:10px;letter-spacing:2px;color:rgba(28,24,20,.4)">CHARGEMENT DE LA CARTE…</div>';
});
</script>
</body>
</html>
