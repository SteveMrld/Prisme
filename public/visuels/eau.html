<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>L'eau : la prochaine grande fracture · Soara</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#EDE8DF;font-family:"DM Mono",monospace;-webkit-font-smoothing:antialiased}
#stage{position:fixed;top:0;left:0;width:100%;height:calc(100% - 50px);display:flex;flex-direction:column}
#map{flex:1;position:relative;z-index:1}
.maplibregl-ctrl-bottom-right{display:none}
.maplibregl-ctrl-bottom-left{display:none}
.maplibregl-ctrl-attrib{font-size:6px;opacity:.4;position:fixed;bottom:52px;right:4px;background:transparent;pointer-events:none}

/* ══ BANDE TEXTE ══ */
#textband{flex-shrink:0;height:clamp(128px,20vh,165px);background:#F8F4EE;border-top:2px solid #1C1814;display:flex;z-index:10;position:relative}
#txt-inner{flex:1;padding:13px 20px 10px;display:flex;flex-direction:column;gap:4px;overflow:hidden;border-right:1px solid rgba(28,24,20,.1)}
.ptag{font-size:6.5px;font-weight:500;letter-spacing:4px;text-transform:uppercase;transition:color .6s}
.phook{font-family:"Playfair Display",serif;font-size:clamp(10px,1.15vw,12.5px);font-style:italic;font-weight:300;color:rgba(28,24,20,.35);line-height:1.55;margin-top:2px}
.ptitle{font-family:"Playfair Display",serif;font-size:clamp(14.5px,1.85vw,20px);font-weight:400;line-height:1.2;letter-spacing:-.22px;color:#1C1814;margin-top:2px}
.ptitle em{font-style:italic;transition:color .6s}
.fout{opacity:0;transition:opacity .18s ease}
.fin{opacity:1;transition:opacity .3s ease .05s}
#stat{flex-shrink:0;width:clamp(100px,10vw,132px);display:flex;flex-direction:column;justify-content:center;padding:10px 14px 10px 11px}
#pN{font-family:"Playfair Display",serif;font-size:clamp(24px,2.6vw,36px);font-weight:300;line-height:1;transition:color .6s;border-bottom:1px solid rgba(28,24,20,.1);padding-bottom:7px}
#pL{font-size:6.5px;letter-spacing:1.2px;text-transform:uppercase;color:rgba(28,24,20,.3);line-height:2;margin-top:7px}

/* ══ PLAYER ══ */
#player{position:fixed;bottom:0;left:0;right:0;height:50px;z-index:200;display:flex;flex-direction:column;background:#1C1814}
#progbar{width:100%;height:1.5px;background:rgba(255,255,255,.07);cursor:pointer;flex-shrink:0}
#progfill{height:100%;width:0%;transition:width .1s linear}
#ctrl{flex:1;display:flex;align-items:center;justify-content:center;padding:0 13px;position:relative}
#dots{position:absolute;left:13px;display:flex;gap:6px;align-items:center}
.dot{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.18);cursor:pointer;transition:all .25s}
.dot.on{background:#C8A96E;width:14px;border-radius:2px}
.cbtn{width:34px;height:34px;border:none;background:none;color:rgba(255,255,255,.3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:color .2s;padding:0;margin:0 2px}
.cbtn:hover{color:rgba(255,255,255,.8)}
.cbtn svg{width:16px;height:16px;fill:currentColor}
#bplay .ip{display:block}#bplay .ipa{display:none}
#bplay.on .ip{display:none}#bplay.on .ipa{display:block}
#bplay{width:40px;height:40px;background:rgba(255,255,255,.05);color:#fff;border:1px solid rgba(255,255,255,.12);border-radius:0}
#cnt{position:absolute;right:13px;font-size:7.5px;letter-spacing:2px;color:rgba(255,255,255,.18)}

/* ══ LÉGENDE ══ */
#legend{position:absolute;right:11px;top:11px;z-index:500;display:flex;flex-direction:column;gap:7px;background:rgba(248,244,238,.94);padding:9px 12px;border:1px solid rgba(28,24,20,.12);pointer-events:none}
.li{display:flex;align-items:center;gap:7px}
.li-txt{font-size:6.5px;color:rgba(28,24,20,.5);letter-spacing:.8px;text-transform:uppercase}

/* ══ MARQUEURS SVG ══ */
.mgl-dam{display:block;overflow:visible}
.mgl-pin{display:block;overflow:visible}
.map-lbl{background:rgba(248,244,238,.88);padding:2px 5px;font-size:7.5px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(28,24,20,.55);white-space:nowrap;line-height:1.4}
.map-riv{background:rgba(248,244,238,.82);padding:1.5px 4px;font-family:"Playfair Display",serif;font-size:8.5px;font-style:italic;color:rgba(50,90,180,.75);white-space:nowrap}

.back{position:fixed;top:11px;left:11px;font-size:6.5px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(28,24,20,.28);text-decoration:none;z-index:600}
.back:hover{color:#1C1814}

@media(max-width:640px){
  #textband{height:auto;min-height:116px}
  #txt-inner{padding:10px 13px 9px}
  .phook{display:none}
  .ptitle{font-size:13.5px}
  #stat{width:90px;padding:9px 10px}
  #pN{font-size:21px}
  #legend{right:7px;top:7px;padding:7px 9px}
  .li-txt{font-size:6px}
}
</style>

/* ══ MARQUEURS ══ */
function addMarkers(s){
  /* Dams */
  if(s.dams) s.dams.forEach(function(d){
    new maplibregl.Marker({
      element: (function(){
        var el=document.createElement('div');
        el.innerHTML='<svg width="18" height="12" viewBox="0 0 18 12" overflow="visible"><line x1="0" y1="6" x2="18" y2="6" stroke="#8B1A1A" stroke-width="2.4" stroke-linecap="square"/><line x1="3" y1="6" x2="2.2" y2="11" stroke="#8B1A1A" stroke-width="1"/><line x1="9" y1="6" x2="8.2" y2="11" stroke="#8B1A1A" stroke-width="1"/><line x1="15" y1="6" x2="14.2" y2="11" stroke="#8B1A1A" stroke-width="1"/></svg>';
        return el;
      })(), anchor:'center'
    }).setLngLat([d[1],d[0]]).addTo(map);
  });
  /* Tensions */
  if(s.tensions) s.tensions.forEach(function(t){
    new maplibregl.Marker({
      element: (function(){
        var el=document.createElement('div');
        el.innerHTML='<svg width="12" height="16" viewBox="0 0 12 16" overflow="visible"><circle cx="6" cy="5.5" r="4.5" fill="'+s.col+'" opacity=".82" stroke="rgba(248,244,238,.75)" stroke-width=".8"/><line x1="6" y1="10" x2="6" y2="15.5" stroke="'+s.col+'" stroke-width="1.2" stroke-linecap="round"/></svg>';
        return el;
      })(), anchor:'bottom'
    }).setLngLat([t[1],t[0]]).addTo(map);
  });
  /* Labels pays */
  if(s.labels) s.labels.forEach(function(lb){
    var el=document.createElement('div');
    el.className='map-lbl';
    el.textContent=lb[2];
    new maplibregl.Marker({element:el,anchor:'center'}).setLngLat([lb[1],lb[0]]).addTo(map);
  });
}

var markers=[];
function clearMarkers(){
  markers.forEach(function(m){m.remove()});
  markers=[];
}

/* ══ FLEUVES MAPLIBRE ══ */
var riverSources=[];
function clearRivers(){
  riverSources.forEach(function(id){
    if(map.getLayer(id)) map.removeLayer(id);
    if(map.getSource(id)) map.removeSource(id);
  });
  riverSources=[];
  if(map.getLayer('border-layer')) map.removeLayer('border-layer');
  if(map.getSource('border-src')) map.removeSource('border-src');
}

function addRivers(s){
  s.rivers.forEach(function(r,i){
    var id='river-'+i;
    var col=s.riverCol.replace('OPACITY', r.op);
    map.addSource(id,{type:'geojson',data:{type:'Feature',geometry:{type:'LineString',coordinates:r.coords.map(function(c){return[c[1],c[0]]})}}});
    map.addLayer({id:id,type:'line',source:id,layout:{'line-cap':'round','line-join':'round'},paint:{'line-color':col,'line-width':r.w,'line-blur':0.3}});
    riverSources.push(id);
    /* Label fleuve */
    if(r.label && r.lpos){
      var el=document.createElement('div'); el.className='map-riv'; el.textContent=r.label;
      var m=new maplibregl.Marker({element:el,anchor:'left'}).setLngLat([r.lpos[1],r.lpos[0]]).addTo(map);
      markers.push(m);
    }
  });
  /* Frontière pointillée */
  if(s.border){
    map.addSource('border-src',{type:'geojson',data:{type:'Feature',geometry:{type:'LineString',coordinates:s.border.map(function(c){return[c[1],c[0]]})}}});
    map.addLayer({id:'border-layer',type:'line',source:'border-src',paint:{'line-color':'rgba(28,24,20,.4)','line-width':1,'line-dasharray':[4,4]}});
  }
}

/* ══ PLAYER ══ */
var N=5,cur=0,tmr=null,paused=false,raf=null,pStart=0;
for(var i=0;i<N;i++){(function(ii){
  var d=document.createElement('div');d.className='dot';
  d.onclick=function(e){e.stopPropagation();goTo(ii)};
  document.getElementById('dots').appendChild(d);
})(i)}

function setPanel(s,instant){
  if(!instant){
    ['pTag','pHook','pTitle'].forEach(function(id){var e=document.getElementById(id);e.className=e.className.replace('fin','fout')});
    setTimeout(function(){write(s)},200);
  } else write(s);
}
function write(s){
  document.getElementById('pTag').textContent=s.tag;
  document.getElementById('pTag').style.color=s.col;
  var t=document.getElementById('pTitle');t.innerHTML=s.title;
  var em=t.querySelector('em');if(em)em.style.color=s.col;
  document.getElementById('pHook').textContent=s.hook;
  document.getElementById('pN').textContent=s.n;
  document.getElementById('pN').style.color=s.col;
  document.getElementById('pL').innerHTML=s.l.replace(/\n/g,'<br>');
  document.getElementById('progfill').style.background=s.col;
  ['pTag','pHook','pTitle'].forEach(function(id){var e=document.getElementById(id);e.className=e.className.replace('fout','fin')});
}

function showSlide(idx,instant){
  var s=SLIDES[idx];
  setPanel(s,instant);
  document.querySelectorAll('.dot').forEach(function(d,i){d.classList.toggle('on',i===idx);d.style.background=i===idx?'#C8A96E':'rgba(255,255,255,.18)'});
  document.getElementById('cnt').textContent=(idx+1)+' / '+N;
  document.getElementById('legend').innerHTML=s.legs.map(function(x){return'<div class="li">'+x.s+'<span class="li-txt">'+x.l+'</span></div>'}).join('');
  clearMarkers();
  if(map.loaded()){
    clearRivers();
    map.flyTo({center:[s.view.center[1],s.view.center[0]],zoom:s.view.zoom,speed:.7,curve:1.2,essential:true});
    setTimeout(function(){addRivers(s);addMarkers(s)},instant?0:600);
  }
  startProg();
}
function startProg(){
  if(raf)cancelAnimationFrame(raf);pStart=Date.now();
  (function tick(){var p=Math.min((Date.now()-pStart)/7000,1);document.getElementById('progfill').style.width=(p*100)+'%';if(p<1&&!paused)raf=requestAnimationFrame(tick)})();
}
function seek(e){var r=e.currentTarget.getBoundingClientRect();goTo(Math.max(0,Math.min(N-1,Math.round((e.clientX-r.left)/r.width*(N-1)))))}
function next(){if(tmr)clearTimeout(tmr);cur=cur<N-1?cur+1:0;showSlide(cur);if(!paused)sched()}
function prev(){if(tmr)clearTimeout(tmr);cur=cur>0?cur-1:N-1;showSlide(cur);if(!paused)sched()}
function sched(){if(tmr)clearTimeout(tmr);if(!paused)tmr=setTimeout(next,7000)}
function goTo(i){if(tmr)clearTimeout(tmr);cur=i;showSlide(i);if(!paused)sched()}
function togglePlay(){paused=!paused;var b=document.getElementById('bplay');if(paused){b.classList.remove('on');if(tmr)clearTimeout(tmr);if(raf)cancelAnimationFrame(raf)}else{b.classList.add('on');sched();startProg()}}

document.getElementById('map').addEventListener('click',function(e){if(e.target.closest('.back,#legend'))return;next()});

map.on('load',function(){
  showSlide(0,true);
  document.getElementById('bplay').classList.add('on');
  sched();
});
</script>
</body>
</html>
