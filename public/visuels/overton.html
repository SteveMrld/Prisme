<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Fenêtre d'Overton</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --encre: #0A0A0A;
    --or: #C4A265;
    --bg: #FAFAF8;
    --papier: #F2EDE3;
    --gris: #3D3D3D;
    --gris-m: #6A6A6A;
    --gris-l: #9A9590;
    --bord: #D8D3C8;
    --unacceptable: #7A2D2D;
    --radical: #B86A1A;
    --acceptable: #2D6B4A;
    --politique: #1A3E6B;
  }

  html, body {
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    color: var(--encre);
    height: 100%;
    -webkit-font-smoothing: antialiased;
  }

  .header {
    padding: 20px 32px 16px;
    border-bottom: 1px solid var(--bord);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-tag {
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--or);
    border: 1px solid var(--or);
    padding: 4px 12px;
  }

  .header-title {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 400;
    font-style: italic;
    color: var(--encre);
  }

  /* SPECTRUM */
  .spectrum-wrap {
    padding: 32px 32px 0;
  }

  .spectrum-label {
    font-size: 8px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gris-l);
    margin-bottom: 20px;
  }

  .spectrum {
    position: relative;
    height: 280px;
  }

  /* Zone gradient de fond */
  .spectrum-gradient {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 80px;
    display: flex;
    border-radius: 2px;
    overflow: hidden;
  }

  .zone {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 4px;
    padding: 8px 6px;
    transition: opacity 0.3s;
  }

  .zone-label {
    font-size: 8px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.85);
    text-align: center;
    line-height: 1.3;
  }

  .zone-1 { background: #5C1010; }
  .zone-2 { background: #8B3A0A; }
  .zone-3 { background: #B86A1A; }
  .zone-4 { background: var(--acceptable); }
  .zone-5 { background: #1A5038; }
  .zone-6 { background: #102240; }

  /* FENÊTRE glissante */
  .window {
    position: absolute;
    top: -4px;
    height: 88px;
    width: 33.333%;
    border: 3px solid var(--or);
    border-radius: 2px;
    transition: left 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    pointer-events: none;
    box-shadow: 0 0 0 9999px rgba(10,10,10,0.35);
  }

  .window::before {
    content: 'FENÊTRE D\'OVERTON';
    position: absolute;
    top: -20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 7px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--or);
    white-space: nowrap;
  }

  /* IDEAS */
  .ideas {
    position: absolute;
    top: 108px;
    left: 0; right: 0;
    display: flex;
    gap: 6px;
    padding: 0 2px;
  }

  .idea {
    flex: 1;
    padding: 10px 8px;
    border: 1px solid var(--bord);
    background: var(--bg);
    display: flex;
    flex-direction: column;
    gap: 4px;
    border-radius: 2px;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, transform 0.2s;
    min-height: 80px;
  }

  .idea:hover { background: var(--papier); transform: translateY(-2px); }

  .idea.in-window {
    background: rgba(196,162,101,0.08);
    border-color: var(--or);
  }

  .idea-icon { font-size: 16px; }

  .idea-text {
    font-size: 10px;
    color: var(--gris-m);
    line-height: 1.4;
    font-weight: 400;
  }

  .idea.in-window .idea-text { color: var(--encre); font-weight: 500; }

  /* EXEMPLES */
  .examples {
    position: absolute;
    top: 216px;
    left: 0; right: 0;
  }

  .example {
    display: none;
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    font-style: italic;
    color: var(--gris-m);
    text-align: center;
    line-height: 1.5;
    padding: 0 16px;
  }

  .example.active { display: block; }

  /* CONTROLS */
  .controls {
    padding: 24px 32px;
    border-top: 1px solid var(--bord);
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .slider-wrap {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .slider-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .slider-title {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gris-m);
  }

  .slider-val {
    font-family: 'Playfair Display', serif;
    font-size: 14px;
    color: var(--or);
    font-style: italic;
  }

  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 2px;
    background: var(--bord);
    outline: none;
    border-radius: 2px;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--encre);
    cursor: pointer;
    border: 2px solid var(--or);
    transition: transform 0.2s;
  }

  input[type=range]::-webkit-slider-thumb:hover {
    transform: scale(1.2);
  }

  .scenarios {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .scenario-btn {
    font-size: 8px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 8px 14px;
    border: 1px solid var(--bord);
    background: transparent;
    cursor: pointer;
    color: var(--gris-m);
    font-family: 'DM Sans', sans-serif;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }

  .scenario-btn:hover, .scenario-btn.active {
    background: var(--encre);
    color: var(--or);
    border-color: var(--encre);
  }

  /* LEGENDE */
  .legend {
    padding: 12px 32px 20px;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    border-top: 1px solid var(--bord);
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 9px;
    color: var(--gris-l);
    letter-spacing: 0.5px;
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="header">
  <span class="header-tag">Infographie interactive</span>
  <span class="header-title">La Fenêtre d'Overton</span>
</div>

<div class="spectrum-wrap">
  <div class="spectrum-label">Le spectre des idées politiquement possibles</div>
  <div class="spectrum" id="spectrum">
    <div class="spectrum-gradient">
      <div class="zone zone-1"><span class="zone-label">Impensable</span></div>
      <div class="zone zone-2"><span class="zone-label">Radical</span></div>
      <div class="zone zone-3"><span class="zone-label">Acceptable</span></div>
      <div class="zone zone-4"><span class="zone-label">Raisonnable</span></div>
      <div class="zone zone-5"><span class="zone-label">Populaire</span></div>
      <div class="zone zone-6"><span class="zone-label">Politique</span></div>
    </div>

    <div class="window" id="window"></div>

    <div class="ideas" id="ideas"></div>

    <div class="examples" id="examples"></div>
  </div>
</div>

<div class="controls">
  <div class="slider-wrap">
    <div class="slider-label">
      <span class="slider-title">Déplacer la fenêtre →</span>
      <span class="slider-val" id="sliderVal">Centre</span>
    </div>
    <input type="range" id="slider" min="0" max="100" value="50">
  </div>

  <div>
    <div class="slider-title" style="margin-bottom:10px">Scénarios historiques</div>
    <div class="scenarios">
      <button class="scenario-btn" onclick="setScenario('mariage')">Mariage pour tous (2000→2013)</button>
      <button class="scenario-btn" onclick="setScenario('retraites')">Retraite à 65 ans (1990→2023)</button>
      <button class="scenario-btn" onclick="setScenario('cannabis')">Légalisation cannabis</button>
      <button class="scenario-btn" onclick="setScenario('revenu')">Revenu universel</button>
    </div>
  </div>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#5C1010"></div>Impensable</div>
  <div class="legend-item"><div class="legend-dot" style="background:#8B3A0A"></div>Radical</div>
  <div class="legend-item"><div class="legend-dot" style="background:#B86A1A"></div>Acceptable</div>
  <div class="legend-item"><div class="legend-dot" style="background:#2D6B4A"></div>Raisonnable</div>
  <div class="legend-item"><div class="legend-dot" style="background:#1A5038"></div>Populaire</div>
  <div class="legend-item"><div class="legend-dot" style="background:#102240"></div>Politique</div>
  <div class="legend-item" style="margin-left:auto">
    <div style="width:12px;height:12px;border:2px solid #C4A265;flex-shrink:0"></div>
    Fenêtre d'Overton
  </div>
</div>

<script>
const scenarios = {
  mariage: {
    pos: 60,
    ideas: [
      { icon: '', text: 'Mariage unique homme-femme', zone: 0 },
      { icon: '', text: 'PACS (1999)', zone: 1 },
      { icon: '', text: 'Mariage pour tous', zone: 3 },
      { icon: '‍‍', text: 'Adoption homoparentale', zone: 3 },
      { icon: '', text: 'PMA pour toutes', zone: 4 },
      { icon: '', text: 'GPA encadrée', zone: 5 },
    ],
    example: '« En 2000, l\'union civile homosexuelle était "acceptable". En 2013, le mariage était devenu "politique". La fenêtre avait glissé de deux zones en treize ans. »',
  },
  retraites: {
    pos: 35,
    ideas: [
      { icon: '⏪', text: 'Retraite à 55 ans', zone: 0 },
      { icon: '', text: 'Retraite à 60 ans (1982)', zone: 1 },
      { icon: '', text: 'Retraite à 62 ans (2010)', zone: 3 },
      { icon: '', text: 'Retraite à 64 ans (2023)', zone: 4 },
      { icon: '', text: 'Retraite à 67 ans', zone: 4 },
      { icon: '️', text: 'Retraite à 70 ans', zone: 5 },
    ],
    example: '« En 1990, proposer 65 ans était "radical". En 2023, 64 ans a été voté. La fenêtre a glissé vers la droite sous la pression démographique et financière. »',
  },
  cannabis: {
    pos: 45,
    ideas: [
      { icon: '', text: 'Prohibition totale', zone: 0 },
      { icon: '', text: 'Usage médical encadré', zone: 2 },
      { icon: '', text: 'Dépénalisation usage', zone: 3 },
      { icon: '', text: 'Légalisation récréative', zone: 3 },
      { icon: '', text: 'Marché libre non taxé', zone: 5 },
      { icon: '', text: 'Distribution gratuite', zone: 5 },
    ],
    example: '« Légal au Canada et dans 24 États américains. En France, encore "acceptable" mais pas "raisonnable" selon les sondages de 2024. La fenêtre est en mouvement. »',
  },
  revenu: {
    pos: 25,
    ideas: [
      { icon: '', text: 'RSA ciblé', zone: 1 },
      { icon: '', text: 'Revenu d\'insertion', zone: 2 },
      { icon: '', text: 'Revenu universel partiel', zone: 3 },
      { icon: '', text: 'Revenu universel complet', zone: 3 },
      { icon: '', text: 'Revenu universel élevé', zone: 5 },
      { icon: '∞', text: 'Revenu illimité', zone: 5 },
    ],
    example: '« Expérimenté en Finlande, au Kenya, en Californie. En 2024, l\'idée est passée de "radicale" à "acceptable" dans le débat européen. La fenêtre bouge. »',
  },
}

let currentPos = 50
const positions = ['Très à gauche', 'À gauche', 'Centre-gauche', 'Centre', 'Centre-droit', 'À droite', 'Très à droite']

const slider = document.getElementById('slider')
const win = document.getElementById('window')
const ideasEl = document.getElementById('ideas')
const examplesEl = document.getElementById('examples')
const sliderVal = document.getElementById('sliderVal')

function setWindow(val) {
  const pct = val / 100
  const leftPct = pct * 66.666
  win.style.left = leftPct + '%'
  sliderVal.textContent = positions[Math.round(pct * 6)]
  updateIdeas(val)
}

function updateIdeas(val) {
  const winStart = val / 100 * 6
  const winEnd = winStart + 2

  ideasEl.querySelectorAll('.idea').forEach((el, i) => {
    const inWindow = i >= winStart && i < winEnd
    el.classList.toggle('in-window', inWindow)
  })
}

function renderIdeas(ideas) {
  ideasEl.innerHTML = ideas.map((idea, i) => `
    <div class="idea" style="order:${idea.zone}" data-zone="${idea.zone}">
      <div class="idea-icon">${idea.icon}</div>
      <div class="idea-text">${idea.text}</div>
    </div>
  `).join('')
}

function renderExample(text) {
  examplesEl.innerHTML = `<div class="example active">${text}</div>`
}

function setScenario(key) {
  document.querySelectorAll('.scenario-btn').forEach(b => b.classList.remove('active'))
  event.target.classList.add('active')

  const s = scenarios[key]
  renderIdeas(s.ideas)
  renderExample(s.example)
  slider.value = s.pos
  setWindow(s.pos)
}

// Init
slider.addEventListener('input', e => setWindow(parseInt(e.target.value)))

// Default ideas
const defaultIdeas = [
  { icon: '️', text: 'Tabou absolu', zone: 0 },
  { icon: '️', text: 'Idée radicale', zone: 1 },
  { icon: '', text: 'Débattable', zone: 2 },
  { icon: '', text: 'Acceptable', zone: 3 },
  { icon: '', text: 'Populaire', zone: 4 },
  { icon: '️', text: 'Loi en vigueur', zone: 5 },
]
renderIdeas(defaultIdeas)
renderExample('« Glissez le curseur pour déplacer la fenêtre, ou choisissez un scénario historique. »')
setWindow(50)
</script>
</body>
</html>
