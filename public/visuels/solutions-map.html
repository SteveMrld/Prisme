/* HEADER */

  position:fixed;top:0;left:0;right:0;height:52px;z-index:100;

/* FILTERS */

}

}
.fb:hover{border-color:rgba(255,255,255,.4);color:#FAF9F7}

/* CANVAS */
#wrap{position:fixed;top:104px;left:0;right:0;bottom:0}
svg{width:100%;height:100%}

/* TOOLTIP */
#tooltip{

  padding:14px 18px;max-width:240px;
  transform:translate(-50%,-100%) translateY(-12px);
  transition:opacity .15s;
}
#tooltip.hidden{opacity:0}
#tt-cat{font-size:8px;font-weight:600;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}

#tt-link{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:#C4A265;margin-top:8px}

/* PANEL mobile */
#panel{
  position:fixed;bottom:0;left:0;right:0;z-index:150;
  background:#111;border-top:2px solid #C4A265;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.25,.46,.45,.94);

}
#panel.open{transform:translateY(0)}
#ph{padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
#pcountry{font-family:'Playfair Display',serif;font-size:18px;color:#FAF9F7}
#pn{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#C4A265}
#pclose{background:none;border:none;color:rgba(255,255,255,.3);font-size:18px;cursor:pointer}
#plist{overflow-y:auto;padding:4px 0}
.si{padding:12px 20px;border-bottom:1px solid rgba(255,255,255,.05);text-decoration:none;display:block;color:inherit}
.si:active{background:rgba(255,255,255,.04)}
.sc{font-size:8px;font-weight:600;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}

/* HINT */
#hint{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.2);pointer-events:none;transition:opacity 1s;white-space:nowrap}

@media(max-width:768px){
  #hright{display:none}
  #filters{overflow-x:auto;flex-wrap:nowrap;padding:8px 16px}
  #wrap{top:98px}

const CAT_COLORS={
  'Économie circulaire':'#4A7FA5','Eau':'#5A8FB5','Océans':'#3A6A95',
  'Agriculture':'#A57A3A','Biodiversité':'#7A9A5A','Énergie':'#C48A2A',
  'Matériaux':'#8A6A4A','Sciences & Tech':'#7A5AAA','Climat':'#4A8A8A',
  'Santé':'#AA4A5A','Inclusion':'#8A4A8A',"Finance d'impact":'#5A7A9A',
  'Mobilité':'#4A5A8A','Autre':'#6A6A6A',
};

// Count by category
const catCounts={};
DATA.forEach(d=>{catCounts[d.cat]=(catCounts[d.cat]||0)+1});
const cats=Object.entries(catCounts).sort((a,b)=>b[1]-a[1]);

// Build filter buttons
const filtersEl=document.getElementById('filters');
cats.forEach(([cat,n])=>{
  const btn=document.createElement('button');
  btn.className='fb';
  btn.setAttribute('data-cat',cat);
  btn.textContent=cat+' · '+n;
  btn.style.cssText='';
  btn.onclick=()=>filter(btn,cat);
  filtersEl.appendChild(btn);
});

let activeFilter='Tout';
let simulation;

function filter(btn,cat){
  document.querySelectorAll('.fb').forEach(b=>{
    b.classList.remove('active');
    b.style.background='';
    b.style.color='';
    b.style.borderColor='';
  });
  btn.classList.add('active');
  const col=cat==='Tout'?'#FAF9F7':(CAT_COLORS[cat]||'#FAF9F7');
  btn.style.background=col;
  btn.style.color='#0A0A0A';
  btn.style.borderColor='transparent';
  activeFilter=cat;
  updateViz();
}

const svg=d3.select('#viz');
const wrap=document.getElementById('wrap');
const tooltip=document.getElementById('tooltip');
const isMobile=window.innerWidth<=768;

function updateViz(){
  const W=wrap.clientWidth, H=wrap.clientHeight;
  const filtered=activeFilter==='Tout'?DATA:DATA.filter(d=>d.cat===activeFilter);
  
  svg.selectAll('*').remove();
  if(simulation) simulation.stop();

  const nodes=filtered.map(d=>({...d,r:isMobile?16:20}));
  
  // Category cluster centers
  const catCenters={};
  const catList=[...new Set(filtered.map(d=>d.cat))];
  catList.forEach((cat,i)=>{
    const angle=(i/catList.length)*Math.PI*2 - Math.PI/2;
    const radius=Math.min(W,H)*0.28;
    catCenters[cat]={x:W/2+Math.cos(angle)*radius, y:H/2+Math.sin(angle)*radius};
  });

  simulation=d3.forceSimulation(nodes)
    .force('charge',d3.forceManyBody().strength(-2))
    .force('collide',d3.forceCollide(d=>d.r+2).iterations(3))
    .force('x',d3.forceX(d=>activeFilter==='Tout'?(catCenters[d.cat]?.x||W/2):W/2).strength(.08))
    .force('y',d3.forceY(d=>activeFilter==='Tout'?(catCenters[d.cat]?.y||H/2):H/2).strength(.08))
    .on('tick',ticked);

  const g=svg.append('g');
  
  const circles=g.selectAll('circle')
    .data(nodes)
    .join('circle')
    .attr('r',0)
    .attr('fill',d=>CAT_COLORS[d.cat]||'#6A6A6A')
    .attr('fill-opacity',.75)
    .attr('stroke',d=>CAT_COLORS[d.cat]||'#6A6A6A')
    .attr('stroke-width',1.5)
    .attr('stroke-opacity',.4)
    .style('cursor','pointer')
    .transition().duration(600).delay((_,i)=>i*4)
    .attr('r',d=>d.r);

  // Re-select for events
  g.selectAll('circle')
    .on('mouseover',function(event,d){
      if(isMobile) return;
      d3.select(this).attr('fill-opacity',1).attr('r',d.r+3);
      tooltip.classList.remove('hidden');
      document.getElementById('tt-cat').textContent=d.cat;
      document.getElementById('tt-cat').style.color=CAT_COLORS[d.cat]||'#C4A265';
      document.getElementById('tt-name').textContent=d.name;
      document.getElementById('tt-country').textContent=d.country;
      document.getElementById('tt-link').style.display=d.website?'block':'none';
      tooltip.style.left=event.clientX+'px';
      tooltip.style.top=event.clientY+'px';
    })
    .on('mousemove',function(event){
      if(isMobile) return;
      tooltip.style.left=event.clientX+'px';
      tooltip.style.top=event.clientY+'px';
    })
    .on('mouseout',function(_,d){
      if(isMobile) return;
      d3.select(this).attr('fill-opacity',.75).attr('r',d.r);
      tooltip.classList.add('hidden');
    })
    .on('click',function(_,d){
      if(d.website) window.open(d.website,'_blank');
    })
    .on('touchstart',function(event,d){
      event.preventDefault();
      openMobilePanel(d);
    },{passive:false});

  function ticked(){
    g.selectAll('circle')
      .attr('cx',d=>d.x=Math.max(d.r,Math.min(W-d.r,d.x)))
      .attr('cy',d=>d.y=Math.max(d.r,Math.min(H-d.r,d.y)));
  }

  // Category labels (desktop only)
  if(!isMobile && activeFilter==='Tout'){
    Object.entries(catCenters).forEach(([cat,pos])=>{
      svg.append('text')
        .attr('x',pos.x).attr('y',pos.y-55)
        .attr('text-anchor','middle')
        .attr('fill',CAT_COLORS[cat]||'#6A6A6A')
        .attr('font-size',9)
        .attr('font-weight',600)
        .attr('letter-spacing',2)
        .attr('font-family','DM Sans')
        .attr('opacity',.6)
        .text(cat.toUpperCase());
    });
  }
}

function openMobilePanel(d){
  document.getElementById('pcountry').textContent=d.name;
  document.getElementById('pn').textContent=d.cat+' · '+d.country;
  const list=document.getElementById('plist');
  list.innerHTML='';
  if(d.website){
    const a=document.createElement('a');
    a.className='si';a.href=d.website;a.target='_blank';a.rel='noopener noreferrer';
    const col=CAT_COLORS[d.cat]||'#C4A265';
    a.innerHTML=`<div class="sc" style="color:${col}">${d.cat}</div><div class="sn">${d.name}</div><div class="sr">${d.rawCat} · ${d.country}</div>`;
    list.appendChild(a);
  }
  document.getElementById('panel').classList.add('open');
  document.getElementById('hint').style.opacity='0';
}
function closePanel(){document.getElementById('panel').classList.remove('open')}

window.addEventListener('resize',()=>{svg.selectAll('*').remove();updateViz()});
updateViz();
setTimeout(()=>document.getElementById('hint').style.opacity='0',5000);
</script>
