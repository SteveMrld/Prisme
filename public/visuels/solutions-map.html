const CAT_COLORS={'Économie circulaire':'#1A3E6B','Eau':'#2A5A8A','Océans':'#0D3A6B','Agriculture':'#6B4A1A','Biodiversité':'#2A5A2A','Énergie':'#B86A1A','Matériaux':'#5A3A2A','Sciences & Tech':'#4A2080','Climat':'#1A4A5A','Santé':'#7A1A2A','Inclusion':'#5A1A5A',"Finance d'impact":'#2A4A6A','Mobilité':'#1A3A5A','Autre':'#3A3A3A'};

let selected=null;
const svg=d3.select('#map');
const wrap=document.getElementById('wrap');

function dotR(n){return n>=16?16:n>=6?10:5+n*.5}
function dotColor(n){return n>=16?'#1A3E6B':n>=6?'#B86A1A':'#C4A265'}

function render(){
  const W=wrap.clientWidth, H=wrap.clientHeight;
  svg.attr('viewBox',`0 0 ${W} ${H}`);
  
  const proj=d3.geoNaturalEarth1()
    .scale(Math.min(W/6.3, H/3.3))
    .translate([W/2, H/2]);
  const path=d3.geoPath().projection(proj);
  
  svg.selectAll('*').remove();
  
  // Graticule
  svg.append('path')
    .datum(d3.geoGraticule()())
    .attr('class','graticule')
    .attr('d',path);
  
  // World from CDN
  d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(world=>{
    svg.insert('path','*')
      .datum({type:'Sphere'})
      .attr('fill','#EAE7E0')
      .attr('d',path);
      
    svg.append('g')
      .selectAll('path')
      .data(topojson.feature(world,world.objects.countries).features)
      .join('path')
      .attr('class','land')
      .attr('d',path);
      
    // Borders
    svg.append('path')
      .datum(topojson.mesh(world,world.objects.countries,(a,b)=>a!==b))
      .attr('fill','none')
      .attr('stroke','#D0CCC4')
      .attr('stroke-width',.4)
      .attr('d',path);

    // Dots
    const dots=svg.append('g').attr('class','dots');
    SOLUTIONS.forEach(c=>{
      const [x,y]=proj([c.lng,c.lat]);
      if(!x||!y) return;
      const n=c.solutions.length;
      const r=dotR(n);
      const col=dotColor(n);
      
      const g=dots.append('g')
        .attr('class','country-dot')
        .attr('transform',`translate(${x},${y})`)
        .style('cursor','pointer')
        .on('click',()=>openPanel(c))
        .on('mouseenter',function(){
          d3.select(this).select('.main-circle').attr('r',r*1.3);
          d3.select(this).select('.country-label').style('opacity',1);
          d3.select(this).append('circle').attr('class','pulse')
            .attr('r',r).attr('fill','none').attr('stroke',col).attr('stroke-width',1.5).attr('opacity',.5)
            .transition().duration(600).attr('r',r*2.5).attr('opacity',0).remove();
        })
        .on('mouseleave',function(){
          d3.select(this).select('.main-circle').attr('r',r);
        });

      // Shadow
      g.append('circle').attr('r',r+1).attr('fill','rgba(0,0,0,0.1)').attr('transform','translate(1,1)');
      // Main
      g.append('circle').attr('class','main-circle').attr('r',r).attr('fill',col).attr('stroke','rgba(255,255,255,0.8)').attr('stroke-width',1.5);
      // Label
      g.append('text').attr('class','dot-label').attr('dy','.05em').text(n);
      // Country name (hidden by default)
      g.append('text').attr('class','country-label')
        .attr('y',r+11).attr('font-size',9).attr('fill','#444').attr('text-anchor','middle')
        .style('opacity',0).style('pointer-events','none')
        .text(c.country.length>12?c.country.split(' ').slice(0,2).join(' '):c.country);
    });
  });
}

function openPanel(c){
  selected=c.country;
  document.getElementById('pcountry').textContent=c.country;
  document.getElementById('pn').textContent=c.solutions.length+' solution'+(c.solutions.length>1?'s':'');
  const list=document.getElementById('plist');
  list.innerHTML='';
  c.solutions.forEach(s=>{
    const a=document.createElement('a');
    a.className='si';
    a.href=s.website||'#';
    a.target='_blank';a.rel='noopener noreferrer';
    const col=CAT_COLORS[s.cat]||'#C4A265';
    a.innerHTML=`<div class="sc" style="color:${col}">${s.cat}</div><div class="sn">${s.name}</div><div class="sr">${s.rawCat}</div>${s.website?'<div class="sl">Voir le projet →</div>':''}`;
    list.appendChild(a);
  });
  document.getElementById('panel').classList.add('open');
  document.getElementById('hint').style.opacity='0';
}
function closePanel(){
  selected=null;
  document.getElementById('panel').classList.remove('open');
}

window.addEventListener('resize',render);
render();
setTimeout(()=>document.getElementById('hint').style.opacity='0',5000);
</script>
