l", "website": "https://www.soilytix.com"}, {"name": "betterSoil", "cat": "Agriculture", "rawCat": "AgriTech", "country": "Israel", "website": "https://bettersoil.co"}, {"name": "Darah Solutions Lab", "cat": "Autre", "rawCat": "Textile Circularity", "country": "Saudi Arabia", "website": "https://prezi.com/p/zbn-85hkklc7/darah-solutions-lab/"}]}];
const CAT_COLORS = {
  'Économie circulaire':'#5A8FC0','Eau':'#6AAAD0','Océans':'#3A7AB0',
  'Agriculture':'#C09040','Biodiversité':'#80A850','Énergie':'#D0901A',
  'Matériaux':'#A07050','Sciences & Tech':'#8060C0','Climat':'#50A0A0',
  'Santé':'#C04060','Inclusion':'#A050A0',"Finance d'impact":'#5080A0',
  'Mobilité':'#4060A0','Autre':'#707070',
};

// THREE.JS GLOBE
const W = window.innerWidth, H = window.innerHeight;
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, W/H, 0.1, 1000);
camera.position.z = 2.5;

const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.insertBefore(renderer.domElement, document.getElementById('labels'));
renderer.domElement.style.cssText = 'position:fixed;top:0;left:0;z-index:1';

// Globe
const geo = new THREE.SphereGeometry(1, 64, 64);
const loader = new THREE.TextureLoader();

// Earth texture from CDN
loader.load('https://cdn.jsdelivr.net/gh/turban/Leaflet.Mask@master/examples/img/osm.png', tex => {}, undefined, () => {});

// Simple gradient globe
const mat = new THREE.MeshPhongMaterial({
  color: 0x1A2A4A,
  emissive: 0x0A1520,
  specular: 0x334466,
  shininess: 15,
  transparent: true,
  opacity: 0.92,
});
const globe = new THREE.Mesh(geo, mat);
scene.add(globe);

// Atmosphere glow
const atmGeo = new THREE.SphereGeometry(1.04, 64, 64);
const atmMat = new THREE.MeshPhongMaterial({
  color: 0x2244AA,
  transparent: true,
  opacity: 0.08,
  side: THREE.BackSide,
});
scene.add(new THREE.Mesh(atmGeo, atmMat));

// Grid lines on globe
function addGraticule() {
  const mat = new THREE.LineBasicMaterial({color:0x334466, transparent:true, opacity:0.3});
  for(let lat=-60;lat<=60;lat+=30) {
    const pts=[];
    for(let lng=0;lng<=360;lng+=2) {
      const phi=(90-lat)*Math.PI/180, theta=lng*Math.PI/180;
      pts.push(new THREE.Vector3(Math.sin(phi)*Math.cos(theta),Math.cos(phi),Math.sin(phi)*Math.sin(theta)));
    }
    scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),mat));
  }
  for(let lng=0;lng<360;lng+=60) {
    const pts=[];
    for(let lat=-90;lat<=90;lat+=2) {
      const phi=(90-lat)*Math.PI/180, theta=lng*Math.PI/180;
      pts.push(new THREE.Vector3(Math.sin(phi)*Math.cos(theta),Math.cos(phi),Math.sin(phi)*Math.sin(theta)));
    }
    scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),mat));
  }
}
addGraticule();

// Zone markers
const markers = [];
ZONES.forEach(zone => {
  const phi = (90-zone.lat)*Math.PI/180;
  const theta = zone.lng*Math.PI/180;
  const pos = new THREE.Vector3(Math.sin(phi)*Math.cos(theta), Math.cos(phi), Math.sin(phi)*Math.sin(theta));

  // Outer ring
  const ringGeo = new THREE.TorusGeometry(0.045+zone.count/3000, 0.004, 8, 32);
  const ringMat = new THREE.MeshBasicMaterial({color: parseInt(zone.color.replace('#','0x')), transparent:true, opacity:0.6});
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.position.copy(pos);
  ring.lookAt(new THREE.Vector3(0,0,0));
  scene.add(ring);

  // Inner dot
  const dotGeo = new THREE.SphereGeometry(0.022+zone.count/5000, 16, 16);
  const dotMat = new THREE.MeshBasicMaterial({color: parseInt(zone.color.replace('#','0x'))});
  const dot = new THREE.Mesh(dotGeo, dotMat);
  dot.position.copy(pos);
  scene.add(dot);

  markers.push({zone, pos, ring, dot});
});

// Lighting
scene.add(new THREE.AmbientLight(0x334466, 0.8));
const sun = new THREE.DirectionalLight(0x88AADD, 1.2);
sun.position.set(3, 2, 3);
scene.add(sun);

// Rotation
let isDragging=false, prevMouse={x:0,y:0}, autoRotate=true;
const rotSpeed=0.003;

const canvas = renderer.domElement;
canvas.addEventListener('mousedown', e=>{isDragging=true;prevMouse={x:e.clientX,y:e.clientY};autoRotate=false});
canvas.addEventListener('mousemove', e=>{
  if(!isDragging) return;
  globe.rotation.y += (e.clientX-prevMouse.x)*0.008;
  globe.rotation.x += (e.clientY-prevMouse.y)*0.008;
  globe.rotation.x = Math.max(-1.2,Math.min(1.2,globe.rotation.x));
  prevMouse={x:e.clientX,y:e.clientY};
  updateLabels();
});
canvas.addEventListener('mouseup',()=>{isDragging=false;setTimeout(()=>autoRotate=true,3000)});

let touchStart={x:0,y:0};
canvas.addEventListener('touchstart',e=>{
  touchStart={x:e.touches[0].clientX,y:e.touches[0].clientY};
  autoRotate=false;
},{passive:true});
canvas.addEventListener('touchmove',e=>{
  const dx=e.touches[0].clientX-touchStart.x, dy=e.touches[0].clientY-touchStart.y;
  globe.rotation.y+=dx*0.008; globe.rotation.x+=dy*0.008;
  globe.rotation.x=Math.max(-1.2,Math.min(1.2,globe.rotation.x));
  touchStart={x:e.touches[0].clientX,y:e.touches[0].clientY};
  updateLabels();
},{passive:true});
canvas.addEventListener('touchend',()=>{setTimeout(()=>autoRotate=true,3000)});

// Click to open zone
canvas.addEventListener('click', e=>{
  const mouse = new THREE.Vector2(
    (e.clientX/W)*2-1,
    -(e.clientY/H)*2+1
  );
  const raycaster = new THREE.Raycaster();
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(markers.map(m=>m.dot));
  if(hits.length) {
    const m = markers.find(m=>m.dot===hits[0].object);
    if(m) openPanel(m.zone);
  }
});
canvas.addEventListener('touchend', e=>{
  if(Math.hypot(e.changedTouches[0].clientX-touchStart.x, e.changedTouches[0].clientY-touchStart.y)<10) {
    const mouse = new THREE.Vector2(
      (e.changedTouches[0].clientX/W)*2-1,
      -(e.changedTouches[0].clientY/H)*2+1
    );
    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(markers.map(m=>m.dot));
    if(hits.length) {
      const m=markers.find(m=>m.dot===hits[0].object);
      if(m) openPanel(m.zone);
    }
  }
},{passive:true});

// Project 3D → 2D for HTML labels
function project3D(pos) {
  const v = pos.clone().applyQuaternion(globe.quaternion);
  const vp = v.clone().project(camera);
  return {
    x: (vp.x+1)/2*W,
    y: (1-vp.y)/2*H,
    visible: v.z > 0
  };
}

// HTML labels
const labelsEl = document.getElementById('labels');
ZONES.forEach(zone => {
  const div = document.createElement('div');
  div.className = 'zlabel';
  div.id = 'label-'+zone.name.replace(/\s/g,'_');
  div.innerHTML = `<div class="zcount" style="border-color:${zone.color};color:${zone.color}">${zone.count}</div><div class="zname" style="color:${zone.color}">${zone.name}</div>`;
  div.style.cursor = 'pointer';
  div.onclick = () => openPanel(zone);
  labelsEl.appendChild(div);
});

function updateLabels() {
  markers.forEach(({zone, pos}) => {
    const {x, y, visible} = project3D(pos);
    const el = document.getElementById('label-'+zone.name.replace(/\s/g,'_'));
    if(el) {
      el.style.left = x+'px';
      el.style.top = (y+52)+'px';
      el.style.opacity = visible ? '1' : '0';
      el.style.pointerEvents = visible ? 'auto' : 'none';
    }
  });
}

function openPanel(zone) {
  document.getElementById('pzone').textContent = zone.name;
  document.getElementById('pcount').textContent = zone.count+' solution'+(zone.count>1?'s':'');
  document.getElementById('pcount').style.color = zone.color;
  const list = document.getElementById('plist');
  list.innerHTML = '';
  zone.solutions.forEach(s => {
    const a = document.createElement('a');
    a.className = 'si';
    a.href = s.website||'#';
    a.target = '_blank'; a.rel = 'noopener noreferrer';
    const col = CAT_COLORS[s.cat]||'#C4A265';
    a.innerHTML = `<div class="sc" style="color:${col}">${s.cat}</div><div class="sn">${s.name}</div><div class="sr">${s.rawCat}${s.country?' · '+s.country:''}</div>${s.website?'<div class="sl">Voir le projet →</div>':''}`;
    list.appendChild(a);
  });
  document.getElementById('panel').classList.add('open');
  document.getElementById('hint').style.opacity='0';
}
function closePanel(){document.getElementById('panel').classList.remove('open')}

function animate() {
  requestAnimationFrame(animate);
  if(autoRotate) { globe.rotation.y += rotSpeed; }
  // Pulse rings
  const t = Date.now()*0.001;
  markers.forEach(({ring},i)=>{ring.material.opacity=0.4+Math.sin(t*1.5+i)*0.25});
  updateLabels();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

setTimeout(()=>document.getElementById('hint').style.opacity='0',5000);
</script>
</body>
</html>
