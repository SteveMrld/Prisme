 "website": "https://arbimon.rfcx.org"}, {"name": "Brightest", "cat": "Autre", "rawCat": "ESG / Climate Software", "country": "United States", "website": "https://www.brightest.io"}, {"name": "Humanitarian OpenStreetMap Team", "cat": "Inclusion", "rawCat": "Inclusion / Mapping", "country": "United States", "website": "https://www.hotosm.org"}, {"name": "Loop", "cat": "Autre", "rawCat": "Circular Reuse", "country": "United States", "website": "https://www.loopstore.com"}, {"name": "Mycocycle", "cat": "Économie circulaire", "rawCat": "Circularity / Materials", "country": "United States", "website": "https://mycocycle.com/"}, {"name": "Rainforest Connection", "cat": "Biodiversité", "rawCat": "Biodiversity / Monitoring", "country": "United States", "website": "https://rfcx.org"}, {"name": "Snova", "cat": "Autre", "rawCat": "Bioinnovation", "country": "United States", "website": "https://www.snova.bio"}, {"name": "Werewool", "cat": "Matériaux", "rawCat": "Materials", "country": "United States", "website": "https://www.werewool.bio"}, {"name": "World Resources Institute", "cat": "Climat", "rawCat": "Climate / Data / Policy", "country": "United States", "website": "https://www.wri.org"}, {"name": "re:3D", "cat": "Économie circulaire", "rawCat": "Circularity / Manufacturing", "country": "United States", "website": "https://re3d.org"}]}, {"name": "Afrique", "lat": 5.0, "lng": 20.0, "color": "#D0823A", "count": 8, "solutions": [{"name": "Wandusoa", "cat": "Agriculture", "rawCat": "Agri / Food", "country": "Cameroon", "website": "https://wandusoa.org/"}, {"name": "Skin Gourmet", "cat": "Autre", "rawCat": "Sustainable Beauty", "country": "Ghana", "website": "https://skingourmet.com"}, {"name": "FarmBizAfrica", "cat": "Agriculture", "rawCat": "AgriTech / Carbon / Advisory", "country": "Kenya", "website": "https://www.farmbizafrica.com"}, {"name": "MAASH", "cat": "Agriculture", "rawCat": "Food / Agri", "country": "Kenya", "website": "https://maashfoods.com"}, {"name": "Reality Ac l", "website": "https://www.soilytix.com"}, {"name": "betterSoil", "cat": "Agriculture", "rawCat": "AgriTech", "country": "Israel", "website": "https://bettersoil.co"}, {"name": "Darah Solutions Lab", "cat": "Autre", "rawCat": "Textile Circularity", "country": "Saudi Arabia", "website": "https://prezi.com/p/zbn-85hkklc7/darah-solutions-lab/"}]}];
const CAT_COLORS = {'Économie circulaire':'#5A8FC0','Eau':'#6AAAD0','Océans':'#3A7AB0','Agriculture':'#C09040','Biodiversité':'#80A850','Énergie':'#D0901A','Matériaux':'#A07050','Sciences & Tech':'#8060C0','Climat':'#50A0A0','Santé':'#C04060','Inclusion':'#A050A0',"Finance d'impact":'#5080A0','Mobilité':'#4060A0','Autre':'#707070'};

const W = window.innerWidth, H = window.innerHeight;
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(40, W/H, 0.1, 1000);
camera.position.z = 2.6;

const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
document.getElementById('canvas-wrap').appendChild(renderer.domElement);

// OrbitControls
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.enableZoom = false;
controls.enablePan = false;
controls.minPolarAngle = Math.PI * 0.2;
controls.maxPolarAngle = Math.PI * 0.8;
controls.rotateSpeed = 0.4;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.4;

// Stars background
const starGeo = new THREE.BufferGeometry();
const starVerts = [];
for(let i=0;i<6000;i++){
  const theta=Math.random()*Math.PI*2, phi=Math.acos(2*Math.random()-1);
  const r=80+Math.random()*20;
  starVerts.push(r*Math.sin(phi)*Math.cos(theta), r*Math.cos(phi), r*Math.sin(phi)*Math.sin(theta));
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVerts, 3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({color:0xffffff, size:0.15, transparent:true, opacity:0.6})));

// Earth with NASA texture
const texLoader = new THREE.TextureLoader();
const earthGeo = new THREE.SphereGeometry(1, 64, 64);

// Load real Earth textures
const earthTex = texLoader.load('https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/textures/planets/earth_atmos_2048.jpg');
const bumpTex = texLoader.load('https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/textures/planets/earth_normal_2048.jpg');
const specTex = texLoader.load('https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/textures/planets/earth_specular_2048.jpg');

const earthMat = new THREE.MeshPhongMaterial({
  map: earthTex,
  bumpMap: bumpTex,
  bumpScale: 0.05,
  specularMap: specTex,
  specular: new THREE.Color(0x334466),
  shininess: 20,
});
const earth = new THREE.Mesh(earthGeo, earthMat);
scene.add(earth);

// Clouds layer
const cloudTex = texLoader.load('https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/textures/planets/earth_clouds_1024.png');
const cloudMat = new THREE.MeshPhongMaterial({map:cloudTex, transparent:true, opacity:0.35, depthWrite:false});
const clouds = new THREE.Mesh(new THREE.SphereGeometry(1.01, 64, 64), cloudMat);
scene.add(clouds);

// Atmosphere
const atmMat = new THREE.MeshPhongMaterial({
  color: 0x4488FF, transparent:true, opacity:0.12, side:THREE.BackSide
});
scene.add(new THREE.Mesh(new THREE.SphereGeometry(1.06, 64, 64), atmMat));

// Lighting — sun from one side
const sunLight = new THREE.DirectionalLight(0xFFEECC, 1.4);
sunLight.position.set(5, 3, 5);
scene.add(sunLight);
scene.add(new THREE.AmbientLight(0x223355, 0.5));

// Zone markers — glowing dots on sphere surface
const markerMeshes = [];
function latLngToVec3(lat, lng, r=1.02) {
  const phi = (90-lat)*Math.PI/180;
  const theta = (lng+180)*Math.PI/180;
  return new THREE.Vector3(
    -r*Math.sin(phi)*Math.cos(theta),
    r*Math.cos(phi),
    r*Math.sin(phi)*Math.sin(theta)
  );
}

ZONES.forEach(zone => {
  const pos = latLngToVec3(zone.lat, zone.lng);
  const col = parseInt(zone.color.replace('#',''), 16);

  // Glow sphere
  const glowGeo = new THREE.SphereGeometry(0.032+zone.count/4000, 16, 16);
  const glowMat = new THREE.MeshBasicMaterial({color:col, transparent:true, opacity:0.8});
  const glow = new THREE.Mesh(glowGeo, glowMat);
  glow.position.copy(pos);
  earth.add(glow);

  // Outer ring
  const ringGeo = new THREE.TorusGeometry(0.055+zone.count/3500, 0.005, 8, 32);
  const ringMat = new THREE.MeshBasicMaterial({color:col, transparent:true, opacity:0.5});
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.position.copy(pos);
  ring.lookAt(new THREE.Vector3(0,0,0));
  earth.add(ring);

  markerMeshes.push({zone, glow, ring, pos});
});

// HTML zone labels
const labelsEl = document.getElementById('labels');
ZONES.forEach(zone => {
  const div = document.createElement('div');
  div.className = 'zlabel';
  div.id = 'lbl_'+zone.name.replace(/[^a-zA-Z]/g,'');
  const hexCol = zone.color;
  const rgba = hexCol+'33';
  div.innerHTML = `
    <div class="zbubble" style="background:rgba(0,0,0,.5);border-color:${hexCol};color:${hexCol}">
      <span class="zbubble-n">${zone.count}</span>
      <span class="zbubble-s">sol.</span>
    </div>
    <div class="zname">${zone.name}</div>`;
  div.onclick = () => openPanel(zone);
  labelsEl.appendChild(div);
});

function project(worldPos) {
  const pos = worldPos.clone().applyMatrix4(earth.matrixWorld);
  const dir = pos.clone().normalize();
  const camDir = camera.position.clone().normalize();
  const visible = dir.dot(camDir) > 0.05;
  const projected = pos.clone().project(camera);
  return {
    x: (projected.x+1)/2*window.innerWidth,
    y: (1-projected.y)/2*window.innerHeight,
    visible
  };
}

function updateLabels() {
  markerMeshes.forEach(({zone, pos}) => {
    const {x, y, visible} = project(pos);
    const el = document.getElementById('lbl_'+zone.name.replace(/[^a-zA-Z]/g,''));
    if(el) {
      el.style.left = x+'px';
      el.style.top = (y+52)+'px';
      el.style.opacity = visible ? '1' : '0';
      el.style.pointerEvents = visible ? 'auto' : 'none';
    }
  });
}

// Raycaster for click
const raycaster = new THREE.Raycaster();
renderer.domElement.addEventListener('click', e => {
  const mouse = new THREE.Vector2((e.clientX/W)*2-1, -(e.clientY/H)*2+1);
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(markerMeshes.map(m=>m.glow));
  if(hits.length) {
    const m = markerMeshes.find(m=>m.glow===hits[0].object);
    if(m) { openPanel(m.zone); controls.autoRotate=false; setTimeout(()=>controls.autoRotate=true,8000); }
  }
});

function openPanel(zone) {
  document.getElementById('pzone').textContent = zone.name;
  document.getElementById('pcount').textContent = zone.count+' solution'+(zone.count>1?'s':'');
  document.getElementById('pcount').style.color = zone.color;
  const list = document.getElementById('plist');
  list.innerHTML='';
  zone.solutions.forEach(s=>{
    const a=document.createElement('a');
    a.className='si';a.href=s.website||'#';a.target='_blank';a.rel='noopener noreferrer';
    const col=CAT_COLORS[s.cat]||'#C4A265';
    a.innerHTML=`<div class="sc" style="color:${col}">${s.cat}</div><div class="sn">${s.name}</div><div class="sr">${s.rawCat}${s.country?' · '+s.country:''}</div>${s.website?'<div class="sl">Voir le projet →</div>':''}`;
    list.appendChild(a);
  });
  document.getElementById('panel').classList.add('open');
  document.getElementById('hint').style.opacity='0';
}
function closePanel(){document.getElementById('panel').classList.remove('open')}

const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  clouds.rotation.y = t * 0.00015;
  markerMeshes.forEach(({ring},i)=>{ ring.material.opacity=0.3+Math.sin(t*1.8+i*1.1)*0.2; });
  controls.update();
  updateLabels();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

setTimeout(()=>document.getElementById('hint').style.opacity='0',5000);
</script>
</body>
</html>
