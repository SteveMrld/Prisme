#pcat{font-size:8px;font-weight:600;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}

ame": "TETMET", "cat": "Matériaux", "rawCat": "Materials", "country": "United Kingdom", "website": "https://tetmet.com"}, {"name": "explorer.land", "cat": "Autre", "rawCat": "Nature Finance / Restoration", "country": "United Kingdom", "website": "https://explorer.land"}, {"name": "Arbimon", "cat": "Biodiversité", "rawCat": "Biodiversity / Bioacoustics", "country": "United States", "website": "https://arbimon.rfcx.org"}, {"name": "Brightest", "cat": "Autre", "rawCat": "ESG / Climate Software", "country": "United States", "website": "https://www.brightest.io"}, {"name": "Humanitarian OpenStreetMap Team", "cat": "Inclusion", "rawCat": "Inclusion / Mapping", "country": "United States", "website": "https://www.hotosm.org"}, {"name": "Loop", "cat": "Autre", "rawCat": "Circular Reuse", "country": "United States", "website": "https://www.loopstore.com"}, {"name": "Mycocycle", "cat": "Économie circulaire", "rawCat": "Circularity / Materials", "country": "United States", "website": "https://mycocycle.com/"}, {"name": "Rainforest Connection", "cat": "Biodiversité", "rawCat": "Biodiversity / Monitoring", "country": "United States", "website": "https://rfcx.org"}, {"name": "Snova", "cat": "Autre", "rawCat": "Bioinnovation", "country": "United States", "website": "https://www.snova.bio"}, {"name": "Werewool", "cat": "Matériaux", "rawCat": "Materials", "country": "United States", "website": "https://www.werewool.bio"}, {"name": "World Resources Institute", "cat": "Climat", "rawCat": "Climate / Data / Policy", "country": "United States", "website": "https://www.wri.org"}, {"name": "re:3D", "cat": "Économie circulaire", "rawCat": "Circularity / Manufacturing", "country": "United States", "website": "https://re3d.org"}];

const CATS = {
  'Économie circulaire': '#5A8FC0',
  'Eau':                 '#6AAAD0',
  'Océans':              '#3A7AB0',
  'Agriculture':         '#C09040',
  'Biodiversité':        '#80A850',
  'Énergie':             '#D0901A',
  'Matériaux':           '#A07050',
  'Sciences & Tech':     '#8060C0',
  'Climat':              '#50A0A0',
  'Santé':               '#C04060',
  'Inclusion':           '#A050A0',
  "Finance d'impact":   '#5080A0',
  'Mobilité':            '#4060A0',
  'Autre':               '#707070',
};

// Build filter bar
const catCounts = {};
DATA.forEach(d => { catCounts[d.cat] = (catCounts[d.cat]||0)+1 });
const filtersEl = document.getElementById('filters');
Object.entries(catCounts).sort((a,b)=>b[1]-a[1]).forEach(([cat,n]) => {
  const btn = document.createElement('button');
  btn.className = 'fb';
  btn.setAttribute('data-cat', cat);
  btn.textContent = cat + ' · ' + n;
  btn.onclick = () => setFilter(btn, cat);
  filtersEl.appendChild(btn);
});

let activeFilter = 'Tout';
let sim, currentNodes = [];
const isMobile = window.innerWidth <= 768;

const svg = d3.select('#viz');
const wrap = document.getElementById('wrap');

function bubbleR(d, W, H) {
  const base = Math.min(W, H);
  const filtered = activeFilter === 'Tout' ? DATA : DATA.filter(x => x.cat === activeFilter);
  const n = filtered.length;
  // Scale radius based on available space
  const area = (W * H * 0.72) / n;
  return Math.max(isMobile ? 28 : 32, Math.min(isMobile ? 52 : 62, Math.sqrt(area / Math.PI)));
}

function shortName(name, r) {
  const maxChars = Math.floor(r / 5);
  if (name.length <= maxChars) return name;
  // Try first word
  const words = name.split(' ');
  if (words[0].length <= maxChars) return words[0];
  return name.slice(0, maxChars - 1) + '…';
}

function setFilter(btn, cat) {
  document.querySelectorAll('.fb').forEach(b => {
    b.classList.remove('active');
    b.style.background = b.style.color = b.style.borderColor = '';
  });
  btn.classList.add('active');
  const col = cat === 'Tout' ? '#FAF9F7' : (CATS[cat] || '#FAF9F7');
  btn.style.background = col;
  btn.style.color = '#0A0A0A';
  btn.style.borderColor = 'transparent';
  activeFilter = cat;
  render();
}

function render() {
  const W = wrap.clientWidth, H = wrap.clientHeight;
  svg.attr('viewBox', `0 0 ${W} ${H}`);
  svg.selectAll('*').remove();
  if (sim) sim.stop();

  const filtered = activeFilter === 'Tout' ? DATA : DATA.filter(d => d.cat === activeFilter);
  const r = bubbleR(null, W, H);

  const nodes = filtered.map((d, i) => ({
    ...d, r,
    x: W/2 + (Math.random()-.5)*60,
    y: H/2 + (Math.random()-.5)*60,
  }));

  // Cluster centers by category (for "Tout" mode)
  const catList = [...new Set(filtered.map(d => d.cat))];
  const clusterCenters = {};
  catList.forEach((cat, i) => {
    const angle = (i / catList.length) * Math.PI * 2 - Math.PI/2;
    const rad = Math.min(W, H) * (isMobile ? 0.3 : 0.28);
    clusterCenters[cat] = {
      x: W/2 + Math.cos(angle) * rad,
      y: H/2 + Math.sin(angle) * rad,
    };
  });

  sim = d3.forceSimulation(nodes)
    .force('charge', d3.forceManyBody().strength(-3))
    .force('collide', d3.forceCollide(d => d.r + 3).iterations(4))
    .force('x', d3.forceX(d => activeFilter === 'Tout' ? (clusterCenters[d.cat]?.x || W/2) : W/2).strength(.06))
    .force('y', d3.forceY(d => activeFilter === 'Tout' ? (clusterCenters[d.cat]?.y || H/2) : H/2).strength(.06))
    .alphaDecay(0.02)
    .on('tick', ticked);

  const g = svg.append('g');

  // Draw bubbles
  const gs = g.selectAll('g.bub')
    .data(nodes)
    .join('g')
    .attr('class', 'bub')
    .style('cursor', 'pointer')
    .attr('opacity', 0);

  // Circle
  gs.append('circle')
    .attr('r', 0)
    .attr('fill', d => CATS[d.cat] || '#707070')
    .attr('fill-opacity', .18)
    .attr('stroke', d => CATS[d.cat] || '#707070')
    .attr('stroke-width', 1.5)
    .attr('stroke-opacity', .7)
    .transition().duration(800).delay((_, i) => i * 8)
    .attr('r', d => d.r);

  // Entrance opacity
  gs.transition().duration(600).delay((_, i) => i * 8 + 200).attr('opacity', 1);

  // Name text
  gs.append('text')
    .attr('class', 'bname')
    .attr('y', d => r > 42 ? -6 : 0)
    .attr('font-size', d => Math.max(8, Math.min(11, d.r / 4.5)))
    .text(d => shortName(d.name, d.r));

  // Country text (only if bubble big enough)
  gs.filter(d => d.r > 38)
    .append('text')
    .attr('class', 'bcat')
    .attr('y', 10)
    .attr('font-size', 7)
    .attr('fill-opacity', .45)
    .text(d => d.country);

  // Category labels for clusters (desktop "Tout" mode)
  if (!isMobile && activeFilter === 'Tout') {
    Object.entries(clusterCenters).forEach(([cat, pos]) => {
      svg.append('text')
        .attr('x', pos.x)
        .attr('y', pos.y - r - 14)
        .attr('text-anchor', 'middle')
        .attr('fill', CATS[cat] || '#707070')
        .attr('fill-opacity', .5)
        .attr('font-size', 8)
        .attr('font-weight', 600)
        .attr('letter-spacing', 2)
        .attr('font-family', 'DM Sans')
        .text(cat.toUpperCase());
    });
  }

  // Events
  const tip = document.getElementById('tip');

  gs.on('mouseenter', function(event, d) {
    if (isMobile) return;
    d3.select(this).select('circle')
      .attr('fill-opacity', .35)
      .attr('stroke-opacity', 1);
    document.getElementById('tip-cat').textContent = d.cat;
    document.getElementById('tip-cat').style.color = CATS[d.cat] || '#C4A265';
    document.getElementById('tip-name').textContent = d.name;
    document.getElementById('tip-loc').textContent = d.country + (d.rawCat ? ' · ' + d.rawCat : '');
    document.getElementById('tip-cta').style.display = d.website ? 'block' : 'none';
    tip.style.opacity = '1';
    tip.style.left = (event.clientX + 14) + 'px';
    tip.style.top = (event.clientY - 10) + 'px';
  })
  .on('mousemove', function(event) {
    if (isMobile) return;
    tip.style.left = (event.clientX + 14) + 'px';
    tip.style.top = (event.clientY - 10) + 'px';
  })
  .on('mouseleave', function(_, d) {
    if (isMobile) return;
    d3.select(this).select('circle').attr('fill-opacity', .18).attr('stroke-opacity', .7);
    tip.style.opacity = '0';
  })
  .on('click', function(_, d) {
    if (!isMobile && d.website) { window.open(d.website, '_blank'); return; }
    openPanel(d);
  })
  .on('touchstart', function(event, d) {
    event.preventDefault();
    openPanel(d);
  }, { passive: false });

  function ticked() {
    g.selectAll('g.bub')
      .attr('transform', d => {
        d.x = Math.max(d.r + 2, Math.min(W - d.r - 2, d.x));
        d.y = Math.max(d.r + 2, Math.min(H - d.r - 2, d.y));
        return `translate(${d.x},${d.y})`;
      });
  }
}

function openPanel(d) {
  document.getElementById('pname').textContent = d.name;
  document.getElementById('pmeta').textContent = d.cat + ' · ' + d.country;
  document.getElementById('pmeta').style.color = CATS[d.cat] || '#C4A265';
  document.getElementById('pcat').textContent = d.rawCat;
  document.getElementById('pcat').style.color = CATS[d.cat] || '#C4A265';
  const link = document.getElementById('plink');
  if (d.website) {
    link.href = d.website;
    link.style.display = 'inline-block';
  } else {
    link.style.display = 'none';
  }
  document.getElementById('panel').classList.add('open');
  document.getElementById('hint').style.opacity = '0';
}
function closePanel() {
  document.getElementById('panel').classList.remove('open');
}

window.addEventListener('resize', render);
render();
setTimeout(() => document.getElementById('hint').style.opacity = '0', 5000);
</script>
