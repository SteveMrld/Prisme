<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#F8F6F2;font-family:'DM Sans',sans-serif}

/* HEADER */
#header{
  position:fixed;top:0;left:0;right:0;height:52px;z-index:100;
  background:#F8F6F2;border-bottom:1px solid #E0DDD8;
  display:flex;align-items:center;justify-content:space-between;padding:0 24px;
}
#header-left{display:flex;align-items:center;gap:16px}
#back{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#999;text-decoration:none;transition:color .2s}
#back:hover{color:#1A1A1A}
#header-title{font-family:'Playfair Display',serif;font-size:18px;color:#1A1A1A}
#header-title em{color:#C4A265;font-style:italic}
#header-sub{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#C4A265}
#header-count{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#999}

/* MAP */
#map{position:fixed;top:52px;left:0;right:0;bottom:0}
canvas{display:block}

/* PANEL */
#panel{
  position:fixed;top:52px;right:0;bottom:0;width:360px;
  background:#1A1A1A;transform:translateX(100%);transition:transform .35s cubic-bezier(.25,.46,.45,.94);
  z-index:50;display:flex;flex-direction:column;overflow:hidden;
}
#panel.open{transform:translateX(0)}
#panel-head{
  padding:28px 28px 20px;border-bottom:1px solid rgba(255,255,255,.08);
  display:flex;align-items:flex-start;justify-content:space-between;flex-shrink:0;
}
#panel-country{font-family:'Playfair Display',serif;font-size:26px;color:#FAF9F7;font-weight:400}
#panel-n{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#C4A265;margin-top:4px}
#panel-close{
  background:none;border:none;color:rgba(255,255,255,.3);font-size:20px;cursor:pointer;
  padding:4px;transition:color .2s;flex-shrink:0;margin-top:4px;
}
#panel-close:hover{color:#FAF9F7}
#panel-list{flex:1;overflow-y:auto;padding:12px 0}
#panel-list::-webkit-scrollbar{width:2px}
#panel-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1)}

.sol-item{
  padding:16px 28px;border-bottom:1px solid rgba(255,255,255,.05);
  transition:background .15s;cursor:pointer;text-decoration:none;display:block;color:inherit;
}
.sol-item:hover{background:rgba(255,255,255,.04)}
.sol-cat{font-size:8px;font-weight:600;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.sol-name{font-family:'Playfair Display',serif;font-size:16px;color:#FAF9F7;line-height:1.3;margin-bottom:4px}
.sol-raw{font-size:10px;color:rgba(255,255,255,.35);letter-spacing:.3px}
.sol-link{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:#C4A265;margin-top:8px;display:inline-block;opacity:0;transition:opacity .15s}
.sol-item:hover .sol-link{opacity:1}

/* HINT */
#hint{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(26,26,26,.4);
  pointer-events:none;transition:opacity 1s;white-space:nowrap;
}

/* LEGEND */
#legend{
  position:fixed;bottom:24px;left:24px;z-index:40;
  display:flex;flex-direction:column;gap:6px;
}
.leg-item{display:flex;align-items:center;gap:8px;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:#666}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* MOBILE */
@media(max-width:768px){
  #panel{width:100%;top:auto;height:65vh;transform:translateY(100%)}
  #panel.open{transform:translateY(0)}
  #legend{display:none}
  #header-sub{display:none}
}
</style>
</head>

ire", "rawCat": "Circularity / Manufacturing", "website": "https://re3d.org"}]}];

const CAT_COLORS = {
  'Économie circulaire':'#1A3E6B','Eau':'#2A5A8A','Océans':'#0D3A6B',
  'Agriculture':'#6B4A1A','Biodiversité':'#2A5A2A','Énergie':'#B86A1A',
  'Matériaux':'#5A3A2A','Sciences & Tech':'#4A2080','Climat':'#1A4A5A',
  'Santé':'#7A1A2A','Inclusion':'#5A1A5A',"Finance d'impact":'#2A4A6A',
  'Mobilité':'#1A3A5A','Autre':'#3A3A3A',
};

const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H,hovered=null,selected=null;

function resize(){
  W=canvas.width=canvas.offsetWidth;
  H=canvas.height=canvas.offsetHeight;
  draw();
}

// Mercator projection
function project(lng,lat){
  const x=(lng+180)/360*W;
  const latRad=lat*Math.PI/180;
  const mercN=Math.log(Math.tan(Math.PI/4+latRad/2));
  const y=H/2-H*mercN/(2*Math.PI);
  return [x,y];
}

// Draw world map outline (simplified)
function drawLand(){
  ctx.fillStyle='#ECEAE5';
  ctx.strokeStyle='#D8D5CF';
  ctx.lineWidth=0.5;
  // simplified continent patches
  const patches=[
    // Europe
    [[(-10+180)/360*W,(35)*H/180+H*.1],[(40+180)/360*W,(35)*H/180+H*.1],[(40+180)/360*W,(70)*H/180-H*.2],[(-10+180)/360*W,(70)*H/180-H*.2]],
    // Africa  
    [[((-18+180)/360*W),(5*H/180+H*.3)],[(52+180)/360*W,(5*H/180+H*.3)],[(52+180)/360*W,(-35*H/180+H*.55)],[(-18+180)/360*W,(-35*H/180+H*.55)]],
    // N America
    [[(-170+180)/360*W,(25)*H/180+H*.1],[(-50+180)/360*W,(25)*H/180+H*.1],[(-50+180)/360*W,(75)*H/180-H*.3],[(-170+180)/360*W,(75)*H/180-H*.3]],
    // S America
    [[(-82+180)/360*W,(-55*H/180+H*.6)],[(-35+180)/360*W,(-55*H/180+H*.6)],[(-35+180)/360*W,(13)*H/180+H*.3],[(-82+180)/360*W,(13)*H/180+H*.3]],
    // Asia
    [[(40+180)/360*W,(10)*H/180+H*.2],[(145+180)/360*W,(10)*H/180+H*.2],[(145+180)/360*W,(75)*H/180-H*.3],[(40+180)/360*W,(75)*H/180-H*.3]],
    // Australia
    [[(115+180)/360*W,(-39*H/180+H*.58)],[(154+180)/360*W,(-39*H/180+H*.58)],[(154+180)/360*W,(-12*H/180+H*.45)],[(115+180)/360*W,(-12*H/180+H*.45)]],
  ];
  patches.forEach(pts=>{
    ctx.beginPath();
    ctx.moveTo(pts[0][0],pts[0][1]);
    pts.forEach(p=>ctx.lineTo(p[0],p[1]));
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
  });
}

function dotColor(n){
  if(n>=16) return '#1A3E6B';
  if(n>=6)  return '#B86A1A';
  return '#C4A265';
}
function dotRadius(n){
  if(n>=16) return 10+Math.sqrt(n)*1.2;
  if(n>=6)  return 7+Math.sqrt(n)*0.8;
  return 5+n*0.4;
}

function draw(){
  ctx.clearRect(0,0,W,H);
  
  // Background
  ctx.fillStyle='#F8F6F2';
  ctx.fillRect(0,0,W,H);
  
  // Grid lines
  ctx.strokeStyle='rgba(0,0,0,0.04)';
  ctx.lineWidth=1;
  for(let lat=-60;lat<=75;lat+=30){
    const [,y]=project(0,lat);
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();
  }
  for(let lng=-150;lng<=180;lng+=60){
    const [x]=project(lng,0);
    ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();
  }
  
  drawLand();
  
  // Dots
  DATA.forEach(country=>{
    const [x,y]=project(country.lng,country.lat);
    const n=country.solutions.length;
    const r=dotRadius(n);
    const color=dotColor(n);
    const isHov=hovered===country.country;
    const isSel=selected===country.country;
    
    // Glow
    if(isHov||isSel){
      const grd=ctx.createRadialGradient(x,y,0,x,y,r*2.5);
      grd.addColorStop(0,color+'40');
      grd.addColorStop(1,'transparent');
      ctx.beginPath();ctx.arc(x,y,r*2.5,0,Math.PI*2);
      ctx.fillStyle=grd;ctx.fill();
    }
    
    // Circle
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle=isSel?'#1A1A1A':isHov?color+'DD':color+'99';
    ctx.fill();
    
    // Border
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
    ctx.strokeStyle=isHov||isSel?color:'rgba(255,255,255,0.6)';
    ctx.lineWidth=isHov||isSel?2:1;
    ctx.stroke();
    
    // Count label
    if(n>=3||isHov||isSel){
      ctx.fillStyle=isHov||isSel?'#fff':'rgba(255,255,255,0.9)';
      ctx.font=`${isSel||isHov?'600 ':''} ${Math.max(9,r*.7)}px DM Sans`;
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(n,x,y);
    }
    
    // Country label on hover
    if(isHov||isSel){
      ctx.fillStyle='#1A1A1A';
      ctx.font='500 11px DM Sans';
      ctx.textAlign='center';ctx.textBaseline='top';
      ctx.fillText(country.country,x,y+r+5);
    }
  });
}

function hitTest(mx,my){
  for(const country of DATA){
    const [x,y]=project(country.lng,country.lat);
    const r=dotRadius(country.solutions.length)+4;
    if(Math.hypot(mx-x,my-y)<r) return country;
  }
  return null;
}

function openPanel(country){
  selected=country.country;
  document.getElementById('panel-country').textContent=country.country;
  document.getElementById('panel-n').textContent=`${country.solutions.length} solution${country.solutions.length>1?'s':''}`;
  const list=document.getElementById('panel-list');
  list.innerHTML='';
  country.solutions.forEach(s=>{
    const el=document.createElement('a');
    el.className='sol-item';
    el.href=s.website||'#';
    el.target='_blank';
    el.rel='noopener noreferrer';
    const color=CAT_COLORS[s.cat]||'#C4A265';
    el.innerHTML=`
      <div class="sol-cat" style="color:${color}">${s.cat}</div>
      <div class="sol-name">${s.name}</div>
      <div class="sol-raw">${s.rawCat}</div>
      ${s.website?'<div class="sol-link">Voir le projet →</div>':''}
    `;
    list.appendChild(el);
  });
  document.getElementById('panel').classList.add('open');
  document.getElementById('hint').style.opacity='0';
  draw();
}

function closePanel(){
  selected=null;
  document.getElementById('panel').classList.remove('open');
  draw();
}

canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect();
  const hit=hitTest(e.clientX-r.left,e.clientY-r.top);
  canvas.style.cursor=hit?'pointer':'default';
  hovered=hit?hit.country:null;
  draw();
});

canvas.addEventListener('click',e=>{
  const r=canvas.getBoundingClientRect();
  const hit=hitTest(e.clientX-r.left,e.clientY-r.top);
  if(hit) openPanel(hit);
});

canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  const r=canvas.getBoundingClientRect();
  const t=e.touches[0];
  const hit=hitTest(t.clientX-r.left,t.clientY-r.top);
  if(hit) openPanel(hit);
},{passive:false});

setTimeout(()=>document.getElementById('hint').style.opacity='0',5000);

const ro=new ResizeObserver(resize);
ro.observe(canvas);
resize();
</script>
