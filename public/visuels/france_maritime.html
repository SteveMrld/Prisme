<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La France maritime — Soara</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#030810;color:#ECE7DD;font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;}
:root{--or:#C8A96E;--bord:rgba(255,255,255,0.07)}
#stage{position:absolute;top:0;left:0;width:100%;height:calc(100% - 60px);overflow:hidden;}
#zoom-wrap{position:absolute;width:100%;height:100%;transition:transform 1.3s cubic-bezier(0.4,0,0.2,1),transform-origin 1.3s cubic-bezier(0.4,0,0.2,1)}
#map-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;display:block}
#map-svg{position:absolute;inset:0;width:100%;height:100%;overflow:visible}
#panel{position:absolute;left:0;bottom:60px;width:clamp(200px,30%,280px);height:auto;background:linear-gradient(to right,rgba(3,8,16,0.92) 70%,transparent);display:flex;flex-direction:column;justify-content:flex-end;padding:16px 24px 20px;pointer-events:none;z-index:10}
.p-ch{font-size:7px;font-weight:700;letter-spacing:5px;text-transform:uppercase;color:rgba(196,162,101,0.9);margin-bottom:10px}
.p-hk{font-family:'Playfair Display',serif;font-size:12px;font-style:italic;color:rgba(236,231,221,0.85);line-height:1.6;margin-bottom:14px;padding-bottom:13px;border-bottom:1px solid var(--bord)}
.p-ti{font-family:'Playfair Display',serif;font-size:clamp(16px,2.1vw,26px);font-weight:300;line-height:1.15;letter-spacing:-0.5px;margin-bottom:13px}
.p-ti em{font-style:italic;color:var(--or)}
.p-bo{font-size:11px;color:rgba(236,231,221,0.9);line-height:1.9}
.p-bo strong{color:rgba(236,231,221,0.85);font-weight:500}
.p-bo em{font-style:italic;color:rgba(196,162,101,0.7)}
.p-stat{margin-top:16px;padding-top:14px;border-top:1px solid var(--bord)}
.sn{font-family:'Playfair Display',serif;font-size:clamp(28px,3.5vw,46px);font-weight:300;color:var(--or);line-height:1;display:block}
.sl{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(236,231,221,0.7);display:block;margin-top:5px;line-height:1.7}
#intro{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:50;background:rgba(3,8,16,0.88);pointer-events:all;transition:opacity 1.4s ease;cursor:pointer;text-align:center;padding:20px}
#intro.out{opacity:0;pointer-events:none}
.i-eye{font-size:7px;font-weight:700;letter-spacing:5px;text-transform:uppercase;color:var(--or);margin-bottom:22px}
.i-ti{font-family:'Playfair Display',serif;font-size:clamp(22px,4.5vw,50px);font-weight:300;line-height:1.15;letter-spacing:-1px}
.i-ti em{font-style:italic;color:var(--or)}
.i-sub{margin-top:18px;font-size:9px;color:rgba(236,231,221,0.28);letter-spacing:3px;text-transform:uppercase}
#leg{position:absolute;left:18px;bottom:22px;display:flex;flex-direction:column;gap:8px;opacity:0;transition:opacity 0.9s;z-index:5}
#leg.v{opacity:1}
.ll{display:flex;align-items:center;gap:8px;font-size:8px;color:rgba(255,255,255,0.28);letter-spacing:1px;text-transform:uppercase}
.ld{width:8px;height:8px;border-radius:50%;flex-shrink:0}
#player{position:absolute;bottom:0;left:0;right:0;height:60px;z-index:200;display:flex;flex-direction:column;background:rgba(3,8,16,0.98);backdrop-filter:blur(16px);border-top:1px solid rgba(255,255,255,0.07)}
#pg{height:2px;background:rgba(255,255,255,0.05)}
#pgf{height:100%;background:var(--or);transition:width 0.6s ease;width:0%}
#ctrl{flex:1;display:flex;align-items:center;padding:0 20px;gap:12px}
#nav-dots{display:flex;gap:6px}
.ndot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.13);cursor:pointer;transition:all 0.2s}
.ndot.on{background:var(--or);transform:scale(1.35)}
#pp,#pn{background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.3);font-size:20px;padding:2px 8px;transition:color 0.2s;line-height:1}
#pp:hover,#pn:hover{color:var(--or)}
#ppl{background:rgba(196,162,101,0.1);border:1px solid rgba(196,162,101,0.2);border-radius:50%;width:32px;height:32px;cursor:pointer;color:var(--or);display:flex;align-items:center;justify-content:center;font-size:13px;transition:all 0.2s}
#ppl:hover{background:rgba(196,162,101,0.2)}
#cnt{margin-left:auto;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.18)}
#bk{position:fixed;top:16px;right:16px;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.22);text-decoration:none;z-index:300;transition:color 0.2s}
#bk:hover{color:var(--or)}
.sd{display:none}
@media(max-width:900px){
  html,body{overflow:auto;height:auto}
  #stage{position:relative;height:70vw;min-height:300px;overflow:hidden;width:100%}
  #panel{position:relative;left:auto;bottom:auto;width:100%;max-height:none;height:auto;background:rgba(3,8,16,0.98);padding:16px 18px 24px;justify-content:flex-start;overflow:visible;pointer-events:auto;border-top:1px solid rgba(255,255,255,0.07)}
  .p-ti{font-size:14px}.sn{font-size:24px}
  #leg{display:none}
  /* Le back link "← Soara" est redondant ici (l'iframe est déjà
     embarquée dans un article Soara) et chevauchait le panneau
     en mode empilé. On le masque sous le seuil. */
  #bk{display:none}
}
</style>
</head>
<body>
<a href="/visuels" id="bk">&#8592; Soara</a>
<div class="sd" data-ch="I — MÉTROPOLE" data-hk="Vous pensez connaître la France." data-ti="La France <em>hexagonale</em>" data-bo="<strong>551 000 km².</strong> Une puissance européenne de taille moyenne. C'est ce que montrent toutes les cartes du monde. C'est une illusion." data-sn="551 000" data-sl="km² — 19e rang mondial" data-scale="1.9" data-ox="50.6%" data-oy="24%" data-show="metro" data-lg="0"></div>
<div class="sd" data-ch="II — LA RÉVÉLATION" data-hk="Voici la France réelle." data-ti="Un empire présent <em>partout</em>" data-bo="La France est souveraine dans <strong>tous les océans de la planète</strong>. Pacifique, Atlantique, Indien, Antarctique — simultanément. Aucune autre nation au monde ne peut en dire autant." data-sn="5" data-sl="océans sous souveraineté française" data-scale="1" data-ox="50%" data-oy="50%" data-show="metro spm guadeloupe martinique guyane clipperton polynesie nc wallis reunion mayotte kerguelen crozet amsterdam" data-lg="1"></div>
<div class="sd" data-ch="III — PACIFIQUE" data-hk="Le plus grand océan du monde, en partie français." data-ti="Polynésie — <em>4,8 millions km²</em>" data-bo="La ZEE polynésienne est <strong>plus grande que l'Europe entière</strong>. 118 îles, 83 atolls. Nouvelle-Calédonie : 25% des réserves mondiales de nickel. Des fonds marins chargés en terres rares — encore vierges." data-sn="4,8 M" data-sl="km² — Polynésie seule" data-scale="2.4" data-ox="13%" data-oy="62%" data-show="polynesie nc wallis clipperton" data-lg="1"></div>
<div class="sd" data-ch="IV — ATLANTIQUE" data-hk="De Saint-Pierre aux Antilles, la France atlantique." data-ti="Antilles · Guyane · <em>Saint-Pierre</em>" data-bo="Les Antilles contrôlent un carrefour stratégique des Caraïbes. La Guyane abrite <strong>Kourou — la porte de l'Europe vers l'espace</strong>. Saint-Pierre-et-Miquelon, dernier vestige français en Amérique du Nord." data-sn="600 000" data-sl="km² de ZEE atlantique" data-scale="2.5" data-ox="33%" data-oy="40%" data-show="guadeloupe martinique guyane spm clipperton" data-lg="1"></div>
<div class="sd" data-ch="V — INDIEN" data-hk="Réunion, Mayotte, TAAF — la France australe." data-ti="Terres australes — <em>empire du froid</em>" data-bo="La Réunion et Mayotte gardent l'accès aux routes commerciales Asie–Europe. Les <strong>TAAF</strong> — Kerguelen, Crozet, Saint-Paul et Amsterdam — contrôlent 2,7 millions km² d'eaux australes parmi les plus poissonneuses du monde." data-sn="2,7 M" data-sl="km² — océan Indien et austral" data-scale="2.3" data-ox="65%" data-oy="68%" data-show="reunion mayotte kerguelen crozet amsterdam" data-lg="1"></div>
<div class="sd" data-ch="VI — EMPIRE INVISIBLE" data-hk="La plus grande puissance maritime que personne ne revendique." data-ti="La 2e ZEE mondiale — <em>un secret géopolitique</em>" data-bo="<strong>12 fuseaux horaires.</strong> 5 océans. La 2e ZEE mondiale derrière les États-Unis. Et pourtant la France se pense continentale — elle regarde vers l'est, vers l'Europe. Son empire maritime est le secret le mieux gardé de la géopolitique mondiale." data-sn="11 M" data-sl="km² de ZEE — 2e rang mondial" data-scale="1" data-ox="50%" data-oy="50%" data-show="metro spm guadeloupe martinique guyane clipperton polynesie nc wallis reunion mayotte kerguelen crozet amsterdam" data-lg="1"></div>

    <button id="ppl">&#9654;</button>
    <button id="pn">&#8250;</button>

  </div>

<script>
var slides=document.querySelectorAll('.sd'),total=slides.length,cur=-1,autoPlay=false,tmr=null;
var DE=document.getElementById('nav-dots');
for(var i=0;i<total;i++){var d=document.createElement('div');d.className='ndot';(function(n){d.onclick=function(){go(n)}})(i);DE.appendChild(d)}
function go(n){
  try{
  if(n<0||n>=total)return;
  cur=n;var s=slides[n];
  document.getElementById('intro').classList.add('out');
  document.getElementById('PCH').textContent=s.dataset.ch||'';
  document.getElementById('PHK').textContent=s.dataset.hk||'';
  document.getElementById('PTI').innerHTML=s.dataset.ti||'';
  document.getElementById('PBO').innerHTML=s.dataset.bo||'';
  document.getElementById('PSN').textContent=s.dataset.sn||'';
  document.getElementById('PSL').textContent=s.dataset.sl||'';
  var w=document.getElementById('zoom-wrap');
  w.style.transformOrigin=(s.dataset.ox||'50%')+' '+(s.dataset.oy||'50%');
  w.style.transform='scale('+( s.dataset.scale||'1')+')';
  var show=s.dataset.show.split(' ');
  document.querySelectorAll('.dot-group').forEach(function(g){
    g.style.opacity=show.indexOf(g.getAttribute('data-key'))>=0?'1':'0';
  });
  document.getElementById('leg').classList.toggle('v',s.dataset.lg==='1');
  document.querySelectorAll('.ndot').forEach(function(d,i){d.classList.toggle('on',i===n)});
  document.getElementById('pgf').style.width=((n+1)/total*100)+'%';
  document.getElementById('cnt').textContent=(n+1)+' / '+total;
  }catch(e){console.error('go error',e)}
}
document.getElementById('pp').onclick=function(){go(cur-1)};
document.getElementById('pn').onclick=function(){go(cur+1)};
document.getElementById('ppl').onclick=function(){
  autoPlay=!autoPlay;this.innerHTML=autoPlay?'&#9646;&#9646;':'&#9654;';
  if(autoPlay){tmr=setInterval(function(){if(cur>=total-1){autoPlay=false;document.getElementById('ppl').innerHTML='&#9654;';clearInterval(tmr)}else go(cur+1)},5500)}
  else clearInterval(tmr);
};
document.getElementById('intro').onclick=function(){go(0)};
document.addEventListener('keydown',function(e){if(e.key==='ArrowRight'||e.key===' ')go(cur+1);if(e.key==='ArrowLeft')go(cur-1)});
var tx=0;
document.addEventListener('touchstart',function(e){tx=e.touches[0].clientX},{passive:true});
document.addEventListener('touchend',function(e){var d=e.changedTouches[0].clientX-tx;if(Math.abs(d)>50){if(d<0)go(cur+1);else go(cur-1)}},{passive:true});
setTimeout(function(){
  go(0);
  autoPlay=true;
  document.getElementById('ppl').innerHTML='&#9646;&#9646;';
  tmr=setInterval(function(){if(cur>=total-1){autoPlay=false;document.getElementById('ppl').innerHTML='&#9654;';clearInterval(tmr)}else go(cur+1)},5500);
},200);
</script>
</body>
</html>
