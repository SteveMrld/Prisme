<title>La France maritime · Un empire ignoré · Prisme</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#040810;color:#ECE7DD;font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased}
:root{--or:#C4A265;--bg:#040810;--bord:rgba(255,255,255,0.07);--fr:#1A3E6B}
#stage{position:fixed;top:0;left:0;width:100%;height:calc(100% - 60px);overflow:hidden}
#world-svg{position:absolute;top:0;left:0;width:100%;height:100%}

/* INTRO */
#intro{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:50;background:rgba(4,8,16,0.85);pointer-events:all;transition:opacity 1.4s ease;cursor:pointer}
#intro.hidden{opacity:0;pointer-events:none}
.intro-eyebrow{font-size:8px;font-weight:700;letter-spacing:5px;text-transform:uppercase;color:var(--or);margin-bottom:28px}
.intro-title{font-family:'Playfair Display',serif;font-size:clamp(26px,5vw,56px);font-weight:300;text-align:center;line-height:1.15;letter-spacing:-1px;max-width:680px}
.intro-title em{font-style:italic;color:var(--or)}
.intro-sub{margin-top:20px;font-size:11px;color:rgba(236,231,221,0.35);letter-spacing:2px;text-transform:uppercase}

/* PANEL */
#panel{position:absolute;right:0;top:0;height:100%;width:clamp(260px,26vw,320px);background:linear-gradient(to left,rgba(4,8,16,0.98) 55%,rgba(4,8,16,0.75) 80%,transparent);display:flex;flex-direction:column;justify-content:center;padding:48px 28px 48px 56px}
.panel-chapter{font-size:7px;font-weight:700;letter-spacing:5px;text-transform:uppercase;color:rgba(196,162,101,0.5);margin-bottom:12px}
.panel-hook{font-family:'Playfair Display',serif;font-size:clamp(11px,1.2vw,14px);font-style:italic;font-weight:300;color:rgba(236,231,221,0.38);line-height:1.6;margin-bottom:18px;padding-bottom:16px;border-bottom:1px solid var(--bord)}
.panel-title{font-family:'Playfair Display',serif;font-size:clamp(18px,2.5vw,30px);font-weight:300;line-height:1.15;letter-spacing:-0.5px;margin-bottom:16px}
.panel-title em{font-style:italic;color:var(--or)}
.panel-body{font-size:12px;color:rgba(236,231,221,0.48);line-height:1.85}
.panel-body strong{color:rgba(236,231,221,0.85);font-weight:500}
.panel-stat{margin-top:20px;padding-top:18px;border-top:1px solid var(--bord)}
.stat-n{font-family:'Playfair Display',serif;font-size:clamp(32px,4vw,50px);font-weight:300;color:var(--or);line-height:1;display:block}
.stat-l{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(236,231,221,0.28);display:block;margin-top:6px;line-height:1.7}

/* LEGEND */
#legend{position:absolute;left:22px;bottom:28px;display:flex;flex-direction:column;gap:10px;opacity:0;transition:opacity 0.8s}
#legend.vis{opacity:1}
.li{display:flex;align-items:center;gap:10px;font-size:9px;color:rgba(255,255,255,0.3);letter-spacing:1px;text-transform:uppercase}
.li-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.li-dash{width:18px;height:1px;flex-shrink:0}

/* PLAYER */
#player{position:fixed;bottom:0;left:0;right:0;height:60px;z-index:200;display:flex;flex-direction:column;background:rgba(4,8,16,0.98);backdrop-filter:blur(16px);border-top:1px solid rgba(255,255,255,0.07)}
#prog{height:2px;background:rgba(255,255,255,0.06)}
#prog-fill{height:100%;background:var(--or);transition:width 0.6s ease;width:0%}
#controls{flex:1;display:flex;align-items:center;padding:0 24px;gap:14px}
#dots{display:flex;gap:6px;align-items:center}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.15);cursor:pointer;transition:all 0.2s}
.dot.active{background:var(--or);transform:scale(1.3)}
#btn-prev,#btn-next{background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.35);font-size:20px;padding:2px 8px;transition:color 0.2s;line-height:1}
#btn-prev:hover,#btn-next:hover{color:var(--or)}
#btn-play{background:rgba(196,162,101,0.1);border:1px solid rgba(196,162,101,0.25);border-radius:50%;width:32px;height:32px;cursor:pointer;color:var(--or);display:flex;align-items:center;justify-content:center;transition:all 0.2s;font-size:12px}
#btn-play:hover{background:rgba(196,162,101,0.2)}
#counter{margin-left:auto;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.2)}
#back{position:fixed;top:18px;left:20px;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.22);text-decoration:none;z-index:300;transition:color 0.2s}
#back:hover{color:var(--or)}
#wm{position:fixed;bottom:78px;left:20px;z-index:50;pointer-events:none;font-size:9px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:rgba(196,162,101,0.28)}

/* ANIMATIONS */
@keyframes fadeZone{from{opacity:0;transform:scale(0.7)}to{opacity:1;transform:scale(1)}}
@keyframes pulse{0%{r:6;opacity:0.8}100%{r:22;opacity:0}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes glow{0%,100%{opacity:0.3}50%{opacity:0.7}}
@keyframes dash{to{stroke-dashoffset:-300}}

.zone{opacity:0;transform-box:fill-box;transform-origin:center;transition:filter 0.4s}
.zone.vis{animation:fadeZone 0.7s ease forwards}
.pr{animation:pulse 2.4s ease-out infinite;transform-box:fill-box;transform-origin:center}
.fl{animation:float 4s ease-in-out infinite}
.gl{animation:glow 3s ease-in-out infinite}
.conn{stroke-dasharray:6 6;animation:dash 8s linear infinite;opacity:0;transition:opacity 0.8s}
.conn.vis{opacity:1}

@media(max-width:700px){
  #panel{position:absolute;right:0;left:0;top:auto;bottom:0;width:100%;height:42%;background:rgba(4,8,16,0.97);padding:14px 18px;justify-content:flex-start;overflow-y:auto;border-top:1px solid var(--bord)}
  #stage{height:58%}
  .panel-title{font-size:15px}.stat-n{font-size:26px}
  #legend{display:none}
}
</style>
</head>

  <div class="panel-hook" id="p-hk">Vous pensez connaître la France.</div>
  <div class="panel-title" id="p-ti">La France <em>hexagonale</em></div>
  <div class="panel-body" id="p-bo"></div>
  <div class="panel-stat"><span class="stat-n" id="p-st">551 000</span><span class="stat-l" id="p-sl"></span></div>
</div>

<!-- LÉGENDE -->
<div id="legend">
  <div class="li"><div class="li-dot" style="background:rgba(100,150,255,0.75)"></div>France métropolitaine</div>
  <div class="li"><div class="li-dot" style="background:var(--or)"></div>Territoires d'outre-mer</div>
  <div class="li"><div class="li-dash" style="background:rgba(196,162,101,0.45)"></div>Zone économique exclusive</div>
</div>
</div>

<!-- PLAYER -->
<div id="player">
  <div id="prog"><div id="prog-fill"></div></div>
  <div id="controls">
    <div id="dots"></div>
    <button id="btn-prev">‹</button>
    <button id="btn-play">▶</button>
    <button id="btn-next">›</button>
    <span id="counter">1 / 6</span>
  </div>
</div>

<script>
const S=[
  {ch:'I · MÉTROPOLE',hk:'Vous pensez connaître la France.',ti:'La France <em>hexagonale</em>',
   bo:'<strong>551 000 km².</strong> Une puissance européenne de taille moyenne. C\'est ce que montrent toutes les cartes du monde. C\'est tout ce que la plupart des gens voient. C\'est une illusion.',
   st:'551 000',sl:'km² de territoire métropolitain\n19e rang mondial seulement',
   zones:['z-metro'],conn:false,leg:false},

  {ch:'II · LA RÉVÉLATION',hk:'Regardez maintenant où est vraiment la France.',ti:'Un empire <em>présent partout</em>',
   bo:'La France est souveraine dans <strong>tous les océans de la planète</strong>. Pacifique, Atlantique, Indien, Arctique, Antarctique. Simultanément. Aucune autre nation au monde ne peut en dire autant.',
   st:'5',sl:'océans où la France\nexerce sa souveraineté',
   zones:['z-metro','z-poly','z-nc','z-ant','z-guy','z-reu','z-taaf','z-wal','z-spm','z-clip'],conn:true,leg:true},

  {ch:'III · LA ZEE',hk:'La mer est le prolongement naturel du territoire.',ti:'11,7 millions de km² <em>d\'océan souverain</em>',
   bo:'La Zone Économique Exclusive française est la <strong>2e mondiale</strong> — devant les États-Unis. Dans cette zone, la France détient des droits exclusifs sur toutes les ressources : poissons, hydrocarbures, nodules polymétalliques, câbles sous-marins. Un capital naturel estimé à plusieurs milliers de milliards d\'euros.',
   st:'11,7 M',sl:'km² de ZEE\n2e rang mondial',
   zones:['z-metro','z-poly','z-nc','z-ant','z-guy','z-reu','z-taaf','z-wal','z-spm','z-clip'],conn:true,leg:true},

  {ch:'IV · POLYNÉSIE',hk:'Un archipel aussi vaste que l\'Europe.',ti:'Polynésie — le <em>joyau pacifique</em>',
   bo:'La Polynésie française représente à elle seule <strong>4,8 millions km² de ZEE</strong> — soit la superficie de l\'Union européenne. 118 îles, 83 atolls, 20% des atolls mondiaux. Et des fonds marins contenant des concentrations massives de terres rares, cobalt et manganèse encore non exploitées.',
   st:'4,8 M',sl:'km² de ZEE polynésienne\nplus grande que l\'Europe',
   zones:['z-metro','z-poly','z-nc','z-ant','z-guy','z-reu','z-taaf','z-wal','z-spm','z-clip'],conn:true,leg:true,hl:'z-poly'},

  {ch:'V · NOUVELLE-CALÉDONIE',hk:'Sous ces eaux : les matériaux de l\'économie verte.',ti:'Le nickel, <em>arme stratégique</em>',
   bo:'La Nouvelle-Calédonie concentre <strong>25% des réserves mondiales prouvées de nickel</strong> — le métal indispensable aux batteries des véhicules électriques et à la transition énergétique mondiale. Dans la guerre des métaux critiques opposant États-Unis, Chine et Europe, ce territoire de 270 000 habitants est un enjeu géopolitique de premier ordre.',
   st:'25%',sl:'des réserves mondiales de nickel\nsur ce seul territoire français',
   zones:['z-metro','z-poly','z-nc','z-ant','z-guy','z-reu','z-taaf','z-wal','z-spm','z-clip'],conn:true,leg:true,hl:'z-nc'},

  {ch:'VI · L\'EMPIRE INVISIBLE',hk:'La plus grande puissance maritime que personne ne connaît.',ti:'La France ne se pense pas <em>océanique</em>',
   bo:'<strong>12 fuseaux horaires</strong> simultanément. Une présence sur tous les continents. La 2e ZEE mondiale. Des ressources stratégiques colossales. Et pourtant — la France reste une puissance qui se regarde dans le miroir continental. Son empire maritime demeure le secret le mieux gardé de la géopolitique mondiale.<br><br><em>« La France a le deuxième espace maritime mondial et n\'en fait pas grand-chose. »</em>',
   st:'12',sl:'fuseaux horaires couverts\nrecord mondial absolu',
   zones:['z-metro','z-poly','z-nc','z-ant','z-guy','z-reu','z-taaf','z-wal','z-spm','z-clip'],conn:true,leg:true},
]

let cur=-1,playing=false,timer=null

// Dots
const dotsEl=document.getElementById('dots')
S.forEach((_,i)=>{const d=document.createElement('div');d.className='dot';d.onclick=()=>go(i);dotsEl.appendChild(d)})

function go(n){
  if(n<0||n>=S.length)return
  cur=n
  const s=S[n]

  // Hide intro
  document.getElementById('intro').classList.add('hidden')

  // Panel
  document.getElementById('p-ch').textContent=s.ch
  document.getElementById('p-hk').textContent=s.hk
  document.getElementById('p-ti').innerHTML=s.ti
  document.getElementById('p-bo').innerHTML=s.bo
  document.getElementById('p-st').textContent=s.st
  document.getElementById('p-sl').textContent=s.sl

  // Zones
  document.querySelectorAll('.zone').forEach(el=>{el.classList.remove('vis');el.style.opacity='0';el.style.filter=''})
  s.zones.forEach((id,i)=>{
    const el=document.getElementById(id)
    if(!el)return
    el.style.opacity='1'
    setTimeout(()=>el.classList.add('vis'),i*70)
  })

  // Highlight
  if(s.hl){
    setTimeout(()=>{
      const el=document.getElementById(s.hl)
      if(el)el.style.filter='brightness(1.8) drop-shadow(0 0 12px rgba(196,162,101,0.6))'
    },s.zones.length*70+200)
  }

  // Connections
  document.querySelectorAll('.conn').forEach(el=>el.classList.toggle('vis',!!s.conn))

  // Legend
  document.getElementById('legend').classList.toggle('vis',!!s.leg)

  // Dots & progress
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===n))
  document.getElementById('prog-fill').style.width=((n+1)/S.length*100)+'%'
  document.getElementById('counter').textContent=(n+1)+' / '+S.length
}

// Controls
document.getElementById('btn-prev').onclick=()=>go(cur-1)
document.getElementById('btn-next').onclick=()=>go(cur+1)
document.getElementById('btn-play').onclick=function(){
  playing=!playing;this.textContent=playing?'❚❚':'▶'
  if(playing){timer=setInterval(()=>{if(cur>=S.length-1){playing=false;document.getElementById('btn-play').textContent='▶';clearInterval(timer)}else go(cur+1)},5200)}
  else clearInterval(timer)
}
document.getElementById('intro').onclick=()=>go(0)
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key===' ')go(cur+1);if(e.key==='ArrowLeft')go(cur-1)})
let tx=0
document.addEventListener('touchstart',e=>tx=e.touches[0].clientX,{passive:true})
document.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>50)dx<0?go(cur+1):go(cur-1)},{passive:true})

setTimeout(()=>go(0),200)
</script>
</body>
</html>
