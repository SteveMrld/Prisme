<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Les mers du pouvoir · Prisme</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#05090F;color:#fff;font-family:"DM Sans",sans-serif;-webkit-font-smoothing:antialiased}
:root{--gold:#C4A265;--blue:#4A9AD4;--red:#D45040}

#stage{position:fixed;top:0;left:0;width:100%;height:calc(100% - 56px)}
#map-svg{position:absolute;top:0;left:0;width:100%;height:100%}

/* Routes */
@keyframes flowRoute{to{stroke-dashoffset:-28}}
.rf{stroke-dasharray:12 8;animation:flowRoute 3s linear infinite}
.rfs{stroke-dasharray:9 7;animation:flowRoute 4.5s linear infinite}

/* Pulse rings */
@keyframes pRing{0%{r:6;opacity:0.85}100%{r:28;opacity:0}}
.pr{animation:pRing 2.4s ease-out infinite;transform-box:fill-box;transform-origin:center}

/* Radar (pour les zones de tension) */
@keyframes radar{0%{r:8;opacity:0.9}100%{r:46;opacity:0}}
.rad{animation:radar 2.2s ease-out infinite;transform-box:fill-box;transform-origin:center}

/* Zone pulsante */
@keyframes zPulse{0%,100%{opacity:0.07}50%{opacity:0.22}}
.zp{animation:zPulse 3s ease-in-out infinite}

/* Label clignotant */
@keyframes lFlash{0%,100%{opacity:1}50%{opacity:0.4}}
.lf{animation:lFlash 1.8s ease-in-out infinite}

/* ── PANNEAU INFO ── */
#panel{
  position:absolute;right:0;top:0;height:100%;
  width:clamp(240px,24vw,300px);
  background:linear-gradient(to left,rgba(5,9,15,0.98) 55%,rgba(5,9,15,0.75) 78%,transparent);
  display:flex;flex-direction:column;justify-content:center;
  padding:44px 28px 44px 52px;
}
.panel-tag{font-size:7.5px;font-weight:700;letter-spacing:5px;text-transform:uppercase;color:rgba(196,162,101,0.6);margin-bottom:16px}
.panel-hook{font-family:"Playfair Display",serif;font-size:clamp(13px,1.5vw,17px);font-style:italic;font-weight:300;color:rgba(255,255,255,0.42);line-height:1.55;margin-bottom:20px;padding-bottom:18px;border-bottom:1px solid rgba(255,255,255,0.06)}
.panel-title{font-family:"Playfair Display",serif;font-size:clamp(20px,2.8vw,32px);font-weight:300;line-height:1.12;letter-spacing:-0.5px;margin-bottom:18px}
.panel-title em{font-style:italic;color:var(--gold)}
.panel-body{font-size:13px;color:rgba(255,255,255,0.5);line-height:1.88;margin-bottom:10px}
.panel-body strong{color:rgba(255,255,255,0.88);font-weight:500}
.panel-stat{margin-top:22px;padding-top:20px;border-top:1px solid rgba(255,255,255,0.07)}
.stat-n{font-family:"Playfair Display",serif;font-size:clamp(38px,5vw,58px);font-weight:300;color:var(--gold);line-height:1;display:block}
.stat-l{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.3);display:block;margin-top:8px;line-height:1.7}

/* ── LÉGENDE ── */
#legend{
  position:absolute;left:22px;bottom:26px;
  display:flex;flex-direction:column;gap:12px;
  opacity:0;transition:opacity 0.8s ease;
}
#legend.vis{opacity:1}
.li{display:flex;align-items:center;gap:12px}
.li-text{font-size:11px;color:rgba(255,255,255,0.6);letter-spacing:0.3px}
.l-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.l-line{width:28px;height:3px;border-radius:2px;flex-shrink:0}
.l-dash{width:28px;height:0;flex-shrink:0}
.l-zone{width:16px;height:11px;border-radius:3px;flex-shrink:0}

/* ── PLAYER ── */
#player{position:fixed;bottom:0;left:0;right:0;height:56px;z-index:200;display:flex;flex-direction:column;background:rgba(5,9,15,0.99);backdrop-filter:blur(16px);border-top:1px solid rgba(255,255,255,0.07)}
#progress-bar{width:100%;height:3px;background:rgba(255,255,255,0.07);cursor:pointer}
#progress-fill{height:100%;background:var(--gold);width:0%;transition:width 0.1s linear}
#controls{flex:1;display:flex;align-items:center;justify-content:center;padding:0 20px;position:relative}
#dots{position:absolute;left:20px;display:flex;gap:6px;align-items:center}
.dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.2);cursor:pointer;transition:background .2s,transform .2s}
.dot.on{background:var(--gold);transform:scale(1.5)}
.ctrl-btn{width:38px;height:38px;border:none;background:none;color:rgba(255,255,255,0.5);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:color .2s;padding:0;margin:0 4px}
.ctrl-btn:hover{color:var(--gold)}
.ctrl-btn svg{width:20px;height:20px;fill:currentColor}
#btn-play .ip{display:block}#btn-play .ipa{display:none}
#btn-play.playing .ip{display:none}#btn-play.playing .ipa{display:block}
#btn-play{width:46px;height:46px;border-radius:50%;background:rgba(196,162,101,0.15);color:var(--gold);border:1px solid rgba(196,162,101,0.3)}
#counter{position:absolute;right:20px;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.25)}
#prisme-wm{position:fixed;bottom:78px;left:20px;z-index:50;pointer-events:none;font-family:"DM Sans",sans-serif;font-size:9px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:rgba(196,162,101,0.38)}
#prisme-wm span{color:rgba(196,162,101,0.22)}
.back{position:fixed;top:18px;left:20px;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.25);text-decoration:none;z-index:200}
.back:hover{color:var(--gold)}
</style>
</head>
<body>
<a class="back" href="/">← Prisme</a>
<div id="prisme-wm">PRISME<span>.FR</span></div>
<div id="stage">
  <svg id="map-svg"></svg>
  <div style="position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse at 50% 50%,transparent 50%,rgba(5,9,15,0.6) 100%);z-index:2"></div>
  <div id="panel">
    <div id="pTag" class="panel-tag"></div>
    <div id="pHook" class="panel-hook"></div>
    <h2 id="pTitle" class="panel-title"></h2>
    <div id="pBody" class="panel-body"></div>
    <div class="panel-stat"><span id="pStatN" class="stat-n"></span><span id="pStatL" class="stat-l"></span></div>
  </div>
  <div id="legend"></div>
</div>

<div id="player">
  <div id="progress-bar" onclick="seekClick(event)"><div id="progress-fill"></div></div>
  <div id="controls">
    <div id="dots"></div>
    <button class="ctrl-btn" onclick="prev()"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg></button>
    <button class="ctrl-btn" id="btn-play" onclick="togglePlay()"><svg class="ip" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg><svg class="ipa" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg></button>
    <button class="ctrl-btn" onclick="next()"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
    <span id="counter">1 / 5</span>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script>
var W=window.innerWidth, H=window.innerHeight-56;
var svg=d3.select('#map-svg').attr('width',W).attr('height',H);
var proj=d3.geoNaturalEarth1().scale(W/6.2).translate([W*0.48,H*0.535]);
var gpath=d3.geoPath().projection(proj);
var P=function(lon,lat){return proj([lon,lat])||[0,0]};

/* DEFS */
var defs=svg.append('defs');
function glow(id,blur){
  var f=defs.append('filter').attr('id',id).attr('x','-60%').attr('y','-60%').attr('width','220%').attr('height','220%');
  f.append('feGaussianBlur').attr('stdDeviation',blur).attr('result','b');
  var m=f.append('feMerge');m.append('feMergeNode').attr('in','b');m.append('feMergeNode').attr('in','SourceGraphic');
}
glow('gg',4); glow('gb',5); glow('gr',5); glow('gs',2);

  /* ── SHIP ICONS ── */
  window.containerShipSVG = '\n<g class="ship-container" transform="translate({x},{y}) scale({s})">\n  <!-- Coque -->\n  <path d="M-26,2 Q-28,8 -22,10 L22,10 Q26,10 28,6 L28,2 Z" fill="{c}"/>\n  <!-- Pont principal -->\n  <rect x="-24" y="-1" width="50" height="4" fill="{c}"/>\n  <!-- Proue inclinée -->\n  <path d="M22,2 L28,2 L28,6 L22,10 Z" fill="{c}" opacity="0.8"/>\n  <!-- Poupe -->\n  <path d="M-24,-1 L-28,2 L-22,10 L-24,10 Z" fill="{c}" opacity="0.8"/>\n  <!-- Containers rangée 1 (bas) -->\n  <rect x="-20" y="-7" width="9" height="5" fill="{c}"/>\n  <rect x="-10" y="-7" width="9" height="5" fill="{c}"/>\n  <rect x="1" y="-7" width="9" height="5" fill="{c}"/>\n  <!-- Containers rangée 2 (haut) -->\n  <rect x="-18" y="-12" width="8" height="4" fill="{c}" opacity="0.85"/>\n  <rect x="-9" y="-12" width="8" height="4" fill="{c}" opacity="0.85"/>\n  <rect x="1" y="-12" width="7" height="4" fill="{c}" opacity="0.85"/>\n  <!-- Séparateurs containers -->\n  <line x1="-15" y1="-7" x2="-15" y2="-2" stroke="rgba(5,9,15,0.6)" stroke-width="0.8"/>\n  <line x1="-5" y1="-7" x2="-5" y2="-2" stroke="rgba(5,9,15,0.6)" stroke-width="0.8"/>\n  <line x1="5" y1="-7" x2="5" y2="-2" stroke="rgba(5,9,15,0.6)" stroke-width="0.8"/>\n  <!-- Passerelle / superstructure (droite) -->\n  <rect x="13" y="-16" width="9" height="17" rx="1" fill="{c}"/>\n  <rect x="15" y="-14" width="2" height="2" fill="rgba(5,9,15,0.5)"/>\n  <rect x="15" y="-11" width="2" height="2" fill="rgba(5,9,15,0.5)"/>\n  <rect x="18" y="-14" width="2" height="2" fill="rgba(5,9,15,0.5)"/>\n  <!-- Mât -->\n  <rect x="17" y="-20" width="1.5" height="5" fill="{c}"/>\n</g>\n';
  window.carrierSVG = '\n<g class="ship-carrier" transform="translate({x},{y}) scale({s})">\n  <!-- Coque principale -->\n  <path d="M-30,4 Q-34,10 -26,12 L26,12 Q30,12 32,8 L32,3 Z" fill="{c}"/>\n  <!-- Pont d\'envol (plat, large) -->\n  <rect x="-30" y="-2" width="62" height="7" rx="1" fill="{c}"/>\n  <!-- Proue angulaire -->\n  <path d="M28,3 L32,3 L32,8 L26,12 Z" fill="{c}" opacity="0.85"/>\n  <!-- Encoche catapultes (côté gauche coque) -->\n  <rect x="-25" y="5" width="3" height="2" fill="rgba(5,9,15,0.6)" rx="0.5"/>\n  <rect x="-18" y="5" width="3" height="2" fill="rgba(5,9,15,0.6)" rx="0.5"/>\n  <!-- Fenêtres latérales -->\n  <rect x="2" y="5" width="4" height="2" fill="rgba(5,9,15,0.55)" rx="0.5"/>\n  <rect x="8" y="5" width="4" height="2" fill="rgba(5,9,15,0.55)" rx="0.5"/>\n  <rect x="14" y="5" width="4" height="2" fill="rgba(5,9,15,0.55)" rx="0.5"/>\n  <!-- Îlot / superstructure (tribord droite) -->\n  <rect x="18" y="-14" width="10" height="16" rx="1" fill="{c}"/>\n  <!-- Antenne radar (croix) -->\n  <rect x="21" y="-20" width="4" height="1.5" fill="{c}"/>\n  <rect x="22.5" y="-22" width="1.5" height="6" fill="{c}"/>\n  <rect x="20" y="-18" width="8" height="1" fill="{c}" opacity="0.7"/>\n  <!-- Fenêtres îlot -->\n  <rect x="20" y="-10" width="3" height="2" fill="rgba(5,9,15,0.55)" rx="0.5"/>\n  <rect x="24" y="-10" width="3" height="2" fill="rgba(5,9,15,0.55)" rx="0.5"/>\n  <!-- Avions sur le pont (4 silhouettes) -->\n  <!-- Avion 1 -->\n  <path d="M-22,-4 L-18,-6 L-14,-4 L-18,-3 Z" fill="{c2}"/>\n  <rect x="-19" y="-4" width="4" height="1.5" fill="{c2}"/>\n  <!-- Avion 2 -->\n  <path d="M-11,-4 L-7,-6 L-3,-4 L-7,-3 Z" fill="{c2}"/>\n  <rect x="-8" y="-4" width="4" height="1.5" fill="{c2}"/>\n  <!-- Avion 3 -->\n  <path d="M0,-4 L4,-6 L8,-4 L4,-3 Z" fill="{c2}"/>\n  <rect x="3" y="-4" width="4" height="1.5" fill="{c2}"/>\n  <!-- Avion 4 -->\n  <path d="M10,-4 L14,-6 L17,-4 L14,-3 Z" fill="{c2}"/>\n  <rect x="13" y="-4" width="3" height="1.5" fill="{c2}"/>\n</g>\n';

/* ── CHAPITRES DATA ── */
var chapters=[
  {tag:'I · Commerce mondial · En 2026',
   hook:'Sans la mer, il n\'y a pas de mondialisation.',
   title:'Les autoroutes <em>de la planète</em>',
   body:'80% des biens échangés dans le monde transitent par la mer — pétrole, containers, céréales. Trois axes dominent l\'économie mondiale. En couper un seul suffit à déclencher une crise en quelques semaines.',
   statN:'80%',statL:'du commerce mondial\ntransite par voie maritime',
   leg:[{t:'line',c:'rgba(196,162,101,0.8)',l:'Route commerciale majeure'},{t:'dot',c:'rgba(196,162,101,0.7)',l:'Porte-conteneurs'}]},
  {tag:'II · Points d\'étranglement · En 2026',
   hook:'Bloquer Ormuz 48 heures. Le prix du pétrole bondit de 40 dollars.',
   title:'Les détroits qui <em>étranglent</em> le monde',
   body:'Quelques kilomètres de mer concentrent des flux colossaux. Ces points de passage obligé sont les talons d\'Achille de l\'économie mondiale.<br><br><strong>Ormuz</strong> : 20% du pétrole mondial. <strong>Malacca</strong> : 25% du commerce. <strong>Suez</strong> : 12% des échanges.',
   statN:'7',statL:'détroits concentrent\nl\'essentiel du commerce mondial',
   leg:[{t:'dot',c:'#C4A265',l:'Détroit économique critique'},{t:'dot',c:'#D45040',l:'Détroit à risque géopolitique'}]},
  {tag:'III · Domination américaine · En 2026',
   hook:'Depuis 1945, les Etats-Unis garantissent la liberté de navigation. En échange de quoi, ils contrôlent tout.',
   title:'L\'empire <em>des sept mers</em>',
   body:'La marine américaine est la seule au monde à maintenir des porte-avions déployés en permanence sur <strong>tous les océans simultanément</strong>. Cette présence continue est le socle invisible de la mondialisation — et de la domination américaine.',
   statN:'11',statL:'porte-avions américains\nplus que tous les autres pays réunis',
   leg:[{t:'zone',c:'rgba(74,154,212,0.1)',bc:'rgba(74,154,212,0.35)',l:'Zone de présence permanente'},{t:'rect',c:'rgba(74,154,212,0.85)',l:'Porte-avions'}]},
  {tag:'IV · Marine chinoise · En 2026',
   hook:'La Chine ne conquiert pas des territoires. Elle construit des flottes.',
   title:'La Chine <em>prend la mer</em>',
   body:'En vingt ans, la Chine a bati la plus grande marine du monde en nombre de navires. Elle revendique 90% de la <strong>mer de Chine méridionale</strong> — 5 000 milliards de dollars de commerce annuel. Des récifs transformés en bases militaires. Djibouti, 2017 : sa première base navale hors d\'Asie.',
   statN:'370',statL:'navires de guerre chinois\nn°1 mondial en nombre',
   leg:[{t:'zone',c:'rgba(212,80,64,0.15)',bc:'rgba(212,80,64,0.5)',l:'Revendication des 9 traits'},{t:'line',c:'rgba(212,80,64,0.6)',l:'Route de la Soie Maritime'},{t:'dot',c:'#D45040',l:'Base militaire chinoise'}]},
  {tag:'V · Zones de rupture · En 2026',
   hook:'Les prochains conflits navals sont déjà dessinés sur la carte.',
   title:'Les points <em>de rupture</em>',
   body:'<strong>Taïwan</strong> : une invasion déclencherait une réponse américaine directe. La <strong>Mer Noire</strong>, théâtre ukrainien. Le <strong>Golfe Persique</strong>, otage des tensions irano-américaines. Et l\'<strong style="color:rgba(196,162,101,0.9)">Arctique</strong>, nouvelle route commerciale, nouveau front.',
   statN:'3',statL:'zones à risque élevé\nde conflit naval majeur',
   leg:[{t:'dot',c:'#D45040',l:'Zone de haute tension'},{t:'dash',c:'rgba(196,162,101,0.7)',l:'Route Arctique en ouverture'}]}
];

/* ── COUCHES ── */
var layers=[];

d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(function(world){
  /* Fond */
  svg.append('rect').attr('width',W).attr('height',H).attr('fill','#05090F');
  svg.append('path').datum({type:'Sphere'}).attr('d',gpath).attr('fill','#070C16');
  /* Grille */
  svg.append('path').datum(d3.geoGraticule()()).attr('d',gpath).attr('fill','none').attr('stroke','rgba(255,255,255,0.035)').attr('stroke-width',0.5);
  /* Equateur */
  svg.append('path').datum({type:'LineString',coordinates:[[-180,0],[180,0]]}).attr('d',gpath).attr('fill','none').attr('stroke','rgba(255,255,255,0.1)').attr('stroke-width',0.7);
  /* Pays */
  svg.append('g').selectAll('path')
    .data(topojson.feature(world,world.objects.countries).features).join('path')
    .attr('d',gpath).attr('fill','#0C1620').attr('stroke','none');
  /* Frontières */
  svg.append('path').datum(topojson.mesh(world,world.objects.countries,function(a,b){return a!==b}))
    .attr('d',gpath).attr('fill','none').attr('stroke','#1A2D44').attr('stroke-width',0.6);
  /* Contour sphère */
  svg.append('path').datum({type:'Sphere'}).attr('d',gpath).attr('fill','none').attr('stroke','rgba(255,255,255,0.12)').attr('stroke-width',1);
  /* Labels océans */
  [[-35,20,'ATLANTIQUE',13],[-135,5,'PACIFIQUE',14],[155,-10,'PACIFIQUE',14],[72,-20,'INDIEN',13]]
    .forEach(function(l){var pt=P(l[0],l[1]);svg.append('text').attr('x',pt[0]).attr('y',pt[1]).attr('text-anchor','middle').attr('font-family','"Playfair Display",serif').attr('font-size',l[3]).attr('font-style','italic').attr('fill','rgba(255,255,255,0.09)').attr('letter-spacing',4).text(l[2])});

  buildLayer0(); buildLayer1(); buildLayer2(); buildLayer3(); buildLayer4();
  initPlayer();
});

/* ══════════════════════════════════════════════
   LAYER 0 — ROUTES COMMERCIALES
   ══════════════════════════════════════════════ */
function buildLayer0(){
  var g=svg.append('g').attr('id','l0').attr('opacity',0).style('transition','opacity 1.1s ease');
  layers.push(g);

  /* 3 routes uniquement, bien lisibles */
  var routes=[
    // Transpacifique
    {coords:[[121,31],[140,34],[160,38],[180,40],[-160,38],[-130,35],[-118,34]],primary:true,delay:0,label:[-148,42,'Route Transpacifique']},
    // Asie → Europe via Suez
    {coords:[[121,31],[104,1],[57,20],[43,13],[33,27],[15,37],[4,52]],primary:true,delay:0.6,label:[[70,15,'Asie — Europe (via Suez)'],]},
    // Atlantique Nord
    {coords:[[-73,41],[-40,45],[-10,51],[4,52]],primary:false,delay:1.2,label:[-38,48,'Atlantique Nord']}
  ];

  routes.forEach(function(r){
    var d=gpath({type:'LineString',coordinates:r.coords});
    if(!d) return;
    // Halo
    g.append('path').attr('d',d).attr('fill','none').attr('stroke','rgba(196,162,101,0.07)').attr('stroke-width',r.primary?10:6).attr('stroke-linecap','round');
    // Base
    g.append('path').attr('d',d).attr('fill','none').attr('stroke',r.primary?'rgba(196,162,101,0.22)':'rgba(196,162,101,0.12)').attr('stroke-width',r.primary?4:2.5).attr('stroke-linecap','round');
    // Flow animé
    g.append('path').attr('d',d).attr('fill','none')
      .attr('stroke',r.primary?'#C4A265':'rgba(196,162,101,0.55)')
      .attr('stroke-width',r.primary?2.8:1.8).attr('stroke-linecap','round')
      .attr('class',r.primary?'rf':'rfs').style('animation-delay',r.delay+'s');
    // Label route
    var lbl=Array.isArray(r.label[0])?r.label:[r.label];
    lbl.forEach(function(l){
      var pt=P(l[0],l[1]);
      g.append('text').attr('x',pt[0]).attr('y',pt[1]).attr('text-anchor','middle')
        .attr('font-family','"DM Sans",sans-serif').attr('font-size',10).attr('font-weight','300')
        .attr('fill','rgba(196,162,101,0.7)').attr('letter-spacing',0.3)
        
        .text(l[2]);
    });
  });

  /* Porte-conteneurs — silhouette vue de côté */
  var ships=[
    {lon:160,lat:37,s:0.82},{lon:-145,lat:36,s:0.82},{lon:75,lat:12,s:0.78},{lon:18,lat:39,s:0.75}
  ];
  ships.forEach(function(s,i){
    var pt=P(s.lon,s.lat); var x=pt[0],y=pt[1];
    if(!x||x<10||x>W-10) return;
    var sc=s.s;
    var sg=g.append('g').attr('transform','translate('+x+','+y+') scale('+sc+')').attr('filter','url(#gs)');
    /* Coque */
    sg.append('path').attr('d','M-26,2 Q-28,8 -22,10 L22,10 Q26,10 28,6 L28,2 Z').attr('fill','rgba(196,162,101,0.85)');
    sg.append('rect').attr('x','-24').attr('y','-1').attr('width',50).attr('height',4).attr('fill','rgba(196,162,101,0.85)');

    var d9='M'+polyPts[0].join(' ')+' '+polyPts.slice(1).map(function(p){return 'L'+p.join(' ')}).join(' ')+'Z';

/* ════════════════════════════════════════════ */
var N=5,cur=0,tmr=null,paused=false,progRaf=null,progStart=0;
var durs=[11000,11000,11000,11000,12000];
var dotsEl=document.getElementById('dots');
for(var i=0;i<N;i++){(function(idx){var d=document.createElement('div');d.className='dot';d.onclick=function(e){e.stopPropagation();goTo(idx)};dotsEl.appendChild(d)})(i)}

function updatePanel(idx){
  var c=chapters[idx];
  document.getElementById('pTag').textContent=c.tag;
  document.getElementById('pHook').textContent=c.hook||'';
  document.getElementById('pTitle').innerHTML=c.title;
  document.getElementById('pBody').innerHTML=c.body.replace(/\n/g,'<br>');
  document.getElementById('pStatN').textContent=c.statN;
  document.getElementById('pStatL').innerHTML=c.statL.replace(/\n/g,'<br>');
  var leg=document.getElementById('legend');
  leg.innerHTML=c.leg.map(function(item){
    var icon='';
    if(item.t==='dot') icon='<div class="l-dot" style="background:'+item.c+'"></div>';
    else if(item.t==='line') icon='<div class="l-line" style="background:'+item.c+'"></div>';
    else if(item.t==='dash') icon='<div class="l-dash" style="border-top:2.5px dashed '+item.c+'"></div>';
    else if(item.t==='zone') icon='<div class="l-zone" style="background:'+item.c+';border:2px dashed '+(item.bc||'#fff')+'"></div>';
    else if(item.t==='rect') icon='<div style="width:22px;height:10px;border-radius:2px;background:'+item.c+'"></div>';
    return '<div class="li">'+icon+'<span class="li-text">'+item.l+'</span></div>';
  }).join('');
  leg.classList.add('vis');
}
function startProg(){
  if(progRaf)cancelAnimationFrame(progRaf);
  progStart=Date.now(); var dur=durs[cur]||11000;
  (function tick(){var p=Math.min((Date.now()-progStart)/dur,1);document.getElementById('progress-fill').style.width=(p*100)+'%';if(p<1&&!paused)progRaf=requestAnimationFrame(tick)})();
}
function seekClick(e){var r=e.currentTarget.getBoundingClientRect();goTo(Math.max(0,Math.min(N-1,Math.round((e.clientX-r.left)/r.width*(N-1)))))}
function showSlide(idx){
  layers.forEach(function(lg,i){lg.style('opacity',i===idx?'1':'0')});
  updatePanel(idx);
  document.querySelectorAll('.dot').forEach(function(d,i){d.classList.toggle('on',i===idx)});
  document.getElementById('counter').textContent=(idx+1)+' / '+N;
  startProg();
}
function next(){if(tmr)clearTimeout(tmr);cur=cur<N-1?cur+1:0;showSlide(cur);if(!paused)schedule()}
function prev(){if(tmr)clearTimeout(tmr);cur=cur>0?cur-1:N-1;showSlide(cur);if(!paused)schedule()}
function schedule(){if(tmr)clearTimeout(tmr);if(!paused)tmr=setTimeout(next,durs[cur]||11000)}
function goTo(idx){if(tmr)clearTimeout(tmr);cur=idx;showSlide(idx);if(!paused)schedule()}
function togglePlay(){paused=!paused;var btn=document.getElementById('btn-play');if(paused){btn.classList.remove('playing');if(tmr)clearTimeout(tmr);if(progRaf)cancelAnimationFrame(progRaf)}else{btn.classList.add('playing');schedule();startProg()}}
function initPlayer(){
  document.getElementById('stage').addEventListener('click',function(e){if(e.target.closest('#dots')||e.target.closest('#player')||e.target.closest('.back'))return;next()});
  document.getElementById('btn-play').classList.add('playing');
  setTimeout(function(){showSlide(0);schedule()},300);
}
</script>
