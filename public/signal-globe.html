<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Soara Signal</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#07090F;color:#ECE7DD;font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased}
canvas{position:absolute;inset:0;width:100%;height:100%}

/* ── HEADER ── */
#hdr{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:16px 20px;background:linear-gradient(to bottom,rgba(7,9,15,0.9),transparent)}
.logo{font-family:'Playfair Display',serif;font-size:22px}
.logo em{color:#C8A96E;font-style:italic}
.logo-signal{font-family:'DM Sans',sans-serif;font-size:9px;font-weight:600;letter-spacing:3px;color:rgba(196,162,101,.45);margin-left:10px;vertical-align:middle;text-transform:uppercase}
#hdr-right{display:flex;align-items:center;gap:14px}
.live{display:flex;align-items:center;gap:6px;font-size:8px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:#FC8181}
.live-dot{width:5px;height:5px;background:#FC8181;border-radius:50%;animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.hdate{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(196,162,101,0.85);font-family:'DM Mono',monospace}
.back{font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(196,162,101,0.5);text-decoration:none;border:1px solid rgba(196,162,101,0.15);padding:6px 10px;transition:color 0.2s}

/* ── INTRO ── */
#intro{
  position:fixed;inset:0;z-index:95;
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  text-align:center;padding:40px 24px;
  background:rgba(7,9,15,0.7);backdrop-filter:blur(4px);
  transition:opacity 0.8s;
}
#intro.hidden{opacity:0;pointer-events:none}
.intro-label{font-size:8px;letter-spacing:5px;text-transform:uppercase;color:rgba(200,169,110,0.5);margin-bottom:16px}
.intro-title{font-family:'Playfair Display',serif;font-size:clamp(28px,6vw,48px);line-height:1.1;color:#ECE7DD;margin-bottom:12px}
.intro-sub{font-size:13px;color:rgba(236,231,221,0.5);line-height:1.6;max-width:340px;margin-bottom:28px}
.intro-btn{background:none;border:1px solid rgba(200,169,110,0.4);color:#C8A96E;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:3px;text-transform:uppercase;padding:12px 28px;cursor:pointer;transition:all 0.2s}
.intro-btn:hover{background:rgba(200,169,110,0.08);border-color:#C8A96E}
.intro-count{font-size:8px;letter-spacing:2px;color:rgba(255,255,255,0.2);margin-top:12px}

/* ── LÉGENDE ── */
#legend{
  position:fixed;top:60px;right:16px;z-index:80;
  background:rgba(7,9,15,0.8);border:1px solid rgba(255,255,255,0.06);
  padding:10px 12px;backdrop-filter:blur(6px);
}
.leg-title{font-size:6px;letter-spacing:3px;text-transform:uppercase;color:rgba(200,169,110,0.4);margin-bottom:6px}
.leg-item{display:flex;align-items:center;gap:7px;margin-bottom:4px}
.leg-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.leg-label{font-family:'DM Mono',monospace;font-size:7px;color:rgba(255,255,255,0.45)}

@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap');
</style>
</head>
<body>

<!-- HEADER -->
<div id="hdr">
  <div>
    <a href="/" class="back">← Accueil</a>
  </div>
  <div style="position:absolute;left:50%;transform:translateX(-50%)">
    <span class="logo">So<em>ara</em></span><span class="logo-signal">Signal</span>
  </div>
  <div id="hdr-right">
    <div class="live"><div class="live-dot"></div>EN DIRECT</div>
    <div class="hdate" id="hdate"></div>
  </div>
</div>

<!-- LÉGENDE -->
<div id="legend">
  <div class="leg-title">Statut</div>
  <div class="leg-item"><div class="leg-dot" style="background:#FC8181"></div><span class="leg-label">Crise active</span></div>
  <div class="leg-item"><div class="leg-dot" style="background:#F6AD55"></div><span class="leg-label">Tension</span></div>
  <div class="leg-item"><div class="leg-dot" style="background:#F6E05E"></div><span class="leg-label">Surveillance</span></div>
  <div class="leg-item"><div class="leg-dot" style="background:#4dd9ac"></div><span class="leg-label">Crise climatique</span></div>
</div>

<!-- INTRO -->
<div id="intro">
  <div class="intro-label">Soara · Signal géopolitique</div>
  <div class="intro-title">Le monde<br><em>en tensions.</em></div>
  <div class="intro-sub">Un tour du monde des crises actives — géopolitiques et climatiques. Appuyez sur chaque zone pour l'analyse.</div>
  <button class="intro-btn" id="start-btn" onclick="startTour()" disabled style="opacity:0.4;cursor:wait">⏳ Chargement...</button>
  <div class="intro-count" id="zone-count"></div>
</div>

<!-- THREE.JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>

// ── DATE ──────────────────────────────────────────────────────
const now = new Date();
document.getElementById('hdate').textContent =
  now.toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'}).toUpperCase();

// ── ZONES ─────────────────────────────────────────────────────
const ZONES = [
  {
    lat:32.4, lng:53.6, name:"Iran — États-Unis", region:"Moyen-Orient",
    status:"crisis", trend:"up", updated:"13 avril 2026", france:9,

  },
  {

    desc:"Le blocus naval américain de tous les ports iraniens est entré en vigueur ce lundi. Trump menace d'éliminer tout navire iranien approchant le dispositif. L'Iran prévient qu'il ripostera.",

  },

    status:"tension", trend:"stable", updated:"13 avril 2026", france:7,
    affected:"44 millions", figures:["Jour 1509 du conflit","2 299 violations du cessez-le-feu de Pâques","1,3M de pertes russes totales"],
    desc:"Cessez-le-feu de Pâques (32h) violé 2 299 fois par la Russie. Orban battu en Hongrie, Magyar prend le pouvoir. Front stable, Russie gagne du terrain à très haut coût humain.",
    tags:["Guerre","Trêve violée","Front est"],
    tagColors:["#FC8181","#F6AD55","#F6E05E"],
    linkedTo:[6],
  },
  {
    lat:14.0, lng:-2.0, name:"Sahel", region:"Afrique de l'Ouest",
    status:"tension", trend:"up", updated:"13 avril 2026", france:9,
    affected:"80 millions", figures:["5 000 soldats français retirés","+340% attaques jihadistes","3 coups d'État en 3 ans"],
    desc:"Retrait français consommé. Wagner omniprésent au Mali et Burkina Faso. Vide sécuritaire exploité par les groupes jihadistes. La France perd son influence dans sa zone historique.",
    tags:["Jihadisme","Post-colonialisme","Wagner"],
    tagColors:["#FC8181","#F6AD55","#F6E05E"],
    linkedTo:[7],
  },
  {
    lat:23.6, lng:121.0, name:"Taïwan", region:"Asie-Pacifique",
    status:"tension", trend:"up", updated:"13 avril 2026", france:5,
    affected:"23 millions", figures:["L'APL étudie la guerre d'Iran","90% des puces avancées mondiales","400Md$ commerce USA-Chine menacé"],
    desc:"La guerre Iran-USA est un laboratoire pour l'Armée Populaire de Libération. Pékin analyse les capacités et limites américaines en temps réel. Washington surveille le détroit de Taïwan avec attention.",
    tags:["Chine","APL","Semi-conducteurs"],
    tagColors:["#F6AD55","#F6AD55","#F6E05E"],
    linkedTo:[6],
  },
  {
    lat:8.0, lng:42.0, name:"Corne de l'Afrique", region:"Afrique de l'Est",
    status:"climate", trend:"up", updated:"13 avril 2026", france:6,
    affected:"40 millions", figures:["5e année de sécheresse consécutive","600 000 déplacés/mois","−60% précipitations"],
    desc:"Sécheresse chronique. 40 millions en insécurité alimentaire. Principal couloir de migration vers l'Europe via la Libye. La crise iranienne aggrave les prix alimentaires mondiaux.",
    tags:["Sécheresse","Migrations","Famine"],
    tagColors:["#4dd9ac","#4dd9ac","#F6E05E"],
    linkedTo:[],
  },
  {
    lat:40.0, lng:127.5, name:"Corée du Nord", region:"Asie du Nord-Est",
    status:"watch", trend:"up", updated:"13 avril 2026", france:3,
    affected:"26 millions", figures:["20 000 soldats déployés en Ukraine","Arsenal estimé : 50 têtes nucléaires","Aide à l'Iran via la Russie"],
    desc:"20 000 soldats nord-coréens combattent en Ukraine aux côtés de la Russie. Pyongyang fournit missiles et uranium à l'Iran via Moscou selon les services de renseignement occidentaux.",
    tags:["Nucléaire","Russie","Missiles"],
    tagColors:["#F6E05E","#F6E05E","#FC8181"],
    linkedTo:[2],
  },
  {
    lat:15.0, lng:17.0, name:"Lac Tchad", region:"Afrique centrale",
    status:"climate", trend:"up", updated:"13 avril 2026", france:7,
    affected:"30 millions", figures:["−90% superficie depuis 1960","4 États en tension","Boko Haram : 40 000 membres"],
    desc:"90% de réduction depuis 1960. Ressource partagée par 4 États. Boko Haram exploite le vide créé par la crise hydrique. La France n'a plus de levier depuis le retrait du Sahel.",
    tags:["Guerre de l'eau","Boko Haram","Sécurité"],
    tagColors:["#4dd9ac","#FC8181","#F6AD55"],
    linkedTo:[3],
  },
  {
    lat:33.5, lng:76.0, name:"Cachemire", region:"Asie du Sud",
    status:"tension", trend:"up", updated:"13 avril 2026", france:3,
    affected:"15 millions", figures:["3 guerres depuis 1947","800 000 soldats déployés","2 puissances nucléaires"],
    desc:"Tensions persistantes entre Inde et Pakistan. Deux puissances nucléaires face à face sur fond de conflit pour l'eau du fleuve Indus — ressource menacée par la fonte des glaciers himalayens.",
    tags:["Guerre de l'eau","Nucléaire","Inde-Pakistan"],
    tagColors:["#4dd9ac","#FC8181","#F6AD55"],
    linkedTo:[],
  },
  {
    lat:32.5, lng:35.5, name:"Jourdain — Eau", region:"Moyen-Orient",
    status:"climate", trend:"up", updated:"13 avril 2026", france:5,
    affected:"20 millions", figures:["−75% débit du Jourdain","Accès eau Gaza : −80%","1M de déplacés liés à l'eau"],
    desc:"Le Jourdain a perdu 75% de son débit. Israël, Jordanie, Palestine et Syrie se disputent une ressource en voie d'épuisement. La guerre en cours aggrave la crise hydrique à Gaza.",
    tags:["Guerre de l'eau","Conflit","Sécheresse"],
    tagColors:["#4dd9ac","#FC8181","#4dd9ac"],
    linkedTo:[],
  },
  {
    lat:11.0, lng:37.0, name:"Nil — Barrage GERD", region:"Afrique de l'Est",
    status:"tension", trend:"up", updated:"13 avril 2026", france:4,
    affected:"110 millions", figures:["110M dépendent du Nil","74Md m³ capacité GERD","Égypte menace d'action militaire"],
    desc:"Le Grand Barrage éthiopien (GERD) menace l'approvisionnement en eau de l'Égypte et du Soudan. 110 millions dépendent du Nil. Le Caire refuse toute solution négociée.",
    tags:["Guerre de l'eau","Éthiopie","Égypte"],
    tagColors:["#4dd9ac","#F6AD55","#FC8181"],
    linkedTo:[],
  },
  {
    lat:20.0, lng:78.0, name:"Inde — Puissance", region:"Asie du Sud",
    status:"watch", trend:"stable", updated:"13 avril 2026", france:6,
    affected:"1,4 milliard", figures:["7% de croissance","3e économie mondiale en 2027","Partenaire de paix Iran-USA via Pakistan"],
    desc:"New Delhi refuse de choisir entre Washington et Moscou. L'Inde joue un rôle discret dans la médiation Iran-USA via son influence au Pakistan. Pivot géopolitique du siècle.",
    tags:["Non-alignement","Croissance","Indo-Pacifique"],
    tagColors:["#F6E05E","#68D391","#F6AD55"],
    linkedTo:[8],
  },
];

const COLOR = {crisis:"#FC8181",tension:"#F6AD55",watch:"#F6E05E",climate:"#4dd9ac",calm:"#68D391"};
const BARCOLOR = COLOR;
const TRENDCOL = {up:"#FC8181", down:"#68D391", stable:"rgba(255,255,255,0.35)"};
const TRENDSYM = {up:"↑", down:"↓", stable:"→"};

document.getElementById('zone-count').textContent = ZONES.length + ' zones analysées — géopolitiques, climatiques, guerres de l\'eau';

// ── THREE.JS SETUP ─────────────────────────────────────────────
const scene = new THREE.Scene();
const cam = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 100);
cam.position.set(0, 0, 2.8);

const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Lumières
const amb = new THREE.AmbientLight(0xffffff, 0.3);
scene.add(amb);
const sun = new THREE.DirectionalLight(0xfff5e0, 1.2);
sun.position.set(5,3,5);
scene.add(sun);
const fill = new THREE.DirectionalLight(0x1a2a4a, 0.4);
fill.position.set(-5,-2,-3);
scene.add(fill);

const globeGroup = new THREE.Group();
scene.add(globeGroup);

// Globe
const loader = new THREE.TextureLoader();
const globeTex = loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_atmos_2048.jpg');

const globe = new THREE.Mesh(
  new THREE.SphereGeometry(1,64,64),
  new THREE.MeshPhongMaterial({map:globeTex,specular:0x112244,shininess:12})
);
globeTex.onUpdate = ()=>{
  const btn=document.getElementById('start-btn');
  if(btn){btn.disabled=false;btn.style.opacity='1';btn.style.cursor='pointer';btn.textContent='▶ Commencer le tour';}
};
// Fallback si texture déjà chargée ou erreur
setTimeout(()=>{
  const btn=document.getElementById('start-btn');
  if(btn&&btn.disabled){btn.disabled=false;btn.style.opacity='1';btn.style.cursor='pointer';btn.textContent='▶ Commencer le tour';}
},1200);
globeGroup.add(globe);

// Atmosphère
globeGroup.add(new THREE.Mesh(
  new THREE.SphereGeometry(1.07,32,32),
  new THREE.MeshPhongMaterial({color:0x152540,transparent:true,opacity:.08,side:THREE.BackSide})
));

// Frontières
function ll2v(lat,lng,r=1){
  const phi=(90-lat)*Math.PI/180;
  const tht=(lng+180)*Math.PI/180;
  return new THREE.Vector3(-Math.sin(phi)*Math.cos(tht)*r,Math.cos(phi)*r,Math.sin(phi)*Math.sin(tht)*r);
}

// Markers
const markers=[];
ZONES.forEach((z,i)=>{
  const pos=ll2v(z.lat,z.lng,1.025);
  const col=new THREE.Color(COLOR[z.status]);
  const r=z.status==='crisis'?.022:z.status==='climate'?.018:.015;

  // Glow
  const gm=new THREE.Mesh(
    new THREE.SphereGeometry(r*3,8,8),
    new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:.1})
  );
  gm.position.copy(pos);
  globeGroup.add(gm);

  // Dot
  const dot=new THREE.Mesh(
    new THREE.SphereGeometry(r,10,10),
    new THREE.MeshBasicMaterial({color:col})
  );
  dot.position.copy(pos);
  dot.userData={zone:z,index:i,glow:gm};
  globeGroup.add(dot);
  markers.push(dot);
});

// Labels HTML
const labelDiv = document.createElement('div');
labelDiv.style.cssText='position:fixed;inset:0;pointer-events:none;z-index:50;overflow:hidden;';
document.body.appendChild(labelDiv);

markers.forEach((m,i)=>{
  const z=m.userData.zone;
  const col=COLOR[z.status];
  const el=document.createElement('div');
  el.id='lbl'+i;
  el.style.cssText=`position:absolute;opacity:0;transition:opacity 0.4s;display:flex;align-items:center;gap:4px;`;
  el.innerHTML=`<span style="font-family:'DM Sans',sans-serif;font-size:11px;font-weight:700;color:${col};background:rgb(2,3,8);padding:4px 10px;border-radius:2px;white-space:nowrap;border-left:3px solid ${col};letter-spacing:0.3px;box-shadow:0 2px 12px rgba(0,0,0,1)">${z.name}</span>`;
  labelDiv.appendChild(el);
});

// ── ROTATION AUTO ──────────────────────────────────────────────
let autoRot=true, isDrag=false, prevX=0, prevY=0;
let targetRotY=0.5, targetRotX=0.1;
let curRotY=0.5, curRotX=0.1;
let t=0;

const mouse = new THREE.Vector2();
const raycaster = new THREE.Raycaster();

// ── TOUR ──────────────────────────────────────────────────────
let currentZone=-1, touring=false;

function startTour(){
  if(markers.length===0) return;
  document.getElementById('intro').classList.add('hidden');
  touring=true;
  goToZone(0);
}

function goToZone(i){
  if(i<0||i>=ZONES.length) return;
  currentZone=i;
  const z=ZONES[i];

  // Voler vers la zone
  autoRot=false;
  targetRotY=-z.lng*Math.PI/180;
  targetRotX=z.lat*Math.PI/180*0.4;

  // Envoyer les données au parent Next.js
  window.parent.postMessage({type:'ZONE_CHANGE', zone:z, index:i, total:ZONES.length}, '*');

  // Mettre à jour la card (supprimé — géré par le parent)
  const col=COLOR[z.status];
  document.getElementById('ch-card').style.setProperty('--zone-col',col);
  document.getElementById('ch-region').textContent=z.region;
  document.getElementById('ch-name').textContent=z.name;
  document.getElementById('ch-trend').textContent=TRENDSYM[z.trend];
  document.getElementById('ch-trend').style.color=TRENDCOL[z.trend];
  document.getElementById('ch-desc').textContent=z.desc;
  document.getElementById('ch-num').textContent=(i+1)+' / '+ZONES.length;

  // Tags
  const tagsEl=document.getElementById('ch-tags');
  tagsEl.innerHTML='';
  z.tags.forEach((tag,ti)=>{
    const span=document.createElement('span');
    span.className='ch-tag';
    span.textContent=tag;
    span.style.color=z.tagColors[ti];
    span.style.borderColor=z.tagColors[ti]+'44';
    tagsEl.appendChild(span);
  });

  // Dots
  const dotsEl=document.getElementById('ch-dots');
  dotsEl.innerHTML='';
  ZONES.forEach((_,di)=>{
    const d=document.createElement('div');
    d.className='ch-dot'+(di===i?' active':di<i?' visited':'');
    d.onclick=()=>goToZone(di);
    dotsEl.appendChild(d);
  });

  // Bouton suivant
  const nb=document.getElementById('next-btn');
  if(i===ZONES.length-1){nb.textContent='Recommencer';nb.onclick=()=>goToZone(0);}
  else{nb.textContent='Suiv. →';nb.onclick=nextZone;}

  // Afficher la card
  const ch=document.getElementById('chapter');
  ch.classList.remove('hidden');
}

function nextZone(){goToZone(currentZone+1);}
function prevZone(){goToZone(currentZone-1);}
window.nextZone=nextZone;
window.prevZone=prevZone;
window.goToZone=goToZone;

// Écouter les messages du parent (navigation SUIV/PRÉC)
window.addEventListener('message', function(e) {
  if (e.data?.type === 'CALL') {
    const fn = e.data.fn;
    const arg = e.data.arg;
    if (fn === 'nextZone') nextZone();
    else if (fn === 'prevZone') prevZone();
    else if (fn === 'goToZone' && typeof arg === 'number') goToZone(arg);
  }
});

// ── TOUCH / CLICK ──────────────────────────────────────────────
renderer.domElement.addEventListener('mousedown',e=>{isDrag=true;autoRot=false;prevX=e.clientX;prevY=e.clientY});
window.addEventListener('mouseup',e=>{
  if(!isDrag)return; isDrag=false;
  const dx=e.clientX-prevX,dy=e.clientY-prevY;
  if(Math.abs(dx)<4&&Math.abs(dy)<4){
    mouse.x=(e.clientX/window.innerWidth)*2-1;
    mouse.y=-(e.clientY/window.innerHeight)*2+1;
    raycaster.setFromCamera(mouse,cam);
    const hits=raycaster.intersectObjects(markers);
    if(hits.length>0){
      const idx=hits[0].object.userData.index;
      goToZone(idx);
      document.getElementById('intro').classList.add('hidden');
    }
  }
});
window.addEventListener('mousemove',e=>{
  if(!isDrag)return;
  targetRotY+=(e.clientX-prevX)*0.005;
  targetRotX+=(e.clientY-prevY)*0.003;
  targetRotX=Math.max(-1.2,Math.min(1.2,targetRotX));
  prevX=e.clientX;prevY=e.clientY;
});

renderer.domElement.addEventListener('touchstart',e=>{isDrag=true;autoRot=false;prevX=e.touches[0].clientX;prevY=e.touches[0].clientY},{passive:true});
renderer.domElement.addEventListener('touchend',e=>{
  if(!isDrag)return; isDrag=false;
  const tx=e.changedTouches[0];
  const dx=tx.clientX-prevX,dy=tx.clientY-prevY;
  if(Math.abs(dx)<8&&Math.abs(dy)<8){
    mouse.x=(tx.clientX/window.innerWidth)*2-1;
    mouse.y=-(tx.clientY/window.innerHeight)*2+1;
    raycaster.setFromCamera(mouse,cam);
    const hits=raycaster.intersectObjects(markers);
    if(hits.length>0){
      goToZone(hits[0].object.userData.index);
      document.getElementById('intro').classList.add('hidden');
    }
  }
});
renderer.domElement.addEventListener('touchmove',e=>{
  if(!isDrag)return;
  targetRotY+=(e.touches[0].clientX-prevX)*0.005;
  targetRotX+=(e.touches[0].clientY-prevY)*0.003;
  prevX=e.touches[0].clientX;prevY=e.touches[0].clientY;
},{passive:true});

window.addEventListener('resize',()=>{
  cam.aspect=window.innerWidth/window.innerHeight;
  cam.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

// Arcs de connexion entre zones liées
const ARC_MESHES=[];
function buildArcs(){
  ARC_MESHES.forEach(a=>globeGroup.remove(a));
  ARC_MESHES.length=0;
  ZONES.forEach((z,i)=>{
    if(!z.linkedTo) return;
    z.linkedTo.forEach(j=>{
      if(j<=i) return; // éviter doublons
      const p1=ll2v(z.lat,z.lng,1.02);
      const p2=ll2v(ZONES[j].lat,ZONES[j].lng,1.02);
      const mid=new THREE.Vector3().addVectors(p1,p2).multiplyScalar(0.5);
      mid.normalize().multiplyScalar(1.35);
      const curve=new THREE.QuadraticBezierCurve3(p1,mid,p2);
      const pts=curve.getPoints(40);
      const geo=new THREE.BufferGeometry().setFromPoints(pts);
      const col=new THREE.Color(COLOR[z.status]);
      const mat=new THREE.LineBasicMaterial({color:col,transparent:true,opacity:0.2});
      const line=new THREE.Line(geo,mat);
      line.userData.mat=mat;
      globeGroup.add(line);
      ARC_MESHES.push(line);
    });
  });
}
buildArcs();

// ── ANIMATE ───────────────────────────────────────────────────
function animate(){
  requestAnimationFrame(animate);
  t+=0.008;
  if(autoRot) targetRotY+=0.002;

  curRotY+=(targetRotY-curRotY)*0.10;
  curRotX+=(targetRotX-curRotX)*0.10;
  globeGroup.rotation.y=curRotY;
  globeGroup.rotation.x=curRotX;

  // Pulse markers
  markers.forEach((m,i)=>{
    if(m.userData.zone.status==='crisis'){
      const s=1+.3*Math.sin(t*2+i);
      m.scale.setScalar(s);
      m.userData.glow.scale.setScalar(1+.4*Math.sin(t*1.8+i));
    }
    // Surbrillance zone active
    if(i===currentZone){
      m.userData.glow.material.opacity=0.25+0.1*Math.sin(t*3);
    } else {
      m.userData.glow.material.opacity=0.08;
    }
  });

  ARC_MESHES.forEach((a,i)=>{a.userData.mat.opacity=0.12+0.08*Math.sin(t*1.2+i*0.5);});
  renderer.render(scene,cam);

  // Labels
  markers.forEach((m,i)=>{
    const el=document.getElementById('lbl'+i);
    if(!el) return;
    const wPos=new THREE.Vector3();
    m.getWorldPosition(wPos);
    const toPoint=wPos.clone().normalize();
    const toCam=cam.position.clone().normalize();
    if(toCam.dot(toPoint)<0.15){el.style.opacity='0';return;}
    const proj=wPos.clone().project(cam);
    if(proj.z>1){el.style.opacity='0';return;}
    const x=(proj.x+1)/2*window.innerWidth;
    const y=(-proj.y+1)/2*window.innerHeight;
    el.style.left=x+'px';
    el.style.top=y+'px';
    el.style.opacity=i===currentZone?'1':'0.5';
    // Agrandir le label actif
    const span=el.querySelector('span');
    if(span) span.style.opacity=i===currentZone?'1':'0.6';
  });
}
animate();

document.getElementById('ch-card').addEventListener('scroll',function(){
  const hint=document.getElementById('scroll-hint');
  if(hint) hint.style.opacity=this.scrollTop>10?'0':'1';
});

</script>
