<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,700;1,400&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0A0A0A"/>

  <!-- Gold accent bar top -->
  <rect x="0" y="0" width="1200" height="4" fill="#C4A265"/>

  <!-- Subtle texture lines -->
  <rect x="64" y="0" width="1" height="630" fill="rgba(255,255,255,0.04)"/>
  <rect x="1136" y="0" width="1" height="630" fill="rgba(255,255,255,0.04)"/>

  <!-- Logo PRISME -->
  <text x="600" y="280" 
    font-family="Georgia, serif" 
    font-size="120" 
    font-weight="700" 
    letter-spacing="-6" 
    fill="rgba(255,255,255,0.9)" 
    text-anchor="middle">Pris</text>
  <text x="810" y="280" 
    font-family="Georgia, serif" 
    font-size="120" 
    font-weight="300"
    font-style="italic"
    letter-spacing="-4"
    fill="rgba(255,255,255,0.9)" 
    text-anchor="start">me</text>

  <!-- Baseline -->
  <text x="600" y="340" 
    font-family="Georgia, serif" 
    font-size="18" 
    fill="rgba(255,255,255,0.35)"
    letter-spacing="6"
    text-anchor="middle">VOIR AUTREMENT</text>

  <!-- Separator -->
  <rect x="480" y="370" width="240" height="1" fill="rgba(196,162,101,0.4)"/>

  <!-- Description -->
  <text x="600" y="408" 
    font-family="Georgia, serif" 
    font-size="16" 
    fill="rgba(255,255,255,0.25)"
    letter-spacing="2"
    text-anchor="middle">Média d'analyse indépendant</text>

  <!-- URL -->
  <text x="600" y="560" 
    font-family="Georgia, serif" 
    font-size="13" 
    fill="rgba(255,255,255,0.2)"
    letter-spacing="1.5"
    text-anchor="middle">prisme-peach.vercel.app</text>

  <!-- Gold accent bar bottom -->
  <rect x="0" y="626" width="1200" height="4" fill="#C4A265"/>
</svg>
