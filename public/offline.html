<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hors réseau, Soara</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: #FAF8F3;
    color: #1A1A1A;
    font-family: Georgia, "Times New Roman", serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    -webkit-font-smoothing: antialiased;
  }
  .frame {
    max-width: 38rem;
    text-align: center;
  }
  .mark {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 1.5rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #1A1A1A;
    margin-bottom: 3rem;
  }
  .mark em {
    font-style: italic;
    color: #C4A265;
    font-weight: 400;
    text-transform: none;
    letter-spacing: 0;
    font-size: 1.6rem;
  }
  h1 {
    font-family: Georgia, "Times New Roman", serif;
    font-weight: 400;
    font-size: clamp(2.4rem, 6vw, 3.6rem);
    line-height: 1.15;
    margin: 0 0 1.5rem;
    letter-spacing: -0.01em;
  }
  .chapeau {
    font-style: italic;
    font-size: clamp(1.15rem, 2.5vw, 1.35rem);
    line-height: 1.55;
    color: #4A4A4A;
    margin: 0 0 2.5rem;
  }
  .citation {
    border-top: 1px solid #C4A265;
    border-bottom: 1px solid #C4A265;
    padding: 1.5rem 0;
    margin: 0 auto 3rem;
    max-width: 28rem;
    font-style: italic;
    font-size: 1.05rem;
    line-height: 1.6;
    color: #1A1A1A;
  }
  .citation::before, .citation::after {
    content: "";
    display: block;
    width: 2rem;
    height: 1px;
    background: #C4A265;
    margin: 0 auto;
    opacity: 0.5;
  }
  .citation::before { margin-bottom: 1rem; }
  .citation::after { margin-top: 1rem; }
  button {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 0.95rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    background: #1A1A1A;
    color: #FAF8F3;
    border: 0;
    padding: 0.95rem 2.2rem;
    cursor: pointer;
    transition: background 0.2s ease;
  }
  button:hover, button:focus-visible {
    background: #2A2A2A;
    outline: 0;
  }
  button:focus-visible {
    box-shadow: 0 0 0 2px #C4A265;
  }
  @media (prefers-reduced-motion: reduce) {
    button { transition: none; }
  }
</style>
</head>
<body>
  <main class="frame">
    <div class="mark">So<em>ara</em></div>
    <h1>Hors réseau</h1>
    <p class="chapeau">La connexion s'est interrompue. Vos pages déjà lues restent disponibles, le reste vous attend dès le retour du signal.</p>
    <p class="citation">Voir autrement suppose parfois de s'arrêter pour laisser le monde se taire.</p>
    <button type="button" onclick="window.location.reload()">Réessayer</button>
  </main>
</body>
</html>
