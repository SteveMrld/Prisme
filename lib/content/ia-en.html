<script>
(function() {
  var slides = [
    {
      num: '01', tag: 'Starting point',
      title: 'AI does not <em>understand</em> language',
      body: 'A large language model like ChatGPT, Claude, or Gemini does not understand what you write. It predicts the most probable next token given all the preceding ones. That is all. That is sufficient to produce texts that seem intelligent.',
      box: null
    },
    {
      num: '02', tag: 'Tokenization',
      title: 'Text is broken into <em>fragments</em>',
      body: 'Before any processing, text is split into tokens, sub-lexical fragments. "Artificial intelligence" becomes several tokens.',
      tokens: [
        {t:'Art', c:'a'},{t:'ific', c:'a'},{t:'ial', c:'a'},
        {t:'▁intel', c:'b'},{t:'lig', c:'b'},{t:'ence', c:'b'},
        {t:'▁is', c:'c'},
        {t:'▁a', c:'c'},
        {t:'▁pred', c:'d'},{t:'iction', c:'d'},
      ]
    },
    {
      num: '03', tag: 'Embeddings',
      title: 'Each token becomes a <em>vector</em>',
      body: 'Each token is converted into a high-dimensional vector, a list of thousands of numbers. These numbers encode semantic relationships between words: "king" and "queen" are close in this space, "apple" and "banana" are too.',
      box: '<strong>king − man + woman ≈ queen</strong><br>This vector arithmetic actually works in the embedding spaces of modern LLMs.'
    },
    {
      num: '04', tag: 'Attention',
      title: 'The <em>attention</em> mechanism',
      body: 'The transformer revolution (2017): each token can "look at" all other tokens in the sequence simultaneously. To predict the word after "The Eiffel Tower is located in", the model can weigh the importance of each preceding word.',
      box: 'Vaswani et al., <em>Attention Is All You Need</em>, Google Brain, 2017. The most cited AI paper of the last decade.'
    },
    {
      num: '05', tag: 'Prediction',
      title: 'Completing "The capital of France is…"',
      body: 'For each position, the model produces a probability distribution over the entire vocabulary. Here are the candidates for what follows this sentence:',
      probs: [
        {word: 'Paris', pct: 94},
        {word: 'Lyon', pct: 3},
        {word: 'a', pct: 1},
        {word: 'the', pct: 1},
        {word: 'known', pct: 1},
      ]
    },
    {
      num: '06', tag: 'Training',
      title: 'Billions of <em>wrong predictions</em>',
      body: 'The model is trained by giving it billions of sentences and asking it to predict each next word. With each error, the network weights are adjusted so it makes fewer mistakes next time.',
      box: 'GPT-4: trained on ~13 trillion tokens. If you read at 250 words per minute without ever sleeping, it would take you 100,000 years to read as much.'
    },
    {
      num: '07', tag: 'RLHF',
      title: 'Making the model <em>useful</em>',
      body: 'A pre-trained model predicts statistically probable text, not necessarily useful, honest, or harmless text. RLHF (Reinforcement Learning from Human Feedback) adjusts the model to respond well to human questions.',
      steps: [
        {n:'1', t:'<strong>Collection</strong>, humans write exemplary responses'},
        {n:'2', t:'<strong>Ranking</strong>, humans compare pairs of responses'},
        {n:'3', t:'<strong>Reward model</strong>, a model learns to predict human preferences'},
        {n:'4', t:'<strong>Fine-tuning</strong>, the LLM is adjusted to maximize this reward model'},
      ]
    },
    {
      num: '08', tag: 'Hallucinations',
      title: 'Why AI <em>makes things up</em>',
      body: "The model doesn't know what it doesn't know. It always generates the most probable token, even when the correct response would be \"I don't know.\" The result: fabricated facts presented with the same fluency as real ones.",
      box: '<strong>Practical rule</strong>: an LLM is reliable for reasoning and synthesis. It is risky for precise facts, dates, quotes, statistics. Always verify specific factual claims.'
    },
    {
      num: '09', tag: 'Context',
      title: 'The <em>context</em> window',
      body: 'The model can only process a limited amount of text simultaneously, its "context window." Everything before this limit is forgotten. There is no persistent memory between two conversations.',
      stat: {num: '200K', label: 'context tokens for Claude 3, approximately 150,000 words, an entire novel.'}
    },
    {
      num: '10', tag: 'Temperature',
      title: 'Controlling <em>creativity</em>',
      body: 'Temperature is a parameter that controls how much the model chooses improbable tokens. Low temperature → predictable and precise responses. High temperature → creative but less reliable responses.',
      probs: [
        {word: 'Paris (T=0.1)', pct: 99},
        {word: 'Paris (T=0.7)', pct: 72},
        {word: 'Montreal (T=0.7)', pct: 14},
        {word: 'random (T=1.5)', pct: 35},
      ]
    },
    {
      num: '11', tag: 'Prompt',
      title: 'Why the <em>prompt</em> changes everything',
      body: 'The model has no objective of its own; it continues what you have begun. The way you formulate a request radically conditions the distribution of possible responses.',
      steps: [
        {n:'▸', t:'"Explain X to me" → general explanation, often approximate'},
        {n:'▸', t:'"You are an expert in X. Explain to a professional…" → much more precise'},
        {n:'▸', t:'"Reason step by step before answering" → fewer errors'},
        {n:'▸', t:'"What information do you need to answer?" → reliable diagnostic'},
      ]
    },
    {
      num: '12', tag: 'What it does well',
      title: 'The <em>real</em> strengths of LLMs',
      body: "Just because an LLM doesn't \"understand\" doesn't mean it isn't useful. Some tasks correspond exactly to what it naturally does well.",
      steps: [
        {n:'', t:'<strong>Synthesis</strong>, summarizing, reformulating, condensing information'},
        {n:'', t:'<strong>Variant generation</strong>, brainstorming, reformulations, translations'},
        {n:'', t:'<strong>Structured reasoning</strong>, when context is explicitly provided'},
        {n:'', t:'<strong>Coding</strong>, close to statistical prediction on massive corpus'},
      ]
    },
    {
      num: '13', tag: 'What it does poorly',
      title: 'Structural <em>limitations</em>',
      body: 'These limitations are not bugs; they are inherent to the architecture.',
      steps: [
        {n:'', t:'<strong>Precise facts without verification</strong>, undetected hallucinations'},
        {n:'', t:'<strong>Complex math</strong>, calculates on tokens, not on numbers'},
        {n:'', t:'<strong>Long-range coherence</strong>, forgets what exceeds the context'},
        {n:'', t:'<strong>Real-time updates</strong>, does not know what happened after its cutoff'},
      ]
    },
    {
      num: '14', tag: 'Impact',
      title: 'What this <em>actually changes</em>',
      body: 'AI does not replace jobs that require human judgment. It devalues pure technical competence and amplifies judgment.',
      stat: {num: '40%', label: 'of global jobs exposed to generative AI according to the IMF, 2024, but "exposed" does not mean "eliminated."'}
    },
    {
      num: '15', tag: 'Conclusion',
      title: 'Prediction ≠ <em>understanding</em><br>but prediction = <em>power</em>',
      body: 'An LLM is a machine for predicting human language with vertiginous statistical precision. It is not a consciousness. It is not general intelligence. It is an amplification tool, of your thinking, your blind spots, your efficiency. Using it well means understanding what it is.',
      box: null
    },
  ]

  var cur = 0
  var timer = null
  var paused = false
  var DELAY = 8000

  function render(animate) {
    var s = slides[cur]
    var el = document.getElementById('sc')
    el.parentNode.replaceChild(el.cloneNode(false), el)
    el = document.getElementById('sc')

    var html = '<div class="sl-num">' + s.num + '</div>'
    html += '<div class="sl-tag">' + s.tag + '</div>'
    html += '<div class="sl-title">' + s.title + '</div>'
    if (s.body) html += '<div class="sl-body">' + s.body + '</div>'

    if (s.tokens) {
      html += '<div class="sl-tokens">'
      s.tokens.forEach(function(t) {
        html += '<span class="tok tok-' + t.c + '">' + t.t + '</span>'
      })
      html += '</div>'
    }

    if (s.probs) {
      html += '<div class="sl-probs">'
      s.probs.forEach(function(p) {
        html += '<div class="prob-row">'
        html += '<div class="prob-word">' + p.word + '</div>'
        html += '<div class="prob-bar-bg"><div class="prob-bar-fill" style="width:' + p.pct + '%"></div></div>'
        html += '<div class="prob-pct">' + p.pct + '%</div>'
        html += '</div>'
      })
      html += '</div>'
    }

    if (s.steps) {
      html += '<div class="sl-steps">'
      s.steps.forEach(function(st) {
        html += '<div class="step"><div class="step-num">' + st.n + '</div><div class="step-text">' + st.t + '</div></div>'
      })
      html += '</div>'
    }

    if (s.stat) {
      html += '<div class="sl-stat"><div class="sl-stat-num">' + s.stat.num + '</div><div class="sl-stat-label">' + s.stat.label + '</div></div>'
    }

    if (s.box) {
      html += '<div class="sl-box">' + s.box + '</div>'
    }

    el.innerHTML = html

    var pct = ((cur + 1) / slides.length * 100).toFixed(2)
    document.getElementById('prog').style.width = pct + '%'
    document.getElementById('ctr').textContent = (cur + 1) + ' / ' + slides.length
    document.getElementById('bPrev').disabled = cur === 0
    document.getElementById('bNext').disabled = cur === slides.length - 1

    if (!paused && cur < slides.length - 1) {
      clearTimeout(timer)
      timer = setTimeout(function() { go(1) }, DELAY)
    }
  }

  window.go = function(d) {
    var next = cur + d
    if (next < 0 || next >= slides.length) return
    cur = next
    render(true)
  }

  window.togglePause = function() {
    paused = !paused
    var btn = document.getElementById('bPause')
    if (paused) {
      clearTimeout(timer)
      btn.textContent = '▶ Resume'
    } else {
      btn.textContent = '⏸ Pause'
      if (cur < slides.length - 1) timer = setTimeout(function() { go(1) }, DELAY)
    }
  }

  render(false)
})()
</script>
