<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" preserveAspectRatio="xMidYMid slice">
  <rect width="1080" height="1920" fill="#FAF8F3"/>

  <rect x="0" y="0" width="1080" height="80" fill="#FAF8F3"/>
  <text x="80" y="55" font-family="Georgia, serif" font-size="32" fill="#1A1A1A">9:41</text>

  <!-- Mini masthead -->
  <text x="540" y="150" font-family="Georgia, serif" font-size="38" font-weight="400" fill="#1A1A1A" text-anchor="middle">So<tspan font-style="italic" fill="#C4A265">ara</tspan></text>
  <line x1="0" y1="180" x2="1080" y2="180" stroke="#1A1A1A" stroke-width="0.5" opacity="0.2"/>

  <!-- Hero image area -->
  <defs>
    <linearGradient id="heroGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3A2A1A"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
  </defs>
  <rect x="0" y="180" width="1080" height="680" fill="url(#heroGrad)"/>
  <circle cx="540" cy="520" r="200" fill="none" stroke="#C4A265" stroke-width="1" opacity="0.6"/>
  <circle cx="540" cy="520" r="280" fill="none" stroke="#C4A265" stroke-width="0.5" opacity="0.4"/>
  <circle cx="540" cy="520" r="120" fill="#C4A265" opacity="0.15"/>

  <!-- Rubrique -->
  <text x="80" y="940" font-family="Georgia, serif" font-size="22" fill="#C4A265" letter-spacing="4">GÉOPOLITIQUE</text>

  <!-- Titre -->
  <text x="80" y="1060" font-family="Georgia, serif" font-size="62" font-weight="400" fill="#1A1A1A">L'Afrique en orbite</text>
  <text x="80" y="1140" font-family="Georgia, serif" font-size="62" font-weight="400" fill="#1A1A1A">d'un nouveau monde</text>

  <!-- Méta -->
  <text x="80" y="1210" font-family="Georgia, serif" font-size="22" fill="#666" letter-spacing="1">Par Steve Moradel, lecture 18 min</text>
  <line x1="80" y1="1240" x2="1000" y2="1240" stroke="#C4A265" stroke-width="1"/>

  <!-- Chapeau -->
  <text x="80" y="1310" font-family="Georgia, serif" font-size="32" font-style="italic" fill="#1A1A1A">Cinquante ans après les indépendances,</text>
  <text x="80" y="1360" font-family="Georgia, serif" font-size="32" font-style="italic" fill="#1A1A1A">le continent redessine ses alliances et</text>
  <text x="80" y="1410" font-family="Georgia, serif" font-size="32" font-style="italic" fill="#1A1A1A">ses partenaires économiques.</text>

  <!-- Lettrine + body -->
  <text x="80" y="1570" font-family="Georgia, serif" font-size="120" font-weight="400" fill="#C4A265">C</text>
  <text x="180" y="1530" font-family="Georgia, serif" font-size="26" fill="#1A1A1A">e qui se joue aujourd'hui à Bamako,</text>
  <text x="180" y="1570" font-family="Georgia, serif" font-size="26" fill="#1A1A1A">Niamey ou Ouagadougou ne se réduit</text>
  <text x="80" y="1610" font-family="Georgia, serif" font-size="26" fill="#1A1A1A">plus à un face-à-face avec Paris. Pékin,</text>
  <text x="80" y="1650" font-family="Georgia, serif" font-size="26" fill="#1A1A1A">Moscou et Ankara sont entrés en scène,</text>
  <text x="80" y="1690" font-family="Georgia, serif" font-size="26" fill="#1A1A1A">chacun avec sa grammaire propre...</text>

  <line x1="0" y1="1760" x2="1080" y2="1760" stroke="#1A1A1A" stroke-width="0.5" opacity="0.2"/>
  <text x="135" y="1830" font-family="Georgia, serif" font-size="22" fill="#666" text-anchor="middle">Accueil</text>
  <text x="405" y="1830" font-family="Georgia, serif" font-size="22" fill="#666" text-anchor="middle">Atlas</text>
  <text x="675" y="1830" font-family="Georgia, serif" font-size="22" fill="#666" text-anchor="middle">Recoupe</text>
  <text x="945" y="1830" font-family="Georgia, serif" font-size="22" fill="#666" text-anchor="middle">Indicateurs</text>
</svg>
